# Publish @chaafoo/anchored to npm on a version-tag push.
#
# Trigger: push of any tag matching `v*` (e.g. v0.4.1, v0.5.0, v1.0.0).
#
# Flow:
#   1. Verify the tag version matches core/package.json AND
#      plugin/.claude-plugin/plugin.json (one version line — a mismatch is
#      the most common marketplace + release-bookkeeping mistake).
#   2. Run the full quality gates: lint, typecheck, test, build.
#   3. Publish @chaafoo/anchored to npm (OIDC trusted publishing + provenance).
#   4. Create a GitHub Release with auto-generated notes (from the commits/PRs
#      since the previous tag — no CHANGELOG to maintain).
#
# The plugin itself isn't published here — the Claude marketplace pulls the
# plugin straight from the GitHub repo (a merge to main is its "deploy").
# This workflow only ships the npm CLI package.
#
# PREREQUISITE (one-time, manual, not automatable here): a Trusted Publisher
# must be configured on npm.com for @chaafoo/anchored, bound to repo
# chafoo/anchored + workflow file `publish.yml`. OIDC provenance fails
# without it. See https://docs.npmjs.com/trusted-publishers/
name: publish

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    working-directory: core

jobs:
  publish:
    name: publish @chaafoo/anchored
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
      id-token: write # npm provenance (signed publish via OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing needs npm 11.5.1+; pin latest explicitly.
      - name: Upgrade npm
        run: npm install -g npm@latest
        working-directory: ${{ github.workspace }}

      # ───────────────────────────────────────────────────────────────
      # Verify tag == core/package.json == plugin.json (one version line)
      # ───────────────────────────────────────────────────────────────
      - name: Verify version consistency
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          PLUGIN_VERSION=$(node -p "require('../plugin/.claude-plugin/plugin.json').version")
          echo "Tag:     $TAG_VERSION"
          echo "Package: $PKG_VERSION"
          echo "Plugin:  $PLUGIN_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag ($TAG_VERSION) does not match core/package.json ($PKG_VERSION)"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "::error::Tag ($TAG_VERSION) does not match plugin.json ($PLUGIN_VERSION)"
            exit 1
          fi

      # ───────────────────────────────────────────────────────────────
      # Install + quality gates (final pre-publish check)
      # ───────────────────────────────────────────────────────────────
      - name: Install
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint
      - name: Typecheck
        run: bun run typecheck
      - name: Test
        run: bun run test
      - name: Build
        run: bun run build

      # ───────────────────────────────────────────────────────────────
      # Publish to npm — OIDC trusted publishing, no NPM_TOKEN needed.
      # ───────────────────────────────────────────────────────────────
      - name: Publish to npm
        run: npm publish --access public --provenance

      # ───────────────────────────────────────────────────────────────
      # GitHub Release — auto-generated notes (since the previous tag)
      # ───────────────────────────────────────────────────────────────
      - name: Create GitHub Release
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "anchored ${GITHUB_REF_NAME#v}" \
            --generate-notes
