# Cut a GitHub Release on a version-tag push.
#
# Trigger: push of any tag matching `v*` (e.g. v0.5.1, v0.6.0).
#
# anchored is distributed as a Claude Code plugin straight from this repo —
# Claude Code puts the bundled `plugin/bin/anchored` on PATH, so there is NO npm
# package to publish (the engine lives in core/ but ships bundled, not via npm).
# This workflow therefore only:
#   1. Verifies the tag matches core/package.json AND plugin.json (one version line).
#   2. Cuts a GitHub Release with auto-generated notes (the changelog for users).
#
# Quality gates run in ci.yml on every push to main; a tag points at an
# already-tested main commit, so they are not repeated here.
name: release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: github release
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
    steps:
      - uses: actions/checkout@v4

      - name: Verify version consistency
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./core/package.json').version")
          PLUGIN_VERSION=$(node -p "require('./plugin/.claude-plugin/plugin.json').version")
          echo "Tag:     $TAG_VERSION"
          echo "Package: $PKG_VERSION"
          echo "Plugin:  $PLUGIN_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag ($TAG_VERSION) does not match core/package.json ($PKG_VERSION)"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "::error::Tag ($TAG_VERSION) does not match plugin.json ($PLUGIN_VERSION)"
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "anchored ${GITHUB_REF_NAME#v}" \
            --generate-notes
