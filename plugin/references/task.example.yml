# yaml-language-server: $schema=https://raw.githubusercontent.com/chafoo/anchored/main/plugin/references/schema/task.schema.json
# task file — example · lives under .claude/tasks/<slug>.yml  OR  .claude/tasks/<epic>/<slug>.yml
# The task tier. Phases are the children; build loops them (each: phase). Fields =
# task-tier descriptor (see config.md → fields). Prose as block scalar (|).

schema_version: 2
slug:    history-flow-backtest/01-exit-sim    # nested under the epic (or flat: just-a-task)
title:   "settleExits seam in the history runner"
status:  build                                # plan → drafted → refined → build → wrap → done
created: 2026-06-10

context:                                       # the WWWW trails per stage (block scalar)
  plan: |
    Pull exit simulation into the history runner as a seam, a no-op live.
    Decompose → 2 phases (seam, wiring).
  refine: |
    plan-check: settleExits must not touch matchCandle (pure dependency order).
    rules-check: docs/runner-seams.md applies in both phases.
  build: |
    Phase 1 green; phase 2 in progress.
  wrap: |
    (follows)

questions:
  - id: q1
    text: "Exit price: candle close or intrabar estimate? (lean close)"
    priority: medium
    origin: plan-agent
    status: resolved
    answer: "candle close — deterministic, enough for the $0 evidence."
    source: ai
    reasoning: "History mode needs determinism; intrabar adds noise without added value."

log:
  - { at: seam, kind: decision, note: "settleExits behind a flag, no-op live." }

phases:                                        # the children — build loops them (each: phase)
  - name: "settleExits seam"
    slug: seam
    status: done
    context: |
      Pure seam in the history runner; no-op live via feature flag.
    rules:
      - { path: docs/runner-seams.md, why: "Seam convention: no-op live + active in history" }
    acceptance_criteria:
      - id: a1
        text: "settleExits is called per candle in replay, never live"
        status: done
        evidence:                              # no `done` without evidence (hard invariant)
          - "src/runner/history.ts:142 — settleExits(candle) in the replay loop"
          - "test: runner.history.spec.ts:88 — live path does NOT call settleExits (green)"
    # failures: []                             # set by validation; drives retry

  - name: "wire the exit lifecycle"
    slug: wire-lifecycle
    status: in-progress
    context: |
      Close position open→exit via the exit sim.
    rules: []
    acceptance_criteria:
      - { id: a1, text: "Position receives exit event + final state 'closed'", status: pending }
