# anchored.default.yml — Draft / Design-Spec

phase:
  plan:
    steps: []                         # leer — die ACs sind die "Plan"-Daten der Phase
  refine:
    steps: []                         # leer
  build:
    steps:
      - { name: implement }           # die Arbeit
      - { name: task-validate }       # Evidence-Honesty: prüft, dass jedes AC echten Beweis hat
      - { name: code-validate }       # Rule-Adherence: prüft gegen rules
  wrap:
    steps: []                         # leer

  fields:                             # Daten-Modell einer Phase (Default — erweiterbar)
    name:                string
    slug:                kebab
    status:              pending | in-progress | done | blocked | deferred
    context:             markdown
    rules:               list<{ path, why }>
    acceptance_criteria: list<{ id, text, status, evidence? }>
    evidence:            list<string>   # konkrete Beweise: datei:zeile + test-output
    failures:            list<string>   # aus der Validierung; treibt den retry-loop

task:
  plan:                               # Struktur schreiben
    steps:
      - { name: discover }            # Codebase scannen
      - { name: rules-scan }          # relevante rules sammeln
      - { name: decompose }           # in Phasen + ACs zerlegen
  refine:                             # Anforderungen prüfen: code, rules, q&a
    steps:
      - { name: plan-check }          # Plan gegen aktuellen Code
      - { name: rules-check }         # Rules-Coverage pro Phase
      - { name: walk, involve: high-only }   # Q&A-Walk · all | high-only | none
  build:                              # Loop auf phase
    each: phase                       # intrinsisch — pro Tier fix (task→phase), nicht konfigurierbar (nur Doku)
    stop:
      - 'a decision deviates from the plan'
    retry_limit: 3                    # so oft wird eine fehlschlagende Phase neu gefahren
  wrap:
    steps:
      - { name: review }
      - { name: summarize }

  fields:                             # Daten-Modell einer Task (das Task-File)
    schema_version:  int
    slug:            kebab | nested   # <slug> oder <epic>/<slug> als Top-Level
    title:           string
    created:         date
    status:          plan | drafted | refined | build | wrap | done
    context:                          # Prosa-Trails — als YAML block-scalar (|) gespeichert; reiner String, kein Mix
      plan:          markdown         # intro + Plan-Trail
      refine:        markdown         # plan-check + rules-check Rollups
      build:         markdown         # Build-Notizen pro Phase
      wrap:          markdown         # Review + Summary
    questions:       list<{ id, text, priority, origin, status, answer?, source?, reasoning? }>
    decisions:       view<questions[status=resolved, source=ai]>   # der Entscheidungs-Trail (reasoning)
    log:             list<{ at, kind, note }>   # append-only PM-Notizbuch
    phases:          list<phase>      # die Kinder (siehe phase oben)

epic:
  plan:
    steps:
      - { name: discover }            # Lage/Umfang sondieren (geteilt mit task.plan)
      - { name: scaffold }            # goal-Prosa → coarse task-stubs
  refine:
    steps:
      - { name: walk, involve: high-only }   # Stubs/Reihenfolge mit dir klären
  build:                              # Loop auf task
    each: task                        # intrinsisch — pro Tier fix (epic→task), nicht konfigurierbar (nur Doku)
    stop:
      - 'an architectural boundary is crossed (layer, DAG, contract)'
    retry_limit: 3
  wrap:
    steps:
      - { name: roll-up }             # DoD gegen epic.acceptance + Retro

  fields:                             # Daten-Modell eines Epics (das _epic.yml)
    schema_version: int
    slug:           kebab
    title:          string
    status:         planning | building | done
    goal:           markdown          # das große Ziel in Prosa
    acceptance:     list<{ id, text, status }>   # Definition-of-Done (epic-Ebene, grob)
    questions:      list<{ id, text, priority, origin, status, answer?, source?, reasoning? }>
    tasks:          list<{ slug, goal, status, depends_on }>   # coarse Stubs = Loop-Queue
                                      #   status: pending | active | done | blocked
                                      #   Reihenfolge = Listen-Position
    log:            list<{ at, kind, note }>   # kind: decision | reorder | learning | blocker

