# anchored.default.yml — draft / design spec
#
# COMPLETE default view: every tier (phase ▸ task ▸ epic ▸ project) with its
# stage steps AND its `fields` (data model). Provided by the framework. A real
# user anchored.yml is almost empty — it carries deltas only; what's here runs
# automatically when you write nothing.
#
# Two layers:
#   • Mechanism (substrate, fixed): the tier form, the state-machine data model
#     (`fields`), atomic writes, the audit trail. Enforces integrity.
#   • Policy (steps, swappable): WHAT happens in each stage. Shown here as the
#     default template — fully overridable / replaceable.
#
# HARD INVARIANT (substrate, not switchable off):
#   An `ac` only goes to `status: done` when `evidence` is present. HOW the
#   evidence is produced is yours to configure freely — but the substrate won't
#   let you lie about being "done". That's anchored's promise, anchored in the
#   data model rather than in a privileged step.

phase:
  plan:
    steps: []                         # empty — the acceptance criteria are the phase's "plan" data
  refine:
    steps: []                         # empty
  build:
    steps:
      - { name: implement, use: { type: agent, name: build-implement } }            # the work
      - { name: task-validate, use: { type: agent, name: build-task-validate } }    # evidence-honesty: checks that every criterion has real proof
      - { name: code-validate, use: { type: agent, name: build-code-validate } }    # rule-adherence: checks against rules
  wrap:
    steps: []                         # empty

  fields:                             # data model of a phase (default — extendable)
    name:                string
    slug:                kebab
    status:              pending | in-progress | done | blocked | deferred
    context:             markdown
    rules:               list<{ path, why }>
    acceptance_criteria: list<{ id, text, status, evidence? }>
    evidence:            list<string>   # concrete proof: file:line + test output
    failures:            list<string>   # from validation; drives the retry loop

task:
  plan:                               # write the structure
    steps:
      - { name: discover, use: { type: agent, name: plan-discover } }            # scan the codebase
      - { name: rules-scan, use: { type: agent, name: plan-rules-scan } }        # collect the relevant rules
      - { name: decompose, use: { type: agent, name: plan-decompose } }          # break into phases + acceptance criteria
  refine:                             # check the requirements: code, rules, q&a
    steps:
      - { name: plan-check, use: { type: agent, name: refine-plan-check } }      # plan against the current code
      - { name: rules-check, use: { type: agent, name: refine-rules-check } }    # rules coverage per phase
      - { name: walk, use: { type: skill, name: walk }, involve: high-only }   # q&a walk · all | high-only | none
  build:                              # loop over phase
    each: phase                       # intrinsic — fixed per tier (task→phase), not configurable (docs only)
    stop:
      - 'a decision deviates from the plan'
    retry_limit: 3                    # how many times a failing phase is re-run
  wrap:
    steps:
      - { name: review, use: { type: agent, name: wrap-review } }
      - { name: summarize, use: { type: agent, name: wrap-summarize } }

  fields:                             # data model of a task (the task-file)
    schema_version:  int
    slug:            kebab | nested   # <slug> or <epic>/<slug> as the top level
    title:           string
    created:         date
    status:          plan | drafted | refined | build | wrap | done
    context:                          # prose trails — stored as a YAML block scalar (|); a plain string, no mix
      plan:          markdown         # intro + plan trail
      refine:        markdown         # plan-check + rules-check rollups
      build:         markdown         # build notes per phase
      wrap:          markdown         # review + summary
    questions:       list<{ id, text, priority, origin, status, answer?, source?, reasoning? }>
    decisions:       view<questions[status=resolved, source=ai]>   # the decision trail (reasoning)
    log:             list<{ at, kind, note }>   # append-only project-management notebook
    phases:          list<phase>      # the children (see phase above)

epic:
  plan:
    steps:
      - { name: discover, use: { type: agent, name: plan-discover } }            # probe the situation/scope (shared with task.plan)
      - { name: scaffold, use: { type: agent, name: epic-scaffold } }            # goal prose → coarse task-stubs
  refine:                             # D2: a real epic refine — get concrete
    steps:
      - { name: epic-plan-check, use: { type: agent, name: epic-plan-check } }     # check stubs/scope against the real code
      - { name: epic-decompose, use: { type: agent, name: epic-decompose } }       # work out OUTCOME task acceptance criteria per stub (acceptance_criteria)
      - { name: walk, use: { type: skill, name: walk }, involve: high-only }   # settle open questions with you
  build:                              # loop over task
    each: task                        # intrinsic — fixed per tier (epic→task), not configurable (docs only)
    stop:
      - 'an architectural boundary is crossed (a layer, the task dependency order, a contract)'
    retry_limit: 3
  wrap:
    steps:
      - { name: roll-up, use: { type: agent, name: epic-roll-up } }             # definition of done against epic.acceptance + retro

  fields:                             # data model of an epic (the _epic.yml)
    schema_version: int
    slug:           kebab
    title:          string
    status:         plan | drafted | refined | build | wrap | done   # D1: task-symmetric
    goal:           markdown          # the big goal in prose
    context:        { plan?, refine?, build?, wrap? }   # D1: prose trails like task
    acceptance:     list<{ id, text, status }>   # definition of done (epic level, coarse)
    questions:      list<{ id, text, priority, origin, status, answer?, source?, reasoning? }>
    tasks:          list<{ slug, goal, status, depends_on, acceptance_criteria? }>   # coarse stubs = loop queue
                                      #   status: pending | active | done | blocked  (queue marker, NOT the lifecycle)
                                      #   acceptance_criteria: D2 OUTCOME task acceptance criteria (epic-refine works them out)
                                      #   order = list position
    log:            list<{ at, kind, note }>   # kind: decision | reorder | learning | blocker
