# anchored.yml — minimal config example
#
# This is what most users want: stick with framework defaults for
# everything except one small tweak (here: switch implement methodology
# to BDD).
#
# Anything you don't declare uses the framework default
# (see plugin/references/default-config.yml for the full default file).

build:
  # Replaces the default implement agent's prose.
  # The agent reads this and uses BDD instead of the methodology-
  # agnostic default. Everything else (task-check, code-check, the
  # phase loop, all status transitions) still uses defaults.
  implement: |
    For each acceptance criterion in this phase, write a Gherkin
    scenario under features/. Then implement step-definitions under
    features/step_definitions/. Run `cucumber-js` to verify each
    scenario passes. Capture the scenario name + status as evidence
    for the corresponding AC via mcp__anchored__ac_evidence_set.

# That's it. ~8 lines for a complete methodology switch.
# Everything else uses framework defaults.
