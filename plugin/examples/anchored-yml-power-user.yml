# anchored.yml — power-user example
#
# Showcases the maximum customization surface available in V0.2:
#   - Custom phase fields (commit + coverage_pct + pr_url tracking)
#   - Step overrides (explore + refine + implement) with project-specific prose
#   - Fixed-agent extensions (task_check + code_check) with extra checks
#   - Custom steps (coverage, commit, create_pr, sync_jira)
#   - Feature index comment at file top for navigation

# ════════════════════════════════════════════════════════════════════════
# Features active in this project:
#   • commit       → task.phase.fields.commit       + build.commit step
#   • coverage_pct → task.phase.fields.coverage_pct + build.coverage step
#   • pr_url       → task.phase.fields.pr_url       + wrap.create_pr step
#   • jira_sync    → wrap.sync_jira step (no schema field; slug = jira id)
# ════════════════════════════════════════════════════════════════════════

task:
  phase:
    fields:
      - { name: commit, type: string }
      - { name: coverage_pct, type: number }
      - { name: pr_url, type: string }

plan:
  explore: |
    Replaces default explore prose. Focus discovery on src/services/
    and src/api/ first. Ignore generated/ and dist/ directories.
    Return paths + patterns + similar code as usual.

  # rules: uses default — anchored's rules agent

  refine: |
    Replaces default refine prose. Decompose into phases as usual,
    but write each AC from the user's perspective:
    "As a [role], I can [action] so that [outcome]".

build:
  implement: |
    Replaces default implement prose. Use TDD: write failing test
    first, implement, run tests, capture green via `pnpm test`.

  # Extends the fixed task-check agent's defaults:
  task_check: |
    Beyond default checks, also verify that the metadata fields in
    task.phase.fields are preserved on the phase block.

  # Extends the fixed code-check agent's defaults:
  code_check: |
    Beyond default checks, flag any new console.log calls as
    warn-severity findings. Also flag TODO comments without a
    referenced issue number.

  # Custom step: run coverage tool, write to phase field
  coverage: |
    Run `pnpm test --coverage --json > /tmp/cov.json`.
    Extract percentage from .total.lines.pct and store in
    $phase.field.coverage_pct via mcp__anchored__phase_field_set.

  # Custom step: auto-commit per phase
  commit: |
    After all checks pass:
      `git add -A`
      `git commit -m "feat($TASK_SLUG): $PHASE_NAME"`
    Store the resulting SHA in $phase.field.commit via
    mcp__anchored__phase_field_set.

wrap:
  # review: uses default (Claude Code's built-in /review skill)

  # Custom step: push branch and create PR, capture URL
  create_pr: |
    Run `git push -u origin HEAD`.
    Then `gh pr create --fill --body-file .anchored/pr-body.md`.
    Capture the PR URL from the gh output and store it in
    $phase.field.pr_url for each phase via phase.field.set
    (using each phase's slug).

  # summarize: uses default

  # Custom step: sync Jira ticket to done
  sync_jira: |
    Run `jira-cli transition $TASK_SLUG -t Done`.
    (Convention: task slug equals jira ticket ID, e.g. "PROJ-123".)
    On error, write a one-liner to ### Wrap noting the sync failed —
    don't block the task's done transition over a Jira hiccup.
