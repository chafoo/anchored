# yaml-language-server: $schema=https://raw.githubusercontent.com/chafoo/anchored/main/plugin/references/schema/epic.schema.json
schema_version: 2
slug: dogfood-fixings-3
title: Dogfood-Fixings 3 — communication + control + polish from the third rerun
status: plan
created: 2026-06-11
goal: |
  The third dogfood rerun ran end-to-end cleanly (fixed CLI + plugin
  v0.1.2). The 6-agent audit confirms: e9 is green, all dogfood-fixings-2 fixes
  (G1/D1/G2/D2/G5 + the evidence-honesty core value) hold in the field. What
  remains are communication + control refinements plus a few small polish findings
  from the audit:

    - H1: when planning, the AI narrates the framework mechanics instead of planning
      the ticket — the SKILL templates themselves teach this machine voice.
    - H2: cryptic abbreviations + internal shorthand (e3, q4, a1, DAG, "AC") in chat;
      here too the template lines are the source.
    - H3: in the long epic run the user cannot decide up front which questions they
      answer themselves (richer choice including free conditions).
    - H4: a re-evidenced done acceptance criterion keeps a stale failures entry (no reset
      on the done flip, no clear-failures verb).
    - H5: multi-line context trails are written with literal \n → unreadable.
    - H6-H8: evidence line numbers go stale after a sibling edit; epic done without
      epic-own integration acceptance; outcome acceptance criteria sometimes bake in mechanism.

  Source: .claude/temp/dogfood-findings-3.md (H1-H8). H1/H2/H3 are pure
  skill prose; H4/H5 small substrate fixes; H6-H8 instruction/agent prose.
  Closing evidence: the next rerun shows partner voice + question policy + the
  polish live.
acceptance:
  - id: e1
    text: "When planning/orchestrating the chat no longer narrates framework mechanics — the SKILL finish/progress lines are rewritten too (no discover/scaffold/stubs/dependency order, no raw slug); partner voice, only outcome + decision (H1)"
    status: done
  - id: e2
    text: "No cryptic abbreviations in user text — including the SKILL templates themselves: build finish without a status word, refine walk prompt without English enum tokens (X high/medium/low) + without internal style codes (high-together), 'AC' spelled out as acceptance criterion; build.stop string without 'DAG'; internal IDs only in the audit trail (H2)"
    status: done
  - id: e3
    text: "The epic refine asks once which questions the user answers themselves in the child refines — by importance / all AI / all user / free description with conditions; steers all child refines; per question the AI evaluates the conditions; build asks if refine was skipped; ephemeral; coexists with the fan-out (H3)"
    status: done
  - id: e4
    text: "A re-evidenced done acceptance criterion no longer carries a stale failures entry: the done flip clears failures atomically (addEvidence/addChildEvidence/setChildAcStatus); a clear-failures verb exists for the workaround; a test covers the redo→done path (H4)"
    status: done
  - id: e5
    text: "Multi-line context trails render readably: set-field normalizes literal \\n to real newlines before persist (or the writing agents write real newlines); test with \\n-bearing context (H5)"
    status: done
  - id: e6
    text: "Evidence prefers symbol/function anchors over raw line numbers (instruction of the evidence-authoring agents), so that sibling edits to shared files do not let the stored evidence go stale (H6)"
    status: done
  - id: e7
    text: "Epic decompose authors ≥1 epic-own integration acceptance when an epic has >1 task with a dependency edge (roll-up checks the whole, not just the sum); outcome acceptance criteria stay mechanism-free (no textContent/innerHTML in the stub acceptance criterion); roll-up uses the provenance format <task>/<phase> — delivered (H7/H8)"
    status: done
  - id: e8
    text: "The next dogfood rerun confirms live: partner voice (no mechanics narration, no abbreviations) + epic-wide question policy + the polish fixes take effect end-to-end"
    status: pending
questions:
  - id: q1
    text: |
      Where is the line for abbreviations (H2)? Some are commonly known
      (test, commit, file) and readable in plain text, others cryptic (e3, q4, DAG).
      Recommendation: forbidden = 1-2 letter codes + internal shorthand/IDs +
      unexplained jargon; allowed = commonly understandable words, a piece of
      jargon is fine if it is explained in plain text on first use.
    priority: medium
    origin: dogfood
    status: resolved
    source: user
    answer: "Line confirmed: forbidden = 1-2 letter codes + internal shorthand/IDs + unexplained jargon; allowed = commonly understandable words; a piece of jargon is fine if it is explained in plain text on first use."
  - id: q2
    text: |
      When is the question policy chosen — in refine or at build start (H3)?
      Recommendation: at build start (freshest choice right before the child loop).
    priority: medium
    origin: dogfood
    status: resolved
    source: user
    answer: "Like with the task: the question policy / the walk is chosen in REFINE and the questions decided there. If refine was skipped and questions are still open, build (pre-build walk) asks them. Applies to task AND epic — for the epic the policy is set in the epic refine and steers the child refines in the build loop."
  - id: q3
    text: |
      Does the free description with conditions also apply to a single
      task refine, or only to epics (H3)?
      Recommendation: offer it everywhere — the free description can do strictly more.
    priority: medium
    origin: dogfood
    status: resolved
    source: user
    answer: "Epic only. For a single task it is already clear: the build stop-conditions (carried over from v1 — build.stop + stop-check, confirmed present) give control over build-time decisions, the normal walk-style gives control over refine questions. The free description with conditions is only the epic level (question routing for the child refines)."
  - id: q4
    text: |
      How are the freely described conditions evaluated (H3)?
      Recommendation: the AI judges each question against the description (applies /
      does not apply) — no rigid pattern matching.
    priority: low
    origin: dogfood
    status: resolved
    source: user
    answer: "The AI judges each question against the user's free description (reads condition + question, decides whether it applies) — no rigid pattern matching."
tasks:
  - slug: plan-voice-no-mechanics
    goal: |
      H1 (+ audit sharpening): when planning/orchestrating no longer narrate framework
      mechanics — AND rewrite the SKILL templates themselves that teach this voice.
      Pure skill prose: communication-style reference + the avoid/prefer tables of the
      plan/refine/build skills get the rule; plan the ticket as a pair programmer,
      only outcome + real decision into the chat; NO step names
      (discover/scaffold/walk), no task stubs/dependency order, no
      raw slug, no "I'm running the two plan steps". Concretely defuse the template
      lines found by the audit (e.g. the progress/finish lines
      that name mechanics). The tool calls are visible and accompany themselves.
      + grep test.
    status: done
    depends_on: []
  - slug: no-cryptic-abbreviations
    goal: |
      H2 (+ audit sharpening): no cryptic abbreviations in user text — the
      SKILL templates THEMSELVES are the main source. Policy in communication-style +
      cross-reference in question-style; PLUS fix the concrete template lines:
      build/SKILL.md finish line without a status word ("Status: wrap" out);
      refine/SKILL.md walk prompt without English enum tokens ("X high, Y medium, Z
      low" → "X important, Y medium, Z minor") and without internal style codes
      ("(high-together)" etc. only internal, not in the label); spell out "AC"/"ACs" as
      acceptance criterion/criteria; the build.stop config string (epic) without "DAG". 1-2 letter codes (e3,
      q4, a1) + internal IDs stay in the audit trail, not in chat. Line: see q1.
      + grep test.
    status: done
    depends_on: []
  - slug: epic-question-policy
    goal: |
      H3: the walk-style becomes a question-handling policy with a free description
      — ONLY at the epic level (q3). Pure skill prose (ephemeral, no schema). The
      EPIC REFINE asks ONCE (q2: choose in refine, like with the task) which
      questions the user answers themselves in the child task refines — by importance
      (only important / important+medium / all), all-AI, all-user, or a
      FREE DESCRIPTION with conditions ("ask me about anything on persistence or
      language, decide the rest yourself"). The policy steers all child refines in the
      build loop (no asking again per child). Per child question the AI judges
      the policy (condition applies → ask user, otherwise AI with rationale; q4).
      If refine was skipped + questions open → build asks (q2). Coexists
      with the buffered fan-out (q8 from fixings-2). Concerns: refine skill (choice in
      the epic refine), build skill (loop applies + pre-build fallback),
      communication-style/question-style. + grep test.
    status: done
    depends_on: [plan-voice-no-mechanics, no-cryptic-abbreviations]
  - slug: failures-reset-on-done
    goal: |
      H4 (substrate): a re-evidenced done acceptance criterion must no longer carry a stale failures
      entry. The done flip clears failures atomically — in addEvidence
      (node-ops.ts:341) + addChildEvidence (:230) + the done branch of
      setChildAcStatus (:289): on the transition to status done empty/drop failures
      ({...a, evidence, failures: [], status: 'done'}). Plus a clear-failures verb
      (CLI + facade + node-ops), which closes the UnknownNodeVerb workaround seen in the run.
      The rejection stays preserved in log[] as history, not in the
      live failures slot. Tests: redo loop re-evidenced → acceptance criterion done WITHOUT failures;
      clear-failures verb green. All 5 gates.
    status: done
    depends_on: []
  - slug: set-field-newline-normalize
    goal: |
      H5 (substrate): multi-line context trails should render readably. Today the
      roll-up wrote context.wrap with literal \n instead of real newlines → one
      unreadable line. Fix: set-field/setField normalizes literal \n sequences to
      real newlines before persist (then the block scalar in the renderer takes effect);
      applies to the context.* fields. Test: set-field of a context value with
      literal \n → read-back has real newlines + renders as a block scalar. All 5
      gates.
    status: done
    depends_on: []
  - slug: epic-decompose-quality
    goal: |
      H7+H8 (agent prose): sharpen epic-decompose + epic-roll-up. (a) epic-decompose
      authors ≥1 EPIC-OWN integration acceptance (epic.acceptance) when an epic
      has >1 task with a dependency edge — so the roll-up checks the interplay,
      not just the sum of the per-task outcome acceptance criteria. (b) Outcome acceptance criteria stay
      mechanism-free: no "textContent/innerHTML" etc. in the stub acceptance criterion (that rule
      belongs in dom.md/child-rules-check) — tighten the instruction in epic-decompose.md
      + a negative example. (c) epic-roll-up uses the prescribed
      provenance format "<task>/<phase> <ac> — delivered" instead of raw file:line.
      + grep test.
    status: done
    depends_on: []
  - slug: evidence-symbol-anchors
    goal: |
      H6 (instruction): evidence-authoring agents (build-implement, the validators,
      epic-roll-up) prefer symbol/function anchors ("saveTasks() in app.js")
      over raw line numbers ("app.js:110-112") — so that a sibling task that
      later edits the same file does not let the stored evidence go stale
      (in the run core-lists line numbers slipped ~20 lines). Instruction in the
      agent files + agent-contract; line number allowed as an optional addition, but
      the function/symbol anchor leads. + grep test.
    status: done
    depends_on: []
  - slug: restore-anchored-test-scaffold
    goal: |
      Operational prep step (no framework code) — the LAST step before the
      e8 rerun: reset anchored-test (~/Dev/anchored-test) to the clean
      scaffold starting state, so the rerun tests from scratch. As with
      the previous reruns: tracked files back to HEAD (app.js → 8-line
      stub, index.html/style.css/anchored.yml), remove the generated task files under
      .claude/tasks/ (preserve only _archive), keep EPIC.md + .claude/
      settings.json (plugin install). Plugin + CLI are fresh anyway via npm-link/
      reinstall. After that anchored-test is ready to go for /a:plan epic.
      Depends on all fix tasks (build first, then reset).
    status: done
    depends_on: [plan-voice-no-mechanics, no-cryptic-abbreviations, epic-question-policy, failures-reset-on-done, set-field-newline-normalize, epic-decompose-quality, evidence-symbol-anchors]
