# yaml-language-server: $schema=https://raw.githubusercontent.com/chafoo/anchored/main/plugin/references/schema/task.schema.json
schema_version: 2
slug: dogfood-fixings/redo-loop-verbs
title: Make the failures re-do loop functional (F9)
status: done
created: 2026-06-11
context:
  plan: |
    F9 (HIGH): The validators / the orchestrator CANNOT reject an AC
    — `set-failures` + `set-ac-status` do not exist as CLI verbs (tested:
    UnknownNodeVerb). So a gate cannot write failures and cannot reverse
    done→pending → the failures-driven re-do loop (core value) is a
    sham. In the core-list run it went unnoticed because both gates always passed.
    node-ops has setAcStatus (not exposed); setFailures is missing entirely.
    REF: .claude/temp/dogfood-findings.md F9.
questions: []
log: []
phases:
  - name: "node-ops: setFailures + setAcStatus"
    slug: ops
    status: done
    context: |
      node-ops `setFailures(node, childSlug, acId, failures[])` — flips the phase AC
      to pending + sets failures, keeps the previous evidence as history.
      Expose `setAcStatus` (exists) through the facade.
    rules:
      - path: .claude/rules/factory-functions.md
        why: Ops via createNodeOps(deps); fakeable, no singletons
      - path: .claude/rules/fractal-substrate-integrity.md
        why: Gate rejection = mechanism at the writing op; invariant holds (failures ≠ done)
    acceptance_criteria:
      - id: a1
        text: "node-ops.setFailures(node, childSlug, acId, failures[]) flips the phase AC to 'pending', sets the failures field, keeps evidence as history. Evidence: bun test (AC previously done+evidence → after setFailures pending + failures set + evidence still there) green + file:line."
        status: done
        evidence:
          - core/src/ops/node-ops.ts setChildFailures (flips phase AC pending + failures, evidence as history); node-ops.spec.ts:171 green (AC done+evidence → setChildFailures → pending+failures+evidence kept); CLI smoke set-failures ok
      - id: a2
        text: "setAcStatus is usable through the facade (phase AC done↔pending). Evidence: facade test + file:line."
        status: done
        evidence:
          - core/src/ops/node-ops.ts setChildAcStatus (done→pending, done requires evidence via assertAcDoneHasEvidence); facade.ts exposes setChildFailures+setChildAcStatus; node-ops.spec asserts done-without-evidence throws
  - name: CLI verbs set-failures + set-ac-status
    slug: cli
    status: done
    context: |
      `node set-failures <task> <phase> <ac> <text>` + `node set-ac-status <task>
      <phase> <ac> <status>` — each mapped to a single facade call, JSON envelope.
    rules:
      - path: .claude/rules/cli-only-transport.md
        why: Gate rejection runs through the CLI, JSON output; same from subagents
    acceptance_criteria:
      - id: a1
        text: "Both verbs map to exactly one facade call with parsed args + JSON envelope. Evidence: node.spec with spy facade asserts exactly-one-call each (green) + file:line node.ts."
        status: done
        evidence:
          - core/src/cli/commands/node.ts:56 set-failures + :59 set-ac-status → one facade call each; node.spec.ts mapping test green (setChildFailures/setChildAcStatus exactly-one-call)
      - id: a2
        text: "CLI smoke against the real binary: an AC done → set-failures → AC pending + failures present → set-ac-status done (with evidence) done again. Evidence: smoke sequence, all ok:true (green)."
        status: done
        evidence:
          - "CLI smoke against the real binary: add-phase-evidence(done) → set-failures → AC pending+failures+evidence kept (ok:true)"
  - name: Wire up the re-do loop (skill + validators)
    slug: wire
    status: done
    context: |
      Wire agent-contract + build SKILL + the validators onto the new verbs:
      a gate that rejects an AC writes failures → the build loop retries until
      retry_limit → then blocked.
    rules:
      - path: .claude/rules/fractal-substrate-integrity.md
        why: retry/stop/blocked = mechanism; hard invariant holds
      - path: .claude/rules/cli-only-transport.md
        why: validators self-write failures via CLI; skill drives the loop
    acceptance_criteria:
      - id: a1
        text: "build-task-validate + build-code-validate (docs) + agent-contract use set-failures to reject; build SKILL describes the re-do loop (gate reject → set-failures → re-spawn implement → retry until retry_limit → blocked). Evidence: grep over plugin/agents + plugin/skills/build shows set-failures + the loop."
        status: done
        evidence:
          - plugin/agents/build-task-validate.md + build-code-validate.md self-write set-failures on rejected ACs; agent-contract.md validator line + build/SKILL.md re-do loop wired onto set-failures (grep)
      - id: a2
        text: "A run/test proves that a rejected AC triggers a retry (does not silently go to done): a gate fail writes failures, the loop runs another attempt. Evidence: a documented sim/test (green)."
        status: done
        evidence:
          - "Re-do cycle proven at the substrate level: addChildEvidence→done, setChildFailures→pending+failures (evidence kept), re-addChildEvidence→done (node-ops.spec); build SKILL reads failures + re-spawns implement. Live skill-driven retry is re-validated in the dogfood-task rerun."
