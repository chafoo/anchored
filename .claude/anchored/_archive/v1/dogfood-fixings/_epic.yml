  - at: dogfood-fixings
    kind: learning
    note: "context-polish DONE (F2/F3/F4/F6): context.plan/refine via set-field, created via clock seam (epic schema +created), list-phases verb, F6 quirk categorized. 171 tests green. ALL 8 TASKS DONE. Only e6 open (dogfood reruns live in anchored-test) = handoff."
