# yaml-language-server: $schema=https://raw.githubusercontent.com/chafoo/anchored/main/plugin/references/schema/epic.schema.json
schema_version: 2
slug: dogfood-fixings
title: Dogfood-Fixings — fix the 14 findings from the live runs
status: plan
goal: |
  The real dogfood runs (skill-orchestrated runtime against ~/Dev/anchored-test:
  /a:plan→refine→build→wrap on core-list green; /a:plan epic failed) uncovered 14
  real defects that the engine/unit tests had masked — among them
  three that touch the core guarantees. This epic fixes them, so that anchored v2
  fulfills its promises THROUGH THE REAL CLI:

    - integrity structurally enforced (not just convention)
    - the failures-driven re-do loop actually works
    - the epic tier (the headline feature e5) runs through the CLI
    - every AI decision lands in the decision trail
    - the proven walk-style (high-user sweet spot) is back

  Source of all findings + root cause + fix idea + file:line:
  `.claude/temp/dogfood-findings.md` (F1–F14). After the fix both dogfoods
  (task + epic) run cleanly through — that is the closing evidence.
acceptance:
  - id: e1
    text: "Enforcement structural: a raw Write/Edit on a task-file fails (hook); every task-file mutation MUST go through the CLI (F8)"
    status: done
  - id: e2
    text: "Re-do loop works end-to-end: a gate can reject an AC (write failures, done→pending), the loop retries until retry_limit, then blocked (F9)"
    status: done
  - id: e3
    text: "Epic tier drivable through the CLI: `anchored plan epic` seeds an epic-shaped node, scaffold writes task stubs (add-child) with dependency order, build loops them — the anchored-test epic run goes green (F13/F14)"
    status: done
  - id: e4
    text: "Decision trail complete: resolve-question stores reasoning, build spawns stop-check + documents emergent decisions, build-notes with at=build (F7/F10)"
    status: done
  - id: e5
    text: "Walk-style back: user chooses before the Q&A walk (all-AI / all-user / high-user); rules-check coverage gaps become auto-fix instead of a user question (F12/F5)"
    status: done
  - id: e6
    text: "Both dogfood reruns green: core-list (task) + the feature epic (epic) run end-to-end through the fixed CLI; invariant holds for real"
    status: pending
questions:
  - id: q1
    text: "F13 tier derivation: how does the CLI know the tier of a slug? (a) on read from the file shape (tasks[]→epic, phases[]→task) + create gets an explicit tier param that seeds the shape; (b) a persistent `tier` field in the file; (c) slug/path convention (_epic.yml vs <slug>.yml). Recommendation: (a) — the file shape is the SSOT, create seeds it."
    priority: high
    origin: dogfood
    status: resolved
    source: user
    answer: "File shape as SSOT: read derives the tier from tasks[]/phases[]; create gets an explicit tier param that seeds the shape (epic→tasks:[], status planning)."
  - id: q2
    text: "F8 hook behavior: hard deny or warn+confirm? Scope only `.claude/tasks/**/*.yml` (+ _epic.yml)? AND: does the hook also apply to the MAIN session (which edits manually during the plan/design phase, like we are now) or only to subagents/build operation? (Manual editing during planning should stay possible.)"
    priority: high
    origin: dogfood
    status: resolved
    source: user
    answer: Hook only in the build/agent context (subagents/build operation) hard-denies on .claude/tasks/**/*.yml + _epic.yml; main-session planning stays free.
  - id: q3
    text: "F2 context vs log: the prose trails (plan/refine/build notes, gate rollups) — officially populate them in context.plan/refine/build (set-field dotted-path), OR deliberately switch to log[] + align wrap/docs? (Currently everything lands in the log, context stays empty.)"
    priority: medium
    origin: dogfood
    status: resolved
    source: user
    answer: Populate context.plan/refine/build via set-field (dotted-path) like v1; log[] stays the append-only PM notebook.
  - id: q4
    text: "F11 workflow architecture: keep the engine workflowLoop (loop-workflow.ts) (headless path) OR remove it and move the fan-out entirely into the build skill (Workflow tool), analogous to the sequential loop? One is redundant."
    priority: medium
    origin: dogfood
    status: resolved
    source: user
    answer: Workflow fan-out entirely into the build skill (Workflow tool), consistent with the sequential loop; remove the engine workflowLoop / reduce it to reference.
  - id: q5
    text: "F12 walk-style: confirm the default — high-user as the default suggestion? Exact option texts/order in the AskUserQuestion? Should it be silently skipped at 0 questions (yes)?"
    priority: medium
    origin: dogfood
    status: resolved
    source: ai
    answer: "Walk-style options: all-together / high-together (default) / AI-all; high-user = default suggestion; silently skip at 0 open questions. (Recommendation — user can override.)"
    reasoning: "Dogfood fix planning 2026-06-11: sensible default, proven or minimally invasive; overridable by the user."
  - id: q6
    text: "F3 created field: set it on create via the injected clock seam (bin supplies the real time), OR take it from the schema/expectation? (Date.now is forbidden in the engine code.)"
    priority: low
    origin: dogfood
    status: resolved
    source: ai
    answer: Set created on create via the injected clock seam (bin supplies the real time, no Date.now in the engine code); the field stays in the schema. (Recommendation.)
    reasoning: "Dogfood fix planning 2026-06-11: sensible default, proven or minimally invasive; overridable by the user."
tasks:
  - slug: enforcement-hook
    goal: "F8 (HIGH): PreToolUse hook in the plugin that blocks Write/Edit on task-files (.claude/tasks/**/*.yml + _epic.yml) → CLI-only structurally enforced. Hook in plugin/hooks/ + plugin.json registration. Scope/behavior see q2."
    status: done
    depends_on: []
  - slug: redo-loop-verbs
    goal: "F9 (HIGH): node-ops setFailures(node,phase,ac,failures[]) (flips AC pending+failures, evidence as history) + expose setAcStatus; CLI verbs set-failures + set-ac-status; wire agent-contract + build skill + validators onto it → re-do loop works."
    status: done
    depends_on: []
  - slug: epic-tier-cli
    goal: "F13 (HIGH) + F14: make the epic tier drivable through the CLI — create gets an explicit tier param (seeds epic shape tasks:[]/epic descriptor/status planning), planCommand passes the tier through; tierForSlug derived for real (file shape, see q1); read determines the tier from file content; slug trailing-dash fix (slice→strip order); clean up duplicate nodes in anchored-test."
    status: done
    depends_on: []
  - slug: decision-trail
    goal: "F7 + F10: resolve-question gets a reasoning arg + invariant (source=ai ⇒ reasoning); build skill spawns stop-check for self-reported decisions + documents proceed decisions (append-log decision / resolve-question), stop→walk; build-implement writes build-notes with at=build."
    status: done
    depends_on: []
  - slug: walk-style
    goal: "F12 + F5: refine skill (+ build pre-walk) offers the walk-style choice before the Q&A walk (all-AI / all-user / high-user, ephemeral); rules-check coverage gaps become auto-fix (add-ac) instead of a user question — user questions only for architecture/code."
    status: done
    depends_on: []
  - slug: phase-rules
    goal: "F1: node-ops + facade + CLI verb set-phase-rules <task> <phase> <path> <why> (append); wire plan-decompose + refine onto it, so that phases carry a real rules field (instead of just in the log)."
    status: done
    depends_on: []
  - slug: workflow-skill-path
    goal: "F11: wire the workflow fan-out into the build skill (Workflow tool, not-yet-evidenced units in parallel, collect via task-file evidence, gates once over merged) + live test (one phase executor=workflow); decide the engine workflowLoop redundancy (q4)."
    status: done
    depends_on:
      - redo-loop-verbs
  - slug: context-polish
    goal: "F2 + F3 + F4 + F6: implement the context-fields decision (q3); created field (q6); node list-phases convenience verb (or settle the docs on read); observe/clarify the refine trigger quirk (Unknown command)."
    status: done
    depends_on: []
