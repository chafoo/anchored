  - at: dogfood-fixings
    kind: decision
    note: "Open questions resolved (2026-06-11): q1 tier from file shape + explicit create tier param · q2 hook only build/agent context · q3 populate context.* (v1 style) · q4 workflow entirely into the skill (engine loop gone) · q5 walk-style high-user default · q6 created via clock seam. q1-q4 user, q5/q6 AI recommendation (overridable)."
  - at: dogfood-fixings
    kind: learning
    note: "redo-loop-verbs DONE (F9): node-ops setChildFailures/setChildAcStatus + CLI set-failures/set-ac-status + validators/skill wired. Gates can now reject ACs → re-do loop works. 162 tests green. e2 met."
  - at: dogfood-fixings
    kind: learning
    note: "epic-tier-cli DONE (F13+F14): tier-aware create (epic→tasks:[]), file-shape tier derivation (tier-derive.ts), slug fix, goal optional. Epic tier now runs end-to-end through the CLI (plan epic→add-child→next-child→loop). 168 tests green. e3 met. Unblocks dogfood-epic + the autonomous /a:build run of this epic."
  - at: dogfood-fixings
    kind: learning
    note: "enforcement-hook DONE (F8): PreToolUse hook (plugin/hooks/block-task-file-edits.js) blocks raw Write/Edit on task-files (exit 2), allows source code, escape ANCHORED_TASKFILE_EDIT=1 for planning. Decision logic proven via piped tests. HANDOFF: confirm the live plugin fire in anchored-test after /reload-plugins (a raw agent Write gets blocked). e1 met. ALL 3 HIGH fixes through."
  - at: dogfood-fixings
    kind: learning
    note: "decision-trail DONE (F7+F10): resolve-question reasoning arg + invariant (source=ai⇒reasoning, MissingReasoning); build SKILL emergent-decision flow (stop-check inline + document via resolve-question/add-question); build-implement build-notes at=build. 169 tests green. e4 met. 4/8 done."
  - at: dogfood-fixings
    kind: learning
    note: "walk-style DONE (F12+F5): refine+build offer the walk-style choice (high-together default / all / AI), 0 questions→skip; refine-rules-check turns coverage gaps into auto-fix (add-ac+set-phase-rules) instead of a user question. e5 met. 5/8 done."
  - at: dogfood-fixings
    kind: learning
    note: "phase-rules DONE (F1): node-ops setPhaseRules + CLI set-phase-rules verb (dedup by path); plan-decompose + refine-rules-check wired → phases now carry real rules (not just in the log). 170 tests green. 6/8 done."
  - at: dogfood-fixings
