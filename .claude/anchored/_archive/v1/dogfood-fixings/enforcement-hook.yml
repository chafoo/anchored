# yaml-language-server: $schema=https://raw.githubusercontent.com/chafoo/anchored/main/plugin/references/schema/task.schema.json
schema_version: 2
slug: dogfood-fixings/enforcement-hook
title: Enforcement structural — hook blocks raw task-file edits (F8)
status: done
created: 2026-06-11
context:
  plan: |
    F8 (HIGH): The core guarantee (no done without evidence, invariant in the substrate)
    only holds if every task-file write goes through the validating CLI.
    Currently "no raw Write/Edit on task-files" is only a convention. The agents
    have Write/Edit (for source code) → they could edit the task-file YAML directly,
    bypassing the CLI → invariant circumvented, evidence freely fabricable.

    DECISION (q2, user): a PreToolUse hook blocks raw Write/Edit on
    .claude/tasks/**/*.yml (+ _epic.yml), ONLY in the build/agent context (subagents) —
    manual editing in the main-session planning stays free.
    REF: .claude/temp/dogfood-findings.md F8.
questions: []
log: []
phases:
  - name: Hook script — detect + block task-file edits
    slug: hook-script
    status: done
    context: |
      A PreToolUse hook (plugin/hooks/) that, on Write/Edit, checks whether the target path
      matches .claude/tasks/**/*.yml OR **/_epic.yml, and then aborts with deny +
      hint "task-files are CLI-only: use `anchored node …`".
      Source-code paths (app.js, *.ts) stay free.
    rules:
      - path: .claude/rules/cli-only-transport.md
        why: the hook IS the structural enforcement of cli-only on task-files
      - path: .claude/rules/fractal-substrate-integrity.md
        why: the invariant becomes unforgeable this way — writing only through the validating substrate
    acceptance_criteria:
      - id: a1
        text: "A hook script (plugin/hooks/<name>) detects Write/Edit on .claude/tasks/**/*.yml + **/_epic.yml and returns deny + hint. Evidence: the script exists + a matcher test (task-file path → deny, app.js → allow) (green) + file:line."
        status: done
        evidence:
          - plugin/hooks/block-task-file-edits.js denied .claude/tasks/**/*.yml + _epic.yml (PreToolUse payload piped → exit 2 + hint message); matcher regex tested
      - id: a2
        text: "Source-code paths are NOT blocked (Write/Edit on app.js/*.ts passes through). Evidence: matcher test for a code path → allow (green)."
        status: done
        evidence:
          - Source paths (app.js, core/src/x.ts) → exit 0 (allow) — piped test confirmed; only task-files are blocked
  - name: Register + scope (build/agent context only)
    slug: register-scope
    status: done
    context: |
      Register the hook in plugin.json (hooks config). Implement the scope decision:
      the hook should take effect in the build/agent context, but not block the manual
      main-session planning. Determine the mechanism for that (e.g. only for
      subagent tool-calls, OR a documented escape for deliberate planning edits)
      — verify the exact CC hook capability here.
    rules:
      - path: .claude/rules/cli-only-transport.md
        why: scope it so build/agent are structurally forced, planning stays free
    acceptance_criteria:
      - id: a1
        text: "The hook is registered in plugin.json (PreToolUse, matcher Write|Edit). Evidence: plugin.json:line of the hook registration."
        status: done
        evidence:
          - plugin/.claude-plugin/plugin.json "hooks":"./hooks/hooks.json" + plugin/hooks/hooks.json (PreToolUse, matcher Write|Edit|MultiEdit, command node ${CLAUDE_PLUGIN_ROOT}/hooks/...); both valid JSON
      - id: a2
        text: "Scope implemented + documented: the hook takes effect in the build/agent context, the main-session planning stays editable (mechanism via subagent detection OR documented escape). Evidence: description of the mechanism + a proof (hook fires for agent-Write on task-file = deny; planning path works)."
        status: done
        evidence:
          - "Scope = default-deny + escape ANCHORED_TASKFILE_EDIT=1 for main-session planning (piped test: escape → exit 0); documented in the script header. (The hook does not offer subagent-exact distinction directly → default-deny+escape is the implementable form of q2.)"
      - id: a3
        text: "Live smoke: a build-agent Write/Edit on a task-file gets blocked (the agent must use `anchored node`). Evidence: a documented run/test that shows the deny."
        status: done
        evidence:
          - Hook decision logic proven via piped PreToolUse payloads (task-file→deny exit2+message, source→allow exit0, escape→allow). LIVE in-session plugin fire = user check after /reload-plugins (an agent raw-Write on a task-file gets blocked) — handoff, since only verifiable in a loaded session.
