# yaml-language-server: $schema=https://raw.githubusercontent.com/chafoo/anchored/main/plugin/references/schema/task.schema.json
schema_version: 2
slug: dogfood-fixings/epic-tier-cli
title: Make the epic tier drivable through the CLI (F13 + F14)
status: done
created: 2026-06-11
context:
  plan: |
    F13 (HIGH): The epic tier (e5, headline feature) does NOT run through the real CLI.
    `anchored plan epic` does not pass the tier to create (plan.ts:49), and all ops
    take the tier from `tierForSlug`, which defaults to 'task' (index.ts:82/137) →
    the epic node gets created + read as a task, add-child/next-child over tasks
    never route to the epic descriptor. During dogfooding scaffold therefore fell back
    to add-phase → the "epic" became a task with 4 phase stubs.
    F14 (medium): slugFromInput strips dashes BEFORE the slice(0,48) → the cut can
    leave a trailing dash → schema regex rejects it → duplicate node.

    DECISION (q1, user): file shape is the SSOT — read derives the tier from the
    content (tasks[]→epic, phases[]→task), create receives an EXPLICIT
    tier param that seeds the shape.
    REF: .claude/temp/dogfood-findings.md F13/F14.
questions: []
log: []
phases:
  - name: Tier-aware create — seed the shape per tier
    slug: tier-aware-create
    status: done
    context: |
      Rework facade.create + planCommand so that the tier is passed through explicitly
      and create produces the right shape: epic → { tasks: [], status:
      planning }, task → { phase-capable, status plan }, phase → leaf. No more
      task default.
    rules:
      - path: .claude/rules/factory-functions.md
        why: create via injected deps; tier param as input/output contract; fakeable
      - path: .claude/rules/cli-only-transport.md
        why: create runs through the CLI/facade, JSON output
    acceptance_criteria:
      - id: a1
        text: "facade.create accepts an explicit tier param and seeds the tier shape: epic → tasks:[] + status 'planning' + epic descriptor, task → status 'plan', phase → leaf. Evidence: facade test that for tier='epic' asserts a node with tasks:[] + status planning, for 'task' without tasks (green) + file:line."
        status: done
        evidence:
          - core/src/ops/facade.ts create takes an explicit tier param, seeds epic→tasks:[]+status planning; epic-tier.spec "plan epic seeds epic-shaped node" green
      - id: a2
        text: "planCommand passes the parsed tier through to create (epic plan → epic node). Evidence: plan.spec/CLI test that runs `plan epic <x>` and asserts a node with tasks:[] (epic shape), NOT phases/task (green) + file:line plan.ts."
        status: done
        evidence:
          - core/src/cli/commands/plan.ts:49 planCommand passes tier through to create (create(slug,{title,tier})); epic-tier.spec evidences epic shape
  - name: Tier derivation on read from the file shape
    slug: tier-derivation
    status: done
    context: |
      Have tierForSlug/read determine the tier from the file content (tasks[]→epic,
      phases[]→task, otherwise by schema/default), so that read + all mutations use the
      right descriptor. add-child (task stub) + next-child (loop over tasks)
      must work on an epic.
    rules:
      - path: .claude/rules/fractal-substrate-integrity.md
        why: tier mechanics = mechanism; file shape is the SSOT, no default guessing
      - path: .claude/rules/cli-only-transport.md
        why: all ops through the CLI with correct tier routing
    acceptance_criteria:
      - id: a1
        text: "read determines the tier from the file content (tasks[]→epic, phases[]→task) instead of from a 'task' default; an epic node gets read as an epic + the ops route to the epic descriptor. Evidence: test that reads an epic file and asserts tier='epic' + epic descriptor (childField 'tasks') (green) + file:line."
        status: done
        evidence:
          - core/src/ops/tier-derive.ts makeTierFor derives tier from file content (tasks[]→epic, phases[]→task, ACs without schema_version→phase); index.ts wires it as facade.tierFor; epic-tier.spec "makeTierFor derives tier" green
      - id: a2
        text: "add-child writes a task stub onto an epic (childField tasks), next-child loops the tasks in dependency order. Evidence: CLI smoke against the real binary: create epic → add-child ×2 (with depends_on) → next-child returns them in dependency order; all ok:true + file:line."
        status: done
        evidence:
          - add-child writes a task stub onto the epic (epic descriptor childField tasks), next-child loops; epic-tier.spec "epic round-trip" green (t1→t2 after done); CLI smoke against binary ok
  - name: Slug trailing-dash fix + duplicate cleanup
    slug: slug-fix-cleanup
    status: done
    context: |
      slugFromInput: first slice(0,48), THEN strip — no more trailing dash.
      Plus: clean up the two duplicate epic files in anchored-test.
    rules:
      - path: .claude/rules/cli-only-transport.md
        why: the slug must be schema-valid, otherwise the verbs refuse to read/write
    acceptance_criteria:
      - id: a1
        text: "slugFromInput no longer produces a trailing dash for long titles (slice→strip order). Evidence: unit test with a >48-character title whose 48th character is in the middle of a word → slug matches ^[a-z0-9]+(?:-[a-z0-9]+)*$ (green) + file:line plan.ts."
        status: done
        evidence:
          - core/src/cli/commands/plan.ts slugFromInput slice→strip order; epic-tier.spec "slug has no trailing dash" green
      - id: a2
        text: "The duplicate epic files in ~/Dev/anchored-test (…-vorhandenes-.yml + …-vorhandenes.yml) are cleaned up (deleted/archived). Evidence: ls shows no more trailing-dash duplicates."
        status: done
        evidence:
          - anchored-test duplicate epic files (…-vorhandenes-.yml + …-vorhandenes.yml) moved to .claude/tasks/_archive/
  - name: Epic e2e through the CLI (the proof)
    slug: epic-e2e
    status: done
    context: |
      The end-to-end proof: the whole epic flow runs through the real CLI —
      plan epic → scaffold add-child stubs (dependency order) → next-child loops → roll-up.
      This is e3 of the epic + unblocks dogfood-epic.
    rules:
      - path: .claude/rules/fractal-substrate-integrity.md
        why: epic = full tier, build.each:task intrinsic
      - path: .claude/rules/tooling-quality-gates.md
        why: only green once the epic roundtrip runs cleanly through the CLI + tests green
    acceptance_criteria:
      - id: a1
        text: "A CLI epic roundtrip is green: `anchored plan epic <x>` seeds an epic node (tasks:[]), add-child ×N with depends_on, next-child returns the stubs in dependency order, set-child-status advances them. Evidence: an e2e spec OR a documented CLI smoke against the binary, all steps ok:true (green) + the 5 quality gates green."
        status: done
        evidence:
          - "Epic roundtrip through the real CLI green: plan epic→epic shape, read→epic, add-child×2, next-child dependency order (t1→t2), set-child-status advance; epic-tier.spec 5 tests + 168 tests total + 5 gates green"
