# yaml-language-server: $schema=https://raw.githubusercontent.com/chafoo/anchored/main/plugin/references/schema/task.schema.json
schema_version: 2
slug: anchored-v2-core/workflow-mode
title: Workflow mode — Claude-Code-Dynamic-Workflow as fan-out executor
status: done
created: 2026-06-11
context:
  plan: |
    SCOPE: make anchored v2 workflow-capable from the start — the build loop can
    run as a Claude-Code-Dynamic-Workflow fan-out instead of sequential-interleaved
    (≤16 parallel, 1000 total), each unit do+verify, self-write via CLI. User:
    "really important — we want to be able to use Workflow."

    This task CARRIES the orchestration; the seam/hooks for it already arise in
    01 (reserved `executor` field), 05 (spawn workflow-capable), 06 (loop-step
    WORKFLOW mode), 10 (agents as self-write workers / Workflow agentType).

    Delivers:
      - `executor` op: `anchored phase set-executor <implement|workflow>` (reserved
        field, cannot be shadowed by custom fields).
      - Workflow orchestration in the loop-step: dispatches children (phases or tasks) as
        background workflow, collects resume-safe, then runs the wrap gates
        (task-/code-validate) once over the merged result.
      - Resume safety = task-file-EVIDENCE-driven (skip units whose acceptance criteria are already `done`)
        — NOT workflow-resume-dependent (resume only survives in-session).
      - Model "one anchored node = one workflow" (docs recommendation: one workflow
        per stage for sign-off between stages).
      - Allowlist precondition: `Bash(anchored *)` must be pre-approved, otherwise
        the background workflow hangs on the permission prompt (lazy-init, task integration-dogfood).

    DESIGN/REF: v1 predecessor ~/Dev/anchored/.claude/tasks/dynamic-workflow-executor.yml
    (per-phase executor, fan-out, evidence-via-CLI, background-only, resume-safe via
    task file) — as a CONCEPT reference, rewritten in the factory pattern. Workflow tool spec:
    background-only (no sync await), ≤16 parallel / 1000 total (fixed), CLI allowlist
    required. engine-architecture.md (spawn seam), [[full-build-no-mvp]].

    CORE (e9): build loop runs either sequential OR workflow-fanout; a real
    workflow smoke (one task with ≥2 phases via executor=workflow) is green.

    ROUGH PHASES: (1) reserved executor field + set-executor op · (2) loop-step
    background workflow dispatch + resume-safe evidence collect · (3) gates over
    merged result + stop/retry in the workflow path · (4) e2e workflow smoke (fan-out
    phases) green, comparison against sequential.
  build: |-
    Workflow mode built (4 phases, 17 acceptance criteria):
    - Phase 1 set-executor-op: setExecutor (enum-validated, atomic) + RESERVED_FIELDS guard in node-ops; CLI verb node set-executor; executor not shadowable via set-field.
    - Phase 2 dispatch-collect: new file engine/scope/loop-workflow.ts — selectWorker/isUnitComplete/partition + workflowLoop (background-dispatch ≤16, evidence-driven skip, collect from task-file state, merged result). WorkflowSeam type in step-runner.ts (dispatch/collect/gates).
    - Phase 3 gates-stop-retry: gates ONCE over merged, stopFlagged after collect → halt, retry until retry_limit (evidence-driven, green children skipped), gate-fail → failures on the child (invariant in the substrate untouched).
    - Phase 4 e2e-smoke: workflow-smoke.spec — real engine path with fake seam; 2-phase task executor=workflow green end-to-end (all acceptance criteria done+evidence, build→wrap); equivalence sequential↔workflow; allowlist precondition Bash(anchored *) documented in build/SKILL.md.
    Seam migration: deps.workflow switched from (childTier,children)=>AnyNode[] to a WorkflowSeam object; engine.ts/integration.spec a5 + loop-step.spec adjusted. SEQUENTIAL path unchanged.
    Gates: format+lint+typecheck green, bun test 139 pass/2 skip/0 fail, build (tsc -p tsconfig.build.json) green.
  wrap: "CORE e9 met: build loop runs either SEQUENTIAL or WORKFLOW-fanout; real workflow smoke (2-phase task, executor=workflow) green end-to-end. Orchestration fakeable behind injected WorkflowSeam — no real CC needed in test. Seam to integration-dogfood: Bash(anchored *) allowlist documented as a hard precondition."
questions: []
log:
  - at: workflow-mode
    kind: learning
    note: WorkflowSeam as dispatch/collect/gates object instead of a single function — cleanly separates background dispatch from evidence-driven collect; the whole fan-out mechanism is fakeable without a real Claude-Code workflow.
phases:
  - name: set-executor op + CLI verb (reserved, not shadowable)
    slug: set-executor-op
    status: done
    context: |
      First, orthogonal seam: the write path for the reserved `executor` field.
      Task tier-schemas declares the field on the phase descriptor (enum {implement,workflow},
      optional, NO injected default). Task ops-core delivers createNodeOps + the
      set-field/reserved mechanism. This phase adds:
        - a typed op `setExecutor(node, phaseRef, 'implement'|'workflow')`
          in node-ops (via the scope/ helpers) that sets the value on the target phase,
          validates the enum and writes atomic (no inserting a default when never
          set — preserve round-trip identity).
        - the guarantee that `executor` counts as RESERVED: a generic
          `set-field executor …` (custom field) is rejected, so a user field
          can't shadow the scheduling field.
        - the CLI verb `anchored node set-executor <slug> <phase> <implement|workflow>`
          in cli/commands/node.ts, mapped to exactly this one nodeOps call,
          with JSON envelope (ok:true/false) like the other node verbs.
      factory-functions: op via createNodeOps(tierSchema, deps), CLI command with
      injected deps.nodeOps — both fakeable. NO MCP, the only transport = CLI.
    rules:
      - path: .claude/rules/cli-only-transport.md
        why: executor mutation runs via the anchored CLI node verb, JSON output; same from main session + subagents
      - path: .claude/rules/factory-functions.md
        why: setExecutor as a nodeOps verb + set-executor command via injected deps; fakeable, no singletons
      - path: .claude/rules/fractal-substrate-integrity.md
        why: executor = reserved (mechanism/policy boundary); not shadowable by custom fields
    acceptance_criteria:
      - id: a1
        text: "createNodeOps carries `setExecutor(node, phaseRef, value)`: sets the executor field of the target phase and writes via io.atomicWrite; a non-enum value is rejected (throws) and does NOT write. Evidence: node-ops.ts:line of the signature + a bun test that asserts the write for 'workflow' and asserts the non-occurring write for 'bogus' (atomicWrite spy never called) (green test output)."
        status: done
        evidence:
          - core/src/ops/node-ops.ts:131 setExecutor — enum-validate before persist; core/src/ops/node-ops.spec.ts:70 green (workflow written, bogus throws + atomicWrite spy never called)
      - id: a2
        text: "A phase whose executor was never set parses + serializes byte-identically (no default 'implement' inserted). Evidence: bun test parse→render→compare of a phase node without executor shows identity (green) + file:line proving setExecutor only writes on explicit call."
        status: done
        evidence:
          - core/src/ops/node-ops.spec.ts:83 parse→render→identity of a phase node without executor + assert 'executor' not in the node (no default injected); schema/tiers/phase.ts:43 executor optional, no default
      - id: a3
        text: "`set-field executor <value>` (generic custom-field path) is rejected with a reserved error and does NOT write; only setExecutor may set the field. Evidence: bun test that asserts the reserved error for set-field on 'executor' (atomicWrite spy never called) — plus file:line of the reserved list/check (green)."
        status: done
        evidence:
          - core/src/ops/node-ops.ts:118 RESERVED_FIELDS + setField guard (throws ReservedField BEFORE persist); core/src/ops/node-ops.spec.ts:103 green (set-field executor rejected, atomicWrite never called; title writes)
      - id: a4
        text: "CLI verb `node set-executor <slug> <phase> <implement|workflow>` is mapped to exactly one deps.nodeOps.setExecutor call and returns { ok:true, command, result } / on error { ok:false, error:{name,message} } + exit 1. Evidence: node.spec with fakeNodeOps spy asserts exactly-one call with parsed args + JSON envelope; an invalid enum value yields ok:false/exit 1 (green test output) + cli/commands/node.ts:line of the mapping."
        status: done
        evidence:
          - core/src/cli/commands/node.ts:45 set-executor → exactly one ops.setExecutor; core/src/cli/commands/node.spec.ts:84 green (one call parsed args) + node.spec.ts:97 (invalid enum → ok:false/exit 1)
  - name: loop-step WORKFLOW orchestration — background dispatch + resume-safe evidence collect
    slug: workflow-dispatch-collect
    status: done
    context: |
      The core: the fan-out orchestration in the loop-step. Task engine delivered the seam
      (SEQUENTIAL-vs-WORKFLOW dispatch, the injected workflow dep, the ≤16-batch cap
      as a hook). This phase wires the real workflow mechanism behind it:
        - DISPATCH: in WORKFLOW mode loopStep starts the children (phases or tasks)
          as a background workflow via the injected spawn/workflow seam — background-
          only (no synchronous await), each unit do+verify, self-write via CLI. The
          selection of the worker follows the executor field of the unit (implement vs workflow).
        - RESUME-SAFE COLLECT: the collection is TASK-FILE-EVIDENCE-driven, NOT
          workflow-resume-dependent (resume only survives in-session). On (re-)entry
          loopStep reads the current task-file state and skips every unit whose
          acceptance criteria are already `done` (with evidence) — children already done are NOT
          re-dispatched. Persistent failures / open units are recognized as "still open"
          and re-run.
        - MERGE: after collection there is a merged result over all children
          (which done, which failed/open) that the next phase hands to the gates.
      factory-functions: the workflow orchestration lives in engine/scope/loop-step.ts
      or a scope/ helper behind the injected workflow/spawn seam — replaceable in test
      by a fake (no real CC needed). SEQUENTIAL path stays untouched.
    rules:
      - path: .claude/rules/factory-functions.md
        why: WORKFLOW dispatch behind injected workflow/spawn seam; fakeable; runner swappable
      - path: .claude/rules/fractal-substrate-integrity.md
        why: engine deterministic, workflow = effect behind spawn; control flow/skip logic = code
      - path: .claude/rules/cli-only-transport.md
        why: units write evidence self via anchored CLI; collect reads task-file state, not workflow resume
    acceptance_criteria:
      - id: a1
        text: "In WORKFLOW mode loopStep dispatches the children as a background workflow via the injected workflow/spawn seam (no synchronous await); a fake workflow dep asserts that the seam is called with the child list in background mode and the SEQUENTIAL-interleaved body does NOT run. Evidence: engine/loop-workflow.spec — green test output + loop-step.ts:line of the dispatch branch."
        status: done
        evidence:
          - core/src/engine/scope/loop-workflow.ts:95 background-dispatch (≤16, no await of completion); core/src/engine/loop-workflow.spec.ts a1 green (dispatch in background, sequential body does NOT run)
      - id: a2
        text: "Resume-safe skip is EVIDENCE-driven: on (re-)entry loopStep skips every unit whose acceptance criteria are already `done` (with evidence), and dispatches ONLY the open ones. Evidence: bun test with a task-file fake where child A=done/child B=pending → the workflow seam is called exactly for B, NOT for A (engine/loop-workflow.spec — green)."
        status: done
        evidence:
          - core/src/engine/scope/loop-workflow.ts:86 evidence-driven open-filter (isUnitComplete:36); loop-workflow.spec.ts a2 green (A done/B pending → only B dispatched)
      - id: a3
        text: "Worker selection follows the executor field of the unit: a unit with executor=workflow goes to the workflow worker, one with executor=implement (or none) to the implement worker. Evidence: test with mixed executor fields asserts the per-unit chosen worker identifier at the seam (engine/loop-workflow.spec — green) + loop-step.ts:line of the selection."
        status: done
        evidence:
          - core/src/engine/scope/loop-workflow.ts:89 selectWorker per unit (:29); loop-workflow.spec.ts a3 green (workflow/implement/unset → correct worker identifier)
      - id: a4
        text: "Collect produces a merged result over all children (done vs failed/open), read from the task-file state — NOT from a workflow resume handle. Evidence: test that, after fake dispatch + simulated self-write (one child writes evidence/done, one failures), asserts the merged result (correct done/failed partition) (engine/loop-workflow.spec — green)."
        status: done
        evidence:
          - core/src/engine/scope/loop-workflow.ts:100 collect re-read + partition(:48) from task-file state; loop-workflow.spec.ts a4 green (merged done=[A]/failed=[B] from collect, not resume handle)
      - id: a5
        text: "SEQUENTIAL default stays untouched: all existing loop-sequential tests (task engine) stay green after the WORKFLOW orchestration was wired. Evidence: test-suite output shows loop-step.spec + loop-sequential fully green."
        status: done
        evidence:
          - "SEQUENTIAL untouched: bun test src/engine — loop-step.spec + integration.spec + runners.spec fully green (139 pass/0 fail); loop-workflow.spec.ts a5 (mode!=workflow never dispatches)"
  - name: wrap gates over merged result + stop/retry in the workflow path
    slug: workflow-gates-stop-retry
    status: done
    context: |
      After the fan-out + collect the workflow path must deliver the same guarantees
      as the sequential one: the wrap gates and the stop/retry behavior.
        - GATES ONCE OVER MERGED: the wrap-stage gates (task-validate, code-validate)
          run ONCE over the merged result of all children — not per unit again.
          This mirrors the model "one anchored node = one workflow, gates at the
          stage sign-off". Gate failures land as failures on the affected child.
        - STOP: the `stop` conditions of the looping build apply in the WORKFLOW path too
          — if a unit flags a stop condition (e.g. "decision deviates from the plan"),
          the loop halts after the collect instead of running on.
        - RETRY: a failing (failures-carrying) child is re-dispatched up to cfg.build.retry_limit
          (default 3) — via the same evidence-driven skip, so children already
          green do NOT re-run. An exhausted retry_limit halts the loop.
      factory-functions: the same stop/retry mechanism as the SEQUENTIAL loop, just over
      the merged-result path; gates via the injected spawn seam (fakeable). The hard
      invariant (no ac→done without evidence) stays in the substrate — the gates do not bypass
      it.
    rules:
      - path: .claude/rules/fractal-substrate-integrity.md
        why: stop/retry = mechanism (code); hard invariant stays in the substrate, gates do not bypass it
      - path: .claude/rules/factory-functions.md
        why: gates + retry loop via injected seam; fakeable; no hidden effects
      - path: .claude/rules/tooling-quality-gates.md
        why: task-/code-validate = quality gate before completion; a red gate blocks done
    acceptance_criteria:
      - id: a1
        text: "The wrap gates (task-validate, code-validate) run in the WORKFLOW path ONCE over the merged result of all children (not per unit). Evidence: test with a fake gate seam over N children asserts exactly ONE gate run over the merged result + loop-step.ts/scope:line (engine/loop-workflow.spec — green)."
        status: done
        evidence:
          - core/src/engine/scope/loop-workflow.ts:105 gates ONCE over merged result; loop-workflow.spec.ts p3a1 green (3 children, gateCalls===1)
      - id: a2
        text: "A stop condition flagged by a unit halts the WORKFLOW loop after the collect (no running on). Evidence: test in which a fake child flags a cfg.build.stop condition asserts that the loop halts after the collect and no further dispatch occurs (engine/loop-workflow.spec — green)."
        status: done
        evidence:
          - core/src/engine/scope/loop-workflow.ts:114 stopFlagged after collect → halt; loop-workflow.spec.ts p3a2 green (loop halts after collect, dispatches===1, no re-dispatch)
      - id: a3
        text: "Retry is evidence-driven: a failures-carrying child is re-dispatched up to cfg.build.retry_limit (default 3), children already green NOT again; a permanently failing child asserts exactly retry_limit dispatch attempts + halt. Evidence: test with a fake child that fails 2× then is green (3 attempts, remaining children exactly 1×) and a permanently failing one (exactly retry_limit) (engine/loop-workflow.spec — green)."
        status: done
        evidence:
          - core/src/engine/scope/loop-workflow.ts:84 retry loop until retry_limit, evidence-driven skip; loop-workflow.spec.ts p3a3 green (flaky 3 attempts / green 1×; permanent-fail exactly retry_limit)
      - id: a4
        text: "A gate failure writes failures to the affected child (not ac→done); the hard invariant stays unviolated. Evidence: test in which a code-validate gate fails asserts failures on the child + that no ac goes to done without evidence (invariant path unbroken) (engine/loop-workflow.spec — green)."
        status: done
        evidence:
          - core/src/engine/scope/loop-workflow.ts:107 gate-fail → re-collect (worker self-write failures); loop-workflow.spec.ts p3a4 green (failures on the child, ac stays pending — invariant unbroken)
  - name: e2e workflow smoke — fan-out phases green, equivalence against sequential
    slug: workflow-smoke-e2e
    status: done
    context: |
      The CORE proof (e9 in the seed): the build loop runs either SEQUENTIAL OR
      WORKFLOW-fanout, and a real workflow smoke is green. A task with ≥2 phases,
      executor=workflow set (via the set-executor op from phase 1), is driven end-to-end over
      the fan-out orchestration — with the injected/fakeable seam, so that
      no real CC is needed, yet the path runs fully (dispatch→collect→gates→
      transition).
        - SMOKE: a ≥2-phase task via executor=workflow runs green through: all acceptance criteria
          reach `done` with evidence, the task status transitions build→wrap.
        - EQUIVALENCE: the same task definition yields, over the SEQUENTIAL and the
          WORKFLOW path, an equivalent result (same done-child set, same
          end status) on a different execution path.
        - ALLOWLIST PRECONDITION: documented/tested that `Bash(anchored *)`
          must be pre-approved, otherwise the background workflow hangs on the permission
          prompt (seam to task integration-dogfood lazy-init).
      factory-functions: the e2e test drives the real engine path (createEngine/
      tier-runner → loop-step) with the injected workflow seam as a fake — no 1:1 port.
    rules:
      - path: .claude/rules/factory-functions.md
        why: e2e over real engine path with injected workflow seam (fake); no real CC needed
      - path: .claude/rules/cli-only-transport.md
        why: units self-write via CLI; allowlist Bash(anchored *) precondition for background workflow
      - path: .claude/rules/tooling-quality-gates.md
        why: smoke is only green when acceptance criteria are done with evidence + status build→wrap (gates green)
    acceptance_criteria:
      - id: a1
        text: "A task with ≥2 phases + executor=workflow runs end-to-end over the fan-out orchestration green: after the run all phase acceptance criteria are `done` with evidence and the task status has transitioned build→wrap. Evidence: engine/workflow-smoke.spec that drives the real engine path with a fake workflow seam + asserts the end state (all acceptance criteria done, status wrap) (green test output)."
        status: done
        evidence:
          - "core/src/engine/workflow-smoke.spec.ts:95 green — real engine path (createEngine→tier→loop→workflowLoop) with fake seam: 2 phases all acceptance criteria done+evidence, then build→wrap via ops.setStatus"
      - id: a2
        text: "Equivalence: the same task definition over SEQUENTIAL vs. WORKFLOW yields the same done-child set + the same end status on a different execution path. Evidence: test drives both paths over the same definition + asserts equality of the end result (engine/workflow-smoke.spec — green)."
        status: done
        evidence:
          - core/src/engine/workflow-smoke.spec.ts:143 green — SEQUENTIAL vs WORKFLOW over the same definition → identical done-set [p1,p2] + both status ok
      - id: a3
        text: "executor=workflow is set in the smoke via the set-executor op (phase 1) — not written raw into the file — and correctly interpreted by the loop-step as a WORKFLOW dispatch. Evidence: test that drives set-executor + then takes the WORKFLOW path (asserts the dispatch branch), green."
        status: done
        evidence:
          - core/src/engine/workflow-smoke.spec.ts:99 executor set via set-executor op (not raw); :123 assert dispatch=[workflow:p1,workflow:p2] (WORKFLOW branch taken)
      - id: a4
        text: "The allowlist precondition `Bash(anchored *)` is documented/tested as a hard prerequisite of the background workflow (otherwise permission-prompt hang). Evidence: file:line in the workflow-mode docs/skill naming the precondition, + a test/check that treats its absence as a known error condition (green)."
        status: done
        evidence:
          - plugin/skills/build/SKILL.md:39 'Bash(anchored *)' allowlist precondition documented; core/src/engine/workflow-smoke.spec.ts:179 green (check reads SKILL.md, assert precondition named)
