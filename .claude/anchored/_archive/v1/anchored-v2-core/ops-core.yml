# yaml-language-server: $schema=https://raw.githubusercontent.com/chafoo/anchored/main/plugin/references/schema/task.schema.json
schema_version: 2
slug: anchored-v2-core/ops-core
title: tier-generic op core (createNodeOps)
status: done
created: 2026-06-10
context:
  plan: |
    SCOPE: The op core through which ALL mutations run (validating) — outward
    per-tier CLI surfaces, inward ONE generic core.

    Delivers:
      ops/node-ops.ts        — createNodeOps(tierSchema, deps): create/read/set-status/
                               add-child/next-child/add-evidence/set-ac-status/log …
                               Invariant (Task tier-schemas) takes hold at the writing op.
      ops/scope/children.ts  — add/move/next-child. Dependency order: first pending whose
                               depends_on are all done.
      ops/scope/questions.ts — add/resolve question (with source/reasoning).
      ops/scope/log.ts       — append-only log.

    DESIGN: file-structure.md (ops/) · fractal-redesign-notes.md (Item 5b:
    tier-generic op core, one createNodeOps parameterized over a tier descriptor) ·
    anchored.default.yml (fields per tier = what the ops write).
    V1-REF (logic template, rewritten in the factory pattern — no 1:1 port): mcp/src/core/{factory.ts(285),ops/{ac,context,field,phase,question,task}.ts}
    + mcp/src/ops/validate.ts — pull the op logic together tier-generically instead of
    duplicating it per-tier.

    CORE: next-child dependency order drives the loop (e5); invariant enforced at the op (e4).

    ROUGH PHASES: (1) createNodeOps base verbs + invariant · (2) children/dependency order ·
    (3) questions + log · (4) tests against all three tier descriptors.
  refine: |
    Detail decisions (source: ai): (1) Ops = read-modify-write over the injected io seam (atomic per op); pure substrate asserts (assertTransition/invariant) imported directly, ONLY io injected. (2) Child field per tier derived via CHILD_FIELD map (task→phases, epic→tasks, project→epics) instead of descriptor rework. (3) next-child: active/in-progress before pending (resume), then first pending with depends_on-all-done; null on deadlock/all-done. (4) scope helpers pure (new arrays); persist is done by node-ops.
  build: |
    4 modules: ops/node-ops.ts (createNodeOps, ONE tier-generic core) + ops/scope/{children,questions,log}.ts (pure). 13 new tests; the same factory proven against the phase/task/epic descriptor. Invariant at the op (setAcStatus done without evidence throws, no write), addEvidence flips atomically, setStatus forward-only. All 5 gates green, ops/scope/ free of node:fs.
  wrap: |
    Op core in place: ALL mutations validating via io.atomicWrite; invariant + forward-only transitions enforced at the writing op; next-child dependency order drives the loop (e5 building block). ONE createNodeOps for all tiers. Ready for engine (ops+config) + cli (node verbs → ops).
questions: []
log:
  - at: node-ops-core
    kind: decision
    note: Ops = read-modify-write over the injected io seam; only io injected, pure asserts (transition/invariant) imported directly. addEvidence flips AC atomically to done; setAcStatus done without evidence throws BEFORE any write.
  - at: children-dag
    kind: decision
    note: "next-child: active/in-progress before pending, then first pending with depends_on-all-done; null on all-done/deadlock. Child field via CHILD_FIELD map (no descriptor rework)."
  - at: tier-generic-proof
    kind: learning
    note: ONE createNodeOps over phase/task/epic proven (grep -c createNodeOps == 3) — no per-tier code, genericity substantiated.
phases:
  - name: createNodeOps base verbs + hard invariant at the writing op
    slug: node-ops-core
    status: done
    context: |
      ops/node-ops.ts: createNodeOps(tierSchema, deps) → { create, read,
      setStatus, addEvidence, setAcStatus, … }. ONE generic core, parameterized
      over the tier-schema descriptor (Task tier-schemas) — no per-tier duplication.

      Deps injected/fakeable (factory-functions rule): parse/render, io
      (atomic-write, Task parser-io), state (transitions + invariants, Task tier-schemas). NO
      effect dep imported directly; replaceable by fakes in the test.

      HARD INVARIANT (e4, substrate not step): setAcStatus('done') without evidence
      MUST throw; addEvidence flips the AC atomically to done (V1 pattern
      mcp/src/core/ops/ac.ts/phase.ts — logic template, rewritten in the factory pattern).
      setStatus runs assertTransition (forward-only). Every mutation goes through
      io.atomicWrite → no partial state.
    rules:
      - path: .claude/rules/factory-functions.md
        why: createNodeOps(cfg/tierSchema, deps) → verbs; deps injected, no classes/singletons
      - path: .claude/rules/fractal-substrate-integrity.md
        why: invariant enforced in the op, not in a step; mechanism vs. policy
      - path: docs/design/anchored.default.yml
        why: fields per tier = what the ops write (acceptance_criteria/evidence/status)
    acceptance_criteria:
      - id: a1
        text: "createNodeOps(tierSchema, deps) is a factory: returns an object with verbs (create/read/setStatus/addEvidence/setAcStatus/…), holds no module-level state, imports no effect dep directly — provable per file:line (signature + return shape) and a test that instantiates the factory with fake deps (parse/render/io/state) and performs a read (test output green)"
        status: done
        evidence:
          - src/ops/node-ops.spec.ts 'createNodeOps is a factory over fake deps; read round-trips' — factory with fake io/render/parse/pathFor, create+read; only io injected (assert* pure imports) (green)
      - id: a2
        text: setAcStatus(node, acRef, 'done') without existing evidence throws an invariant error and does NOT write (io.atomicWrite not called) — provable per test with fake io that asserts the write did not happen, plus file:line of the invariant check in node-ops.ts
        status: done
        evidence:
          - src/ops/node-ops.spec.ts 'setAcStatus done without evidence throws and never writes' — throws + writes.length===0 (assertAcDoneHasEvidence BEFORE persist) (green)
      - id: a3
        text: "addEvidence(node, acRef, ev) appends evidence and flips the AC atomically to status:done (V1 evidence-flip semantics) — provable per test (test output green) that shows: before pending+no evidence, after done+evidence, a single atomicWrite"
        status: done
        evidence:
          - src/ops/node-ops.spec.ts 'addEvidence flips ac to done atomically' — evidence appended + status:done, exactly one atomicWrite (writes.length===1) (green)
      - id: a4
        text: setStatus runs assertTransition from the tier descriptor (forward-only) — a forbidden transition throws, an allowed one writes — provable per test over at least one legal and one illegal transition (test output green) plus file:line of the transition delegation
        status: done
        evidence:
          - src/ops/node-ops.spec.ts 'setStatus enforces forward-only' — pending→in-progress writes, pending→done throws (assertTransition from tierSchema descriptor) (green)
  - name: children/dependency order — add/move/next-child (first pending with depends_on all done)
    slug: children-dag
    status: done
    context: |
      ops/scope/children.ts: add/move/next-child against the tier's child list
      (task→phases, epic→tasks). next-child drives the build loop (e5):

        next-child = first node with status pending whose depends_on are ALL done.
        Resume safety: in-progress takes precedence over pending (V1 makePhaseNext —
        logic template). No satisfiable child → null (loop terminates / blocks).

      add: append/insert child, duplicate slug throws. move: change order
      (do not lose a done child). Tier-generic over the child descriptor.
    rules:
      - path: .claude/rules/factory-functions.md
        why: scope/ helpers with clear input/output, used by node-ops; deps injected
      - path: docs/design/file-structure.md
        why: "ops/scope/children.ts: dependency order first pending whose depends_on all done"
      - path: docs/design/engine-architecture.md
        why: next-child drives the loop-step; loop terminates on null
    acceptance_criteria:
      - id: a1
        text: next-child returns the FIRST pending node whose depends_on slugs all have status done; one with unsatisfied dependencies is skipped — provable per test with a child list in which an earlier pending node waits on a not-yet-done child and therefore a later node is delivered (test output green)
        status: done
        evidence:
          - src/ops/scope/children.spec.ts 'first pending with satisfied depends_on' — b waits on c, c (deps on done a) delivered (green)
      - id: a2
        text: "Resume safety: if an in-progress child exists, next-child delivers it BEFORE any pending — provable per test (test output green) plus file:line of the precedence logic in children.ts"
        status: done
        evidence:
          - src/ops/scope/children.spec.ts 'prefers active/in-progress' — in-progress AND active before pending (resume safety) (green)
      - id: a3
        text: next-child delivers null when no pending node is satisfiable (all done OR all remaining pending with unsatisfied depends_on) — provable per test over both cases (all-done and deadlock-pending), test output green
        status: done
        evidence:
          - src/ops/scope/children.spec.ts 'null when nothing runnable' — all done → null; pending with unsatisfied dep → null (green)
      - id: a4
        text: add-child appends/inserts a node and throws on duplicate slug; move-child changes the order without losing a done child — provable per test (test output green) that asserts the add-duplicate-throw and a move reorder with the done child preserved
        status: done
        evidence:
          - src/ops/scope/children.spec.ts 'add rejects duplicate; move reorders' — add duplicate-slug throws; move 'b'→0 → [b,a], done child a preserved (green)
  - name: questions + append-only log
    slug: questions-log
    status: done
    context: |
      ops/scope/questions.ts: add/resolve question. add generates id + sets
      status:open with origin. resolve sets answer + source (ai|user) + reasoning
      + status:resolved (V1 question.ts — logic template). Fields per
      anchored.default.yml (questions: { id, text, priority, origin, status,
      answer?, source?, reasoning? }).

      ops/scope/log.ts: append-only. Every entry { at, kind, note } is only
      appended, never overwritten/deleted — audit-trail guarantee. Both write
      via injected io.atomicWrite.
    rules:
      - path: .claude/rules/factory-functions.md
        why: scope/ helpers with input/output, deps injected; no hidden state
      - path: docs/design/anchored.default.yml
        why: questions/log field shapes (id/origin/source/reasoning · at/kind/note)
      - path: .claude/rules/fractal-substrate-integrity.md
        why: "audit trail = mechanism: log append-only"
    acceptance_criteria:
      - id: a1
        text: add-question assigns a unique id, sets status:open and carries over origin/priority; resolve-question sets answer + source + reasoning and status to resolved — provable per test (test output green) that checks a full add→resolve cycle over the field shape from anchored.default.yml
        status: done
        evidence:
          - src/ops/scope/questions-log.spec.ts 'add-question then resolve' — add → {id:q1,status:open,origin,priority}; resolve → {status:resolved,answer,source,reasoning} (green)
      - id: a2
        text: log-append appends a { at, kind, note } entry at the end and mutates/removes NO existing entry — provable per test that, after two appends, asserts the order and immutability of the first entry (test output green) plus file:line showing that only a push happens
        status: done
        evidence:
          - src/ops/scope/questions-log.spec.ts 'log append-only' — two appends, order preserved, first entry unchanged (push only) (green)
      - id: a3
        text: questions and log write every mutation via the injected io.atomicWrite (no raw fs access in scope/) — provable per test with fake io that counts the call, plus grep/file:line evidence that neither questions.ts nor log.ts imports node:fs directly
        status: done
        evidence:
          - src/ops/scope/questions-log.spec.ts 'question+log via io.atomicWrite' — node-ops addQuestion+appendLog → 2 atomicWrite calls; grep 'node:fs' src/ops/scope/ → empty (green)
  - name: tier-generic proof against all three descriptors + quality gates
    slug: tier-generic-proof
    status: done
    context: |
      Proof that ONE createNodeOps serves phase/task/epic equally — the
      difference is only the tier descriptor (Task tier-schemas), not duplicated code.
      Tests instantiate the same factory with each of the three descriptors and
      run the core verbs (create/read/setStatus/addEvidence/next-child/
      add-question/log) against the respective child/field shapes.

      Closing gate (tooling-quality-gates): lint, format-check, typecheck
      (tsc --noEmit), bun test, build — all green before done.
    rules:
      - path: .claude/rules/tooling-quality-gates.md
        why: lint/format/typecheck/test/build green before ac→done; evidence honesty at the package level
      - path: .claude/rules/factory-functions.md
        why: ONE factory over three descriptors = no per-tier code (proof of genericity)
      - path: docs/design/anchored.default.yml
        why: "child relation per tier: task→phases, epic→tasks (next-child)"
    acceptance_criteria:
      - id: a1
        text: A parameterized test runs createNodeOps with the phase, the task AND the epic descriptor through the same core verbs (create/read/setStatus/addEvidence) — provable per test output that shows all three tier cases green, plus file:line proving that the same createNodeOps import is instantiated three times with a different descriptor
        status: done
        evidence:
          - src/ops/tier-generic.spec.ts 'same createNodeOps serves phase/task/epic' — the same createNodeOps import instantiated 3x (grep -c 'createNodeOps(' == 3), create+read per tier green
      - id: a2
        text: next-child works correctly over the per-tier child list (task→phases, epic→tasks) — provable per test that asserts one dependency-order selection each for task and epic (test output green)
        status: done
        evidence:
          - src/ops/tier-generic.spec.ts 'next-child uses per-tier child field' — task→phases (delivers p2), epic→tasks (delivers t2, deps on done t1) (green)
      - id: a3
        text: "All quality gates green for core/: eslint clean, prettier-check clean, tsc --noEmit without errors, bun test green, build without errors — provable per collected command output (each of the five gates with exit 0)"
        status: done
        evidence:
          - "5 gates exit 0: eslint, prettier --check, tsc --noEmit, bun test (59 pass/0 fail), bun build"
