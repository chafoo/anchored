  - at: workflow-mode
    kind: decision
    note: "q4 resolved → project NOT in this epic (first test out epic). Workflow compatibility added (e9): new task workflow-mode + constraints in 01/05/06/10. Build loop gets a second mode (workflow-fanout) alongside sequential-interleaved. v1 precursor: dynamic-workflow-executor."
  - at: package-scaffold
    kind: learning
    note: "Decompose of all 14 tasks via workflow fan-out (28 agents: decompose→adversarial verify). Result: 57 phases / 235 ACs, all parse, no empty phase / no AC without a test / no pre-filled evidence. Verify fixed 4 real gaps: cli missing create verb (MVP hole in the e2e path), spawn missing in-process smoke, tier-schemas instructions AC, parser-io typo. Tasks stay status:plan until review."
  - at: package-scaffold
    kind: decision
    note: "Task-files DE-NUMBERED (slugs/depends_on/cross-refs → plain names) — order lives only in the _epic.yml. PRINCIPLE clarified: epic.plan/scaffold creates NO task-files, only stubs into the _epic.yml; task-file lazily at task.plan (epic-tier a3 + context anchored). step-merge confirmed: keyed before/after insert (extend-only), stop=union-append (config-bootstrap a5/a6 added → 237 ACs)."
