# yaml-language-server: $schema=https://raw.githubusercontent.com/chafoo/anchored/main/plugin/references/schema/epic.schema.json
schema_version: 2
slug: anchored-v2-core
title: anchored v2 — fractal rewrite (engine + substrate + CLI + default template + plugin)
status: building
goal: |
  Build anchored v2 from the ground up: ONE fractal lifecycle form
  (plan→refine→build→wrap) on every tier (phase▸task▸epic, project reserved).
  No privileged built-ins — everything is a step; opinionated behavior lives in the
  default template (anchored.default.yml), active by default, overridable.
  Integrity in the substrate (no ac→done without evidence). CLI-only transport (no
  MCP), works in the main session AND headless. Factory functions
  createX(cfg, deps)→{run(input)→output}; anchored.yml as merged base dependency.

  Binding spec: docs/design/ (fractal-lifecycle · engine-architecture ·
  anchored.default.yml · file-structure · fractal-redesign-notes). Build order
  from CLAUDE.md: pure-engine → default-template → epic-tier.

  GUIDING PRINCIPLE (applies to anchored itself): epic.plan/scaffold writes ONLY the
  coarse stubs here into the _epic.yml — NO task-files. A task-file is created lazily only
  at task.plan (decompose), once the epic.build loop reaches the stub; then the full
  iteration runs over it. Before task.plan, all info lives exclusively in the _epic.yml.
  Exception in THIS repo: we pragmatically pulled the decompose forward (manual
  task.plan by hand), because the engine that would otherwise drive it is only being built here.
acceptance:
  - id: e1
    text: core/ builds green — lint + format + typecheck + test + build all pass
    status: done
  - id: e2
    text: "anchored CLI: plan|refine|build|wrap + generic node verbs run, JSON output"
    status: done
  - id: e3
    text: effectiveConfig = merge(default, user) injected; minimal anchored.yml suffices (zero-config)
    status: done
  - id: e4
    text: hard invariant enforced — no ac→done without evidence (substrate test green)
    status: done
  - id: e5
    text: "fractal loop proven: task.build.each:phase AND epic.build.each:task run end-to-end"
    status: done
  - id: e6
    text: Plugin /a:plan /a:refine /a:build /a:wrap call the CLI; agent roster complete
    status: pending
  - id: e7
    text: "Dogfood smoke: a trivial task is planned + built end-to-end"
    status: done
  - id: e8
    text: Plugin skills (/a:plan /a:refine /a:build /a:wrap) tested + benchmarked via skill-creator eval (trigger accuracy + behavior)
    status: pending
  - id: e9
    text: "Workflow mode: build loop runs either sequential OR as a Claude Code workflow fan-out (executor=workflow); real workflow smoke green"
    status: done
questions:
  - id: q1
    text: "Tooling stack for core/ (CLAUDE.md: 'decided in pure-engine')"
    priority: high
    origin: scaffold
    status: resolved
    answer: Bun all-in (install/test/build) + eslint + typescript-eslint + prettier + tsc (typecheck & .d.ts). Code Node-compatible (node:* APIs, no Bun.*), publish as a Node package.
    source: user
    reasoning: "User decision: Bun for dev speed, eslint wanted. Node compatibility preserved → npm-publishable, consumers do not need Bun. Recorded in .claude/rules/tooling-quality-gates.md."
  - id: q2
    text: "spawn: only headless `claude -p` per task-file, or take the in-process subagent mode along right away as a second impl?"
    priority: medium
    origin: scaffold
    status: resolved
    answer: Build BOTH modes fully — headless `claude -p` (CI/headless, isolation) AND in-process subagent mode (live progress, session-bound). spawn as an injected seam that carries both impls; selectable via config/flag.
    source: user
    reasoning: "User guardrail: full scope, no MVP. No 'later' — both execution kinds from the start. Seam design (factory-functions) keeps them swappable."
  - id: q3
    text: "Confirm loop as a positionable built-in step ({name: loop, each: task}) with an interleaved body?"
    priority: medium
    origin: scaffold
    status: resolved
    answer: "Confirmed (Item 5a): `each` = step attribute; the loop step carries `each` + a steps body that runs INTERLEAVED per child (child A: all body steps, then child B); own build.steps before/after run once (setup/teardown); shorthand `build:{each:task}` = body [run]. The loopStep performs the per-iteration mechanics (status/log/stop) after each body pass."
    source: ai
    reasoning: Interleaved is the only sensible order (each unit fully finished+committed before the next; a pass model would pile up untested builds). User explanation given + accepted. Consistent with engine-architecture.md.
  - id: q4
    text: Include the project tier in this epic?
    priority: low
    origin: scaffold
    status: resolved
    answer: No. We are not building project and not planning it here — first exercise epic. Removed from the task tier-schemas (only phase/task/epic).
    source: user
    reasoning: "User decision: 'we're not building project yet, I first want to test out how epic works'. Thanks to the fractal, project is cheap to add later once epic stands."
  - id: q5
    text: Confirm the `.claude/tasks/<epic>/` location (design convention)?
    priority: low
    origin: scaffold
    status: resolved
    answer: Yes — `.claude/tasks/<epic>/_epic.yml` + `.claude/tasks/<epic>/<slug>.yml`. In fact already implemented this way.
    source: ai
    reasoning: Design convention (fractal-redesign-notes 'structure definition') + epic.example.yml; the scaffold already lives there. Low-level, closed autonomously in the spirit of the docs.
  - id: q6
    text: "CLI gap (plugin-agents finding): add-phase, add-ac missing in CLI/node-ops (plan-decompose needs them for phases+ACs); set-field has a bug; wrap-summarize needs nested set-field (context.wrap). integration-dogfood must add these."
    priority: high
    origin: plugin-agents
    status: resolved
    answer: "integration-dogfood adds: node verbs add-phase/add-ac/add-phase-evidence (node-ops addPhase/addAc/addChildEvidence) + set-field bug fixed (facade read→setField with reserved guard). nested set-field (context.wrap) covered via the generic set-field."
    source: ai
tasks:
  - slug: package-scaffold
    goal: "core/ npm package: package.json (bin: anchored) + tsconfig + quality-gate tooling (lint/format/typecheck/test/build) + src skeleton"
    status: done
    depends_on: []
  - slug: tier-schemas
    goal: "Zod schemas: step grammar + config + tier descriptors (phase/task/epic) + state machine (forward-only transitions) + hard invariant (no done without evidence)"
    status: done
    depends_on:
      - package-scaffold
  - slug: parser-io
    goal: "parse/render (two profiles: task-file no-alias, anchored.yml alias-ok; schema directive; block-scalar for prose) + atomic-write io (lock + mkdir -p + POSIX rename)"
    status: done
    depends_on:
      - tier-schemas
  - slug: config-bootstrap
    goal: merge(anchored.default.yml, user anchored.yml) → effectiveConfig; validated once at bootstrap + injected as deps.config
    status: done
    depends_on:
      - tier-schemas
      - parser-io
  - slug: ops-core
    goal: "createNodeOps(tierSchema, deps): tier-generic op core — create/read/set-status/add+next-child (dependency order)/add+resolve question/append log; the invariant applies at the writing op"
    status: done
    depends_on:
      - tier-schemas
      - parser-io
  - slug: spawn
    goal: "execution substrate: spawn = headless `claude -p` per task-file, phases in-process; injected seam (in-process subagent mode addable later)"
    status: done
    depends_on:
      - tier-schemas
  - slug: engine
    goal: "fractal factory engine: createEngine → tier/stage/step-runner + scope/(run-step · worker-step · loop-step · resolve-steps); loopStep closes the recursion (calls the tier-runner of the child tier)"
    status: done
    depends_on:
      - config-bootstrap
      - ops-core
      - spawn
  - slug: cli
    goal: "anchored CLI (the single transport): index dispatch + commands/(plan classify-when-tier-missing · refine · build · wrap · node generic verbs); JSON output"
    status: done
    depends_on:
      - engine
  - slug: default-template
    goal: anchored.default.yml as a shipped reference + resolve-steps default injection + step-name→worker dispatch; every step/field/stage of the default is implemented
    status: done
    depends_on:
      - engine
  - slug: plugin-skills
    goal: plugin/.claude-plugin/plugin.json (name 'a', fallback 'anc') + skills/{plan,refine,build,wrap}/SKILL.md — call `anchored <verb>` via Bash; classify routing in the plan skill
    status: blocked
    depends_on:
      - cli
  - slug: plugin-agents
    goal: "flat agent roster (stage-prefix buckets): discover/plan-check/rules-check/walk/review/summarize (shared) + decompose/scaffold/implement/task-validate/code-validate/roll-up (specific); read+write via CLI"
    status: done
    depends_on:
      - cli
      - default-template
  - slug: epic-tier
    goal: "epic as a full tier: build.each:task loop + scaffold/walk/roll-up + nested slugs (<epic>/<slug>) through parser/io/ops + classify detection; proves the fractal loop end-to-end"
    status: done
    depends_on:
      - engine
      - cli
      - default-template
      - plugin-agents
  - slug: workflow-mode
    goal: "workflow fan-out executor: build loop optionally as a Claude Code dynamic workflow (≤16 parallel, self-write via CLI, resume-safe via task-file evidence); reserved executor field + orchestration"
    status: done
    depends_on:
      - engine
      - cli
      - plugin-agents
  - slug: integration-dogfood
    goal: "index.ts wiring (createEngine + createOps) + lazy-init minimal anchored.yml + Bash(anchored *) allowlist + e2e smoke: run a trivial task plan→build through (sequential + workflow)"
    status: done
    depends_on:
      - cli
      - default-template
      - plugin-skills
      - plugin-agents
      - epic-tier
      - workflow-mode
