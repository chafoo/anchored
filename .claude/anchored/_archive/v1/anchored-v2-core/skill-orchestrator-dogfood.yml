  - at: skill-orchestrator-dogfood
    kind: decision
    note: AI seam = skill-orchestrated in-session (not headless claude -p). Skills become conductors, CLI provides steps plan + ops, agents self-write via anchored node.
  - at: skill-orchestrator-dogfood
    kind: learning
    note: "The e2e dogfood (task integration-dogfood) was green because it injected fakeSpawn — it masked the AI-seam gap. A real dogfood against the linked CLI exposes it. Lesson: at least one run against the REAL binary, not just fakeSpawn."
  - at: skill-orchestrator-dogfood
    kind: decision
    note: "Review pass 2026-06-11 (impl-plan update-mode): 5 gaps incorporated — new phase dogfood-harness-setup (how does anchored-test load the plugin, showstopper precondition); agents-reconcile pulled BEFORE skills-orchestrate + spawn-input-contract AC (a3); skills-orchestrate +failure-handling AC (a5) +stage-verb-resolution AC (a6) +in-progress transition in a2. Phase 1 (done) untouched. Status build→drafted (plan materially changed, worth re-refining)."
  - at: skill-orchestrator-dogfood
    kind: learning
    note: "refine plan-check 2026-06-11 (verdict drift-found): assumptions confirmed — skills are thin (plan/SKILL.md:27 etc. delegate to `anchored <stage>`), phase-1-done claims accurate (steps-planner.ts, node-ops verbs, bootstrap-null-fix all real), anchored-test plugin loading missing (no .claude/skills, .claude/agents, settings.local.json). DRIFT corrected: '13 agents mismatched' was overstated — real ~3 (build-implement add-evidence/set-status, wrap-summarize set-field-nested); plan-decompose/add-child/append-log already correct; stale 'OPEN' note in plan-decompose.md. Incorporated into agents-reconcile a1/a2/a3 + harness-setup a2."
  - at: skill-orchestrator-dogfood
    kind: blocker
    note: "NEW HIGH blocker (plan-check finding, missed in the original ticket): root /Users/jack/Dev/anchored-v2/anchored.yml (trader-carried dev config, commit 3141542) declares phase.fields as a LIST (- {name: commit}), v2 ConfigSchema expects a MAP/record → EVERY `anchored` call from the repo cwd crashes with ConfigError 'expected record, received array' at phase.fields. Breaks 'callable from any cwd' when cwd=repo + the agents-reconcile dry run. FIX options: switch fields to a map OR scope it as known dev-config debt (dry runs from tmp-dir). Open for user decision at phase start."
  - at: skill-orchestrator-dogfood
    kind: learning
    note: "refine rules-check 2026-06-11 (verdict gaps-found): coverage solid, no orphans (all 11 rule paths exist). One gap fixed — cli-foundation now references tooling-quality-gates (it built core/ code + proved itself via 5 gates). Two spirit-level stretches (factory-functions@agents-reconcile, tooling-quality-gates@dogfood-task) remain (justification sound)."
  - at: build
    kind: blocker
    note: "dogfood-harness-setup a1 (live: /a:plan triggers + agent spawnable) needs a session with cwd anchored-test + plugin loaded — cannot be proven from the anchored-v2 session (interactive /plugin commands + plugin runtime). Handoff to user: open anchored-test → /reload-plugins → /plugin list (a@anchored-v2-dev enabled) → /a:plan triggers. Real install (settings.json project-scoped), no symlink."
  - at: build
    kind: blocker
    note: "dogfood-epic BLOCKED on F13 (epic tier not functional via CLI: plan epic doesn't pass tier to create, tierForSlug defaults to task → epic node becomes task; scaffold fell back to add-phase instead of add-child) + F14 (slug trailing-dash → duplicate node). A real dogfood finding, masked in the engine test (epic-tier.spec, in-memory). dogfood-epic stays pending until fixed. Docs: .claude/temp/dogfood-findings.md F13/F14."
phases:
  - name: CLI/substrate foundation for skill orchestration
    slug: cli-foundation
    status: done
    context: |
      The building blocks the orchestrated skills need so they have something to
      conduct at all. This phase was built on 2026-06-11 + verified end-to-end
      over the linked `anchored` binary (not just unit test).
    rules:
      - path: .claude/rules/cli-only-transport.md
        why: new verbs + steps planner run over the anchored CLI, JSON output; same from main session + subagents
      - path: .claude/rules/factory-functions.md
        why: steps planner as createStepsPlanner(cfg) over resolve-steps + worker-dispatch; injected into createCli; fakeable
      - path: .claude/rules/tooling-quality-gates.md
        why: phase builds core/ code (steps-planner, node-ops, bootstrap) + proves completion via the 5 gates (lint/format/typecheck/test 160 green/build) — that IS the gate guarantee (rules-check 2026-06-11)
    acceptance_criteria:
      - id: a1
        text: "`anchored steps <tier> <stage>` returns the config-driven step plan as JSON (worker→agent-ref, run, loop→each/stop/retry_limit). Evidence: core/src/ops/steps-planner.ts + steps-planner.spec.ts (4 tests green); CLI smoke `anchored steps task plan` → discover/rules-scan/decompose agents, `phase build` → implement+2 gates, `task build` → loop each:phase stop retry_limit:3."
        status: done
        evidence:
          - core/src/ops/steps-planner.ts:createStepsPlanner + core/src/cli/commands/steps.ts (verb 'steps'); steps-planner.spec.ts 4 pass; verified via linked binary in fresh tmp project (JSON ok:true with correct agent refs)
      - id: a2
        text: "The node verbs the task lifecycle needs run end-to-end over the real CLI: add-phase, add-ac (auto-id a1,a2…), add-phase-evidence (flips phase-ac to done WITH evidence), set-child-status, set-status, next-child, append-log, set-field. Evidence: CLI smoke sequence create→add-phase→add-ac(a1)→add-ac(a2)→add-phase-evidence(done+ev)→set-child-status(done) all ok:true; node-ops + node-cli specs green."
        status: done
        evidence:
          - "core/src/ops/node-ops.ts (addPhase/addAc/addChildEvidence/setChildStatus) + facade.ts (auto-id nextAcId + setChildStatus) + cli/commands/node.ts (verbs add-phase/add-ac/add-phase-evidence/set-child-status); smoke in tmp: add-ac→a1, second→a2, add-phase-evidence→status done+evidence, set-child-status→done"
      - id: a3
        text: "P0 lazy-init crash fixed: a comments-only anchored.yml (parses to null) is treated as zero-config, not as a ConfigError. Evidence: core/src/config/bootstrap.ts (validate(parsed ?? {})) + bootstrap.spec.ts a6 (comments-only → full default, no throw); `anchored plan` runs without crash in a fresh project."
        status: done
        evidence:
          - "core/src/config/bootstrap.ts:validate(parsed ?? {}) + bootstrap.spec.ts:'comments-only anchored.yml … zero-config'; re-smoke: anchored plan writes task-file without crash"
      - id: a4
        text: "`anchored` is globally linked + callable from any cwd (skills call it via Bash). Evidence: `npm link` in core/, `which anchored` → ~/.nvm/.../bin/anchored, `anchored steps task plan` from any cwd returns JSON. Whole package: 160 tests / 5 gates green."
        status: done
        evidence:
          - npm link in core/ → /Users/jack/.nvm/versions/node/v24.8.0/bin/anchored; anchored steps task plan ok from tmp-cwd; bun test 160 pass/0 fail, lint+format+typecheck+build green
  - name: Align 13 agent docs to real CLI verbs + spawn-input contract
    slug: agents-reconcile
    status: done
    context: |
      FIRST (before skills-orchestrate): the agent contract must stand before the skill
      calls it. Two parts:
      (A) Audit + align the 13 agent definitions (plugin/agents/*.md).
      CORRECTION via plan-check (2026-06-11): most agents already call correct
      verbs (add-ac IS now text-based+auto-id = what plan-decompose calls;
      add-child, append-log, epic-roll-up set-status fit). The REAL mismatches are
      ~3, concentrated in:
        - build-implement: `add-evidence <slug> <ac>` → must be `add-phase-evidence <task>
          <phase> <ac> <text>` (a phase is a CHILD in the task-file, not a
          standalone node); AND `set-status <slug> done` on a phase → must be
          `set-child-status <task> <phase> done`.
        - wrap-summarize: `set-field <slug> context.wrap "…"` sets a FLAT
          top-level key named "context.wrap" (no nested-path support in setField) —
          needs either dotted-path support (mechanism = code) or a dedicated op.
        - delete STALE note: plan-decompose.md carries an "OPEN: add-phase/add-ac no
          CLI surfaces yet" comment — the verbs have been wired since phase 1.
      (B) The spawn-input contract: what does the skill pass through to each agent? Pin down,
      so skill and agent don't guess past each other — at least: { task-slug, phase-slug,
      tier, stage, phase-context, rules, + the EXACT `anchored node` self-write commands }.
      IMPORTANT (phase addressing): since phases are children in the task-file, the
      agent addresses them via TASK-slug + phase-slug (add-phase-evidence/set-child-status), NOT
      as a standalone node. Both sides reference the same contract.
    rules:
      - path: .claude/rules/cli-only-transport.md
        why: agents self-write evidence/phases via the validating anchored CLI; no raw Write/Edit on task-files
      - path: .claude/rules/factory-functions.md
        why: the spawn-input contract is the input/output seam between skill (conductor) and agent (effect); clearly defined, fakeable
    acceptance_criteria:
      - id: a1
        text: "Inventory: per agent, the called `anchored node …` verbs + args contrasted against the actually available CLI verbs (node.ts switch); ALL mismatches listed (plan-check basis: build-implement add-evidence→add-phase-evidence + set-status→set-child-status; wrap-summarize set-field-nested; plan-decompose stale-OPEN note). Evidence: a mismatch table (agent → wrong verb/sig → correct verb/sig) covering at least these 3."
        status: done
        evidence:
          - "Mismatch table: grep survey of all 13 agents (anchored node calls) → 3 real mismatches (build-implement add-evidence→add-phase-evidence + set-status→set-child-status; wrap-summarize set-field-nested; plan-decompose stale OPEN note); remaining 10 (add-child/append-log/add-ac/epic set-status) confirmed correct"
      - id: a2
        text: "All agent docs aligned: build-implement uses add-phase-evidence + set-child-status, wrap-summarize writes context.wrap correctly (dotted-path op or dedicated op — mechanism decision documented), plan-decompose stale note deleted; all others confirmed correct. Evidence: grep over plugin/agents/*.md shows only really existing verbs/signatures; a dry run of each self-write command against the CLI returns ok:true. PRECONDITION: dry run NOT from the anchored-v2 repo cwd (root anchored.yml crashes bootstrap, see log) — run from a clean tmp-dir."
        status: done
        evidence:
          - "Fixes: build-implement.md uses add-phase-evidence+set-child-status (grep shows only real verbs); plan-decompose stale note deleted (grep -c=0); context.wrap mechanism = dotted-path set-field (core/src/ops/node-ops.ts setNested + setField, node-ops.spec dotted-path test green, CLI smoke context.wrap nested + plan preserved); dry run add-phase-evidence/set-child-status against the real CLI ok:true; bun test 161 pass"
      - id: a3
        text: "The spawn-input contract is explicitly documented + referenced by both sides: the skill passes through { task-slug, phase-slug, tier, stage, context, rules, self-write commands }; each agent doc names at the top which fields it expects + which `anchored node` commands it runs; phases are addressed via TASK-slug+phase-slug (not as a standalone node). Evidence: a contract section (references/ file or per-agent header) + cross-check that plugin/skills spawn the same fields plugin/agents expect."
        status: done
        evidence:
          - "Spawn-input contract: plugin/references/agent-contract.md (input fields task-slug/phase-slug/tier/stage/context/rules + self-write table per role + phase addressing task-slug+phase-slug); referenced by build-implement.md (grep -c=1)"
  - name: Rewrite the 4 skills into orchestrators
    slug: skills-orchestrate
    status: done
    context: |
      Rewrite the SKILL.md bodies of /a:plan /a:refine /a:build /a:wrap from "thin relay"
      (call `anchored <stage>` + show JSON) into ORCHESTRATOR: per
      stage read `anchored steps` → for each worker step spawn the agent via the Task tool
      (spawn-input contract from agents-reconcile) → agent self-writes via `anchored
      node …` → advance state via CLI. Including the fractal loop mechanics in the skill:
      build on task loops phases (next-child; per phase first set-child-status
      in-progress, then implement, then gates, then done), build on epic loops tasks;
      per iteration gates (task-/code-validate), retry until retry_limit, stop check;
      transitions plan→drafted→refined→build→wrap→done. The opinionated behavior
      stays in the default template (steps), the skill is the generic conductor that
      executes the steps plan — it knows no concrete agent names hardcoded.
    rules:
      - path: .claude/rules/cli-only-transport.md
        why: skills + agents read/write exclusively via the anchored CLI; no MCP, no raw Write/Edit on task-files
      - path: .claude/rules/fractal-substrate-integrity.md
        why: skill = policy conductor (executes config steps), knows no hardcoded agent names; mechanics (loop/stop/retry/transitions) follow the steps plan + the ops
    acceptance_criteria:
      - id: a1
        text: "/a:plan is an orchestrator: reads `anchored steps <tier> plan`, spawns discover→plan-discover, rules-scan→plan-rules-scan, decompose→plan-decompose via the Task tool; agents write phases+ACs via anchored node add-phase/add-ac; classifies the tier when omitted; flips status→drafted at the end. Evidence: plan/SKILL.md shows the steps-driven spawn loop (no raw `anchored plan` delegate anymore); a dry-read of the skill proves each step."
        status: done
        evidence:
          - "plugin/skills/plan/SKILL.md: orchestrator — classify→anchored plan (returns node+steps)→Task tool spawns discover/rules-scan/decompose with agent-contract input→agents self-write add-phase/add-ac→set-status drafted. grep: Task-tool×4, agent-contract×2"
      - id: a2
        text: "/a:build is an orchestrator: loops phases via next-child; per phase set-child-status in-progress → reads `anchored steps phase build` → spawns implement→build-implement (self-writes evidence via add-phase-evidence), then the gates task-validate+code-validate; on failures retry until retry_limit, on stop match halt+escalation; set-child-status done per phase; at the end status→wrap. For epic it loops tasks (epic.build.each:task). Evidence: build/SKILL.md shows the complete loop (in-progress→implement→gates→retry/stop→done) flow."
        status: done
        evidence:
          - "plugin/skills/build/SKILL.md: orchestrator — loop via next-child; per phase set-child-status in-progress→anchored steps phase build→Task tool build-implement (self-write add-phase-evidence)→gates parallel→re-do loop on failures→set-child-status done; epic loops tasks; termination→set-status wrap. grep Task-tool×3"
      - id: a3
        text: "/a:refine + /a:wrap are orchestrators: refine spawns plan-check+rules-check + runs the Q&A walk (resolve-question), flips drafted→refined; wrap spawns review+summarize (leaf/task) or roll-up (epic), flips wrap→done. Evidence: refine/SKILL.md + wrap/SKILL.md show the steps-driven spawn + the correct transitions."
        status: done
        evidence:
          - plugin/skills/refine/SKILL.md (plan-check+rules-check+walk→resolve-question→refined) + wrap/SKILL.md (review+summarize/roll-up→set-status done) as orchestrators; correct transitions. grep refine Task-tool×2, wrap Task-tool×2
      - id: a4
        text: "No skill calls a spawning `anchored plan|refine|build|wrap` as a black box anymore (which can't spawn headless); all four use `anchored steps` + Task tool + `anchored node`. Evidence: grep over plugin/skills/*/SKILL.md shows `anchored steps` + Task spawn in each, and NO delegate to the spawning stage verb as the sole mechanism."
        status: done
        evidence:
          - "All 4 skills use Task-tool spawn + agent-contract, NONE delegates to a spawning stage verb as the sole mechanism anymore (the stage verbs only return the plan after a6). grep: plan/refine/build/wrap each Task-tool≥2 + spawn≥3"
      - id: a5
        text: "Failure handling in the orchestrator is specified (not just happy-path): an agent with no/error return → failures at the node + retry; retry_limit exhausted → phase blocked + escalation to the user; stop match → halt + open question. Evidence: each skill doc explicitly names what happens on agent fail / retry exhausted / stop (no silent continuation)."
        status: done
        evidence:
          - "build/SKILL.md '## Failure-handling (never silent — a5)': agent fail→failures+retry; retry_limit exhausted→set-child-status blocked+append-log blocker+continue; stop-condition→halt+append-log decision+walk. No silent continuation"
      - id: a6
        text: "The dangling spawn stage verbs are resolved: `anchored plan|refine|build|wrap` (full run via unwired engine) are either removed, or repurposed to 'return the steps plan instead of spawning', or clearly marked headless-only — so no verb exists that seems to run but fails empty. Evidence: decision documented in the log + implemented in the code/CLI (test green); `anchored build <slug>` behaves predictably (no misleading status:failed anymore)."
        status: done
        evidence:
          - "Stage verbs resolved: core/src/cli/commands/refine.ts runStage + plan.ts return { stage,tier,node,steps } instead of an unwired engine.run; stage.spec rewritten to the plan contract (engineRan===false), 161 tests green; CLI smoke 'anchored build <ticket>' → {stage:build,tier:task,steps:[loop]} (no status:failed anymore)"
