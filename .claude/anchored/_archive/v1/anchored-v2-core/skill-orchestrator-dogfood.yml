schema_version: 2
slug: anchored-v2-core/skill-orchestrator-dogfood
title: Skill-orchestrated runtime + dogfood eval (the last mile)
created: 2026-06-11
status: build
context:
  plan: |
    SCOPE: Wire the "last mile" that the skill-creator eval (e8) immediately
    exposed — and then validate it for real. The deterministic core (engine,
    substrate, ops, invariant, CLI) is built + 160 tests green, BUT a real
    plan→refine→build→wrap has never run: the AI seam (how `anchored <stage>`
    actually starts the plugin agents) was only faked in tests (`fakeSpawn`),
    never wired.

    FINDING (smoke test in a fresh tmp project, 2026-06-11):
      - `anchored plan` → status:failed, task-file WITHOUT phases. Reason: the bin
        entry wires `createSpawn(config, {})` without an exec/agent seam, and a bare
        Node subprocess CANNOT start Claude Code agents (those only exist in a CC
        session, Task tool). Every stage with worker steps fails at the first
        worker.
      - P0: lazy-init wrote a comments-only anchored.yml → bootstrap crashed
        when reading it back (YAML→null, ConfigSchema "expected object, received null").

    DECISION (user, 2026-06-11): AI seam = SKILL-ORCHESTRATED, in-session.
    The skills (which have plugin+agents loaded) are the conductors: they spawn each
    worker via the Task tool in the session; the agents self-write via `anchored node`;
    the CLI provides (a) all ops + (b) the config-driven step plan (`anchored
    steps <tier> <stage>`). The engine with `spawn` is kept for the headless path,
    but is NOT the skill path. Meaning: the v2 skills must become as "thick"
    as the v1 skills (orchestrate), only with CLI instead of MCP as the transport.

    DOGFOOD GOAL (user): both in sequence — first a task feature end-to-end
    green (anchored-test "clear-completed button"), then an epic run (multiple
    tasks, epic.build.each:task, rolling-wave). Sandbox: ~/Dev/anchored-test
    (vanilla-JS todo, 3 rules intact, reset for v2; v1 `.mcp.json` archived).

    REF: ~/Dev/anchored/evals (v1 eval setup: evals.json 6 lifecycle prompts +
    runner.md /loop-driven; was MCP + lifecycle-only, no epic) as a CONCEPT template.
    Closes e6 (skills call CLI, agent roster complete) + e8 (skill-creator eval)
    of the epic. [[full-build-no-mvp]], [[plugin-skill-eval]], [[workflow-compat]].

    ROUGH PHASES: (1) CLI/substrate foundation [DONE] · (2) 4 skills → orchestrators ·
    (3) align 13 agent docs to real verbs · (4) dogfood task end-to-end ·
    (5) dogfood epic end-to-end · (6) skill-creator eval (triggering + behavior).
questions: []
