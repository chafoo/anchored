# yaml-language-server: $schema=https://raw.githubusercontent.com/chafoo/anchored/main/plugin/references/schema/task.schema.json
schema_version: 2
slug: anchored-v2-core/parser-io
title: YAML parser/renderer + atomic-write io
status: done
created: 2026-06-10
context:
  plan: |
    SCOPE: YAML ↔ Node + safe persistence.

    Delivers:
      parser/parse.ts  — parseNodeYAML, TWO profiles: task-file (no-alias) and
                         anchored.yml (alias-ok for _lib). Against the tier schemas (Task tier-schemas).
      parser/render.ts — renderNodeYAML: auto-inject the schema directive on line 1;
                         prose as block-scalar (|), no mix.
      io.ts            — atomic-write: lock + mkdir -p + POSIX-rename. Single file →
                         no folder. Create nested paths (<epic>/<slug>).

    DESIGN: file-structure.md (parser/ + io.ts) · anchored.default.yml (block-scalar
    for context trails) · task.example.yml + epic.example.yml (target output format,
    incl. directive line) · fractal-redesign-notes.md (Markdown = block-scalar).
    V1-REF (logic template, rewritten in the factory pattern — no 1:1 port): mcp/src/parser/{parse.ts(94),render.ts(46)} + mcp/src/core/io.ts(122) —
    as a logic template; rewrite, fit to the two profiles + nested slugs.

    ROUGH PHASES: (1) parse two profiles · (2) render directive + block-scalar ·
    (3) atomic io + nested path · (4) round-trip tests (parse→render→parse stable).
  refine: |
    Detailed decisions (source: ai): (1) no-alias profile = yaml maxAliasCount:0 (rejects alias expansion, the Billion-Laughs vector); an anchor without an associated alias is harmless/not an attack vector. (2) The parser serves node files AND the config: the schemas map also contains 'config', the schema_version gate runs ONLY in the task-file profile (config has no schema_version). (3) QuestionSchema.origin → optional (epic.example.yml omits origin). (4) io.ts purely deps-based (fs/lock/rand/pid injected), NO node:fs import — the real node:fs/proper-lockfile seam at wiring; node:path/dirname is pure and allowed.
  build: |
    3 modules: parser/{parse,render}.ts + io.ts. createParser (two profiles, tier+config schemas, ParseError with path), createRenderer (directive line 1 + block-scalar via yaml stringify lineWidth:0), createIo (mkdir→lock→write-temp→rename→release, WriteContention via anchoredError). 13 new tests with fake seam (fakeYaml/fakeSchemas/fakeFs/fakeLock). All 5 gates green.
  wrap: |
    YAML↔Node + atomic persistence are in place; round-trip proven idempotent over the real fixtures (task/epic). Seam principle held throughout. Ready for ops-core (uses parser/render/io + the invariant).
questions: []
log:
  - at: parse-two-profiles
    kind: decision
    note: "Parser serves node files (task-file: no-alias + schema_version gate) AND config (anchored.yml: alias-ok, no gate); schemas map contains 'config'. no-alias = maxAliasCount:0 (rejects alias expansion)."
  - at: atomic-io-nested
    kind: decision
    note: io.ts purely deps-based (no node:fs import); real fs/lock seam injected at wiring. node:path/dirname is pure → allowed.
  - at: round-trip-stability
    kind: learning
    note: Made QuestionSchema.origin optional (epic.example.yml reality). Round-trip over task+epic fixtures + write path idempotent.
phases:
  - name: parseNodeYAML — two profiles (no-alias / alias-ok) against tier schemas
    slug: parse-two-profiles
    status: done
    context: |
      createParser(cfg, deps) → { parseNodeYAML(raw, { profile, tier }) }. Deps
      injected/fakeable: { yaml } (yaml-parse seam), { schemas } (the tier Zod
      schemas from Task tier-schemas: phase/task/epic/project). Closure state only if needed
      — no module-level singletons, no top-level side effects
      ([[factory-functions]]).

      TWO profiles (V1 mcp/src/parser/parse.ts + core/parser.ts as logic template,
      NOT a 1:1 port):
        - profile "task-file": no-alias (YAML aliases/anchors HARD-rejected),
          no-custom-tags, size-cap. Protects persisted node files from
          alias bombs + reference trickery.
        - profile "anchored.yml": alias-ok ONLY for _lib reuse (anchors/aliases
          allowed), otherwise the same hardening (custom-tags out, size-cap).
      Flow per profile: (1) yamlSafe(raw) → unknown (hardening), (2) schema_version
      gate with a clear error message BEFORE generic validation, (3) the matching
      tier schema (`tier`) .parse(...) → typed node. Errors as ParseError
      with line/column (when available) or schema path. Pure code — no AI,
      no FS, no spawn.
    rules:
      - path: .claude/rules/factory-functions.md
        why: createParser(cfg,deps); yaml+schemas as injected/fakeable deps; no classes/singletons
      - path: .claude/rules/fractal-substrate-integrity.md
        why: Parser = mechanism/substrate; v1 is a logic template, not a port
      - path: docs/design/file-structure.md
        why: "parser/parse.ts: parseNodeYAML two profiles (task-file no-alias, anchored.yml alias-ok)"
    acceptance_criteria:
      - id: a1
        text: "createParser is a factory (createX(cfg,deps)→{verbs}): yaml + schemas come exclusively from deps, are replaceable by fakes in the test; no class, no module-level singleton, no top-level side effect — evidence as parse.ts:line (signature + return object) + a test that runs createParser({}, { yaml: fakeYaml, schemas: fakeSchemas }) without real yaml/FS (green)"
        status: done
        evidence:
          - src/parser/parse.spec.ts 'createParser runs with fake yaml + fake schemas' — yaml+schemas only from deps, fakeYaml/fakeSchemas without real yaml/fs; createParser is a factory (parse.ts:27) (green)
      - id: a2
        text: profile 'task-file' rejects YAML with alias/anchor (e.g. `*ref` / `&anc`) with a ParseError, while profile 'anchored.yml' parses the same _lib alias input successfully — evidence as parse.ts:line (profile branch) + two tests (no-alias throws, alias-ok parses), test output green
        status: done
        evidence:
          - src/parser/parse.spec.ts 'task-file rejects alias; anchored.yml accepts _lib' — task-file (maxAliasCount:0) throws on *base; anchored.yml parses → steps[0].name='implement' (parse.ts:42 profile branch) (green)
      - id: a3
        text: schema_version != expected version AND missing schema_version each throw a ParseError with their own, clear message BEFORE the generic schema validation; a valid task file parses against the task tier schema into a typed node — evidence as parse.ts:line (version gate) + tests (wrong version throws, missing throws, valid parses), test output green
        status: done
        evidence:
          - src/parser/parse.spec.ts 'schema_version gate' — valid task parses; missing & schema_version:1 throw ParseError BEFORE schema validation (parse.ts schema_version gate, task-file-only) (green)
      - id: a4
        text: "Quality gates green for core/: lint (eslint), format (prettier-check), typecheck (tsc --noEmit), test (bun test) — evidence as copied command output per gate (exit 0)"
        status: done
        evidence:
          - "4 gates exit 0: eslint, prettier --check, tsc --noEmit, bun test (35 pass/0 fail)"
  - name: renderNodeYAML — schema directive line 1 + prose as block-scalar
    slug: render-directive-blockscalar
    status: done
    context: |
      createRenderer(cfg, deps) → { renderNodeYAML(node, { tier }) }. Deps
      injected/fakeable: { yaml } (stringify seam), { schemaUrl } (directive URL per
      tier). V1 mcp/src/parser/render.ts as a logic template (config-only wrapper),
      rewritten in the factory pattern.

      Requirements:
        - The schema directive (`# yaml-language-server: $schema=<tier-url>`) is
          AUTO-injected on line 1 — YAML comments do not round-trip through the
          parser, the renderer is the single canonical injection point (every
          write emits the directive, no matter what the file looked like before).
        - Prose/Markdown is emitted as a block-scalar (`|`), NO mix
          (anchored.default.yml context trails + fractal-redesign-notes "Markdown =
          block-scalar"). Preserve key insertion order (no alphabetical
          sorting), 2-space indent, EOF newline.
        - Directive correct per tier (task→task.schema, epic→epic.schema, …).
      Pure code — no FS write here (io.ts does that); the renderer returns only the
      string.
    rules:
      - path: .claude/rules/factory-functions.md
        why: createRenderer(cfg,deps); yaml+schemaUrl as injected deps; pure, no hidden state
      - path: docs/design/file-structure.md
        why: "parser/render.ts: schema directive + block-scalar for prose"
      - path: docs/design/fractal-redesign-notes.md
        why: Markdown content = YAML block-scalar (|), no mix
    acceptance_criteria:
      - id: a1
        text: "renderNodeYAML emits the schema directive `# yaml-language-server: $schema=...` exactly on line 1 — regardless of whether the input node already carried one; the URL matches the `tier` argument (task vs. epic yield different $schema URLs) — evidence as render.ts:line (directive prepend) + a test that asserts the first line of two tier renders (green)"
        status: done
        evidence:
          - "src/parser/render.spec.ts 'directive on line 1 per tier' — line 1 = '# yaml-language-server: $schema=…/task.schema.json'; tier epic → epic.schema.json (render.ts:27) (green)"
      - id: a2
        text: A node with a multiline prose field (e.g. context.plan / goal) is emitted as a block-scalar (`|`) — NO quoted string with \n escapes; round-trip via parseNodeYAML yields the same prose value — evidence as render.ts:line (stringify options) + a test that checks for `|` in the output AND that parse(render(node)) preserves the prose value (green)
        status: done
        evidence:
          - "src/parser/render.spec.ts 'multiline prose block-scalar + round-trip' — context.plan multiline → 'plan: |', no \\n escape; parse(render) preserves the prose value (green)"
      - id: a3
        text: Key insertion order is preserved (no alpha-sort), output ends with exactly one trailing newline, indent = 2 spaces — evidence as render.ts:line (yaml options) + a test that asserts order + EOF newline (green)
        status: done
        evidence:
          - src/parser/render.spec.ts 'key order, EOF newline, 2-space' — z before a (no alpha-sort), exactly one trailing newline, 2-space indent (yaml stringify lineWidth:0) (green)
      - id: a4
        text: "Quality gates green for core/: lint, format, typecheck, test — evidence as copied command output per gate (exit 0)"
        status: done
        evidence:
          - "4 gates exit 0: eslint, prettier --check, tsc --noEmit, bun test (35 pass/0 fail)"
  - name: "io.ts — atomic-write: lock + mkdir -p + POSIX-rename, nested paths"
    slug: atomic-io-nested
    status: done
    context: |
      createIo(cfg, deps) → { atomicWrite(path, content), readFile(path) }. Deps
      injected/fakeable: { fs } (writeFile/rename/mkdir/readFile — node:fs/promises
      seam), { lock } (lock-acquire/release seam), { rand }+{ pid } (temp suffix).
      V1 mcp/src/core/io.ts as a logic template, rewritten in the factory pattern — NO
      direct node:fs import in the logic, everything through the injected seam
      ([[factory-functions]]). Node-compatible (node:fs/path/crypto, no Bun.*).

      atomicWrite flow (POSIX guarantee):
        1. mkdir -p on dirname(path) — nested paths <epic>/<slug> are created lazily;
           single file (flat slug) → NO folder created, just the file.
        2. acquire a cross-process lock on path (retry budget; WriteContention on
           timeout); stale-reclaim after threshold.
        3. write to temp sibling `<path>.tmp.<pid>.<rand>`, then rename(tmp, path)
           — atomic on POSIX; a crash mid-write leaves the original intact.
        4. ALWAYS release the lock (finally, even on write error).
      Clear error types (WriteContention) with an actionable message.
    rules:
      - path: .claude/rules/factory-functions.md
        why: createIo(cfg,deps); fs+lock as injected/fakeable seam; no direct fs import in the logic
      - path: .claude/rules/tooling-quality-gates.md
        why: node:fs/path/crypto, no Bun.* APIs in production code (npm-publish compat)
      - path: docs/design/file-structure.md
        why: "io.ts: lock + mkdir -p + POSIX-rename; single file → no folder; nested <epic>/<slug>"
    acceptance_criteria:
      - id: a1
        text: "createIo is a factory: fs + lock + rand/pid come exclusively from deps; a test runs atomicWrite fully with fakeFs (in-memory) WITHOUT hitting real node:fs — evidence as io.ts:line (signature + deps destructure) + a test (green), plus grep/proof that io.ts uses no direct node:fs/promises import in the write logic (only via deps)"
        status: done
        evidence:
          - "src/io.spec.ts 'createIo writes fully through fakeFs' — fs/lock/rand/pid from deps; atomicWrite end-to-end with fakeFs; grep 'node:fs' src/io.ts → comment only (only effect import: node:path/dirname, pure) (green)"
      - id: a2
        text: atomicWrite first writes to a temp sibling `<path>.tmp.*` and THEN calls rename(tmp,path) — the order writeFile→rename is provable; before the lock acquire, mkdir(dirname,{recursive:true}) is called — evidence as io.ts:line (write-then-rename + mkdir) + a test with fakeFs that asserts the call sequence (mkdir, lock, write, rename, release) (green)
        status: done
        evidence:
          - src/io.spec.ts 'atomicWrite sequence' — calls === [mkdir:base, acquire, write:…tmp.999.RND, rename, release] (write-then-rename, mkdir before lock) (green)
      - id: a3
        text: A nested slug (e.g. `epicA/01-task`) creates the parent directory via mkdir -p; a flat single slug creates NO additional subdirectory (only the file in the existing tasks dir) — evidence as io.ts:line + two tests (nested produces an mkdir call for the sub-path; flat does not), test output green
        status: done
        evidence:
          - src/io.spec.ts 'nested slug mkdir -p; flat does not' — nested 'base/epicA/task.yml' → mkdir:base/epicA; flat 'base/task.yml' → mkdir:base, no mkdir:base/* (green)
      - id: a4
        text: On an unreachable lock atomicWrite throws WriteContention with an actionable message; the lock is released via finally in EVERY path (even on write error) — evidence as io.ts:line (try/finally + WriteContention) + two tests (lock timeout throws WriteContention; write error still calls release), test output green
        status: done
        evidence:
          - src/io.spec.ts 'lock timeout → WriteContention; write error releases' — lockFails → WriteContention; writeFails throws, calls contains 'release' (finally) (green)
      - id: a5
        text: "Quality gates green for core/: lint, format, typecheck, test — evidence as copied command output per gate (exit 0)"
        status: done
        evidence:
          - "4 gates exit 0: eslint, prettier --check, tsc --noEmit, bun test (35 pass/0 fail)"
  - name: Round-trip stability — parse→render→parse idempotent over all tiers
    slug: round-trip-stability
    status: done
    context: |
      Integration proof that parser + io are stable together: the binding
      promise is parse(render(parse(raw))) == parse(raw) (idempotent) over
      the real tier fixtures (task.example.yml, epic.example.yml) and prose-
      heavy nodes. Verifies that the block-scalar emission + directive
      injection do NOT alter data and that the no-alias protection survives
      round-trips. Plus: atomicWrite(render(node)) → readFile → parseNodeYAML yields
      the same node (write path end-to-end, deterministic with fakeFs).
      All building blocks are factories; the round-trip test wires them with fakes
      (fakeFs, real yaml seam) — no real CC/spawn.
    rules:
      - path: .claude/rules/factory-functions.md
        why: Round-trip wires the parser/renderer/io factories with injected fakes
      - path: docs/design/fractal-redesign-notes.md
        why: Markdown=block-scalar, directive does not round-trip through the parser → renderer is single injection point
    acceptance_criteria:
      - id: a1
        text: For the fixtures task.example.yml AND epic.example.yml, parse(render(parse(raw))) deep-equals parse(raw) (idempotent, incl. prose fields + order) — evidence as test-file:line + test output green for both tiers
        status: done
        evidence:
