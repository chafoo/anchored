context:
  plan: "Drei Stränge in einem Task: (1) NODE_SLUG — neue Variable im Build-Skill-Variablenvertrag (Slug des gerade gebauten Knotens; schließt die Lücke, dass EPIC_SLUG zur Epic-eigenen Build-Zeit leer ist); rein orchestrator-injiziert, kein Engine-Code. (2) Nesting-Fix — die just-in-time Task-Anlage im Epic-Build nutzt den verschachtelten Slug <epic>/<stub>, damit Task-Files im Epic-Ordner liegen statt nach tasks/ zu zerstreuen; Prosa-only, layout.ts ist bereits korrekt, Konvention settled in docs/design/v3/ticket-3-findings.md. (3) Starter-Example unter docs/examples/task-app/ (anchored.yml 1:1 aus anchored-test mit epic/task-app -> ${NODE_SLUG}, Ticket.md 1:1, flache rules/, neue englische README; kein committetes .claude/anchored/). Harte Gates: guard-prose.sh bleibt gruen (keine Jargon-Begriffe in Tabellenzellen, Sentinel-Strings intakt); docs/examples/ ist Produkt-Content -> Englisch; CLI-only. Phasen: skill-fixes, config-ref (parallel), example-files (haengt an skill-fixes), prose-gate (haengt an allen)."
  refine: "plan-check (auf intense eskaliert): alle Pfade/Zeilen stimmen (build/SKILL.md 205-210 + 214 + 127-128, setup 66-68, anchored-config 127-143, layout.ts 21-40 nestet korrekt, guard-prose Sentinels da, anchored-test-Quelldateien vorhanden, api.md/agent-contract.md nutzen bereits <epic>/<task>). Echter Fund: epic/task-app steht in 6 Strings ueber 4 Steps — pauschale NODE_SLUG-Ersetzung bricht die Task-Tier-Steps; korrekt ist NODE_SLUG fuer Epic-Steps, EPIC_SLUG fuer Task-Steps (q2 aufgeloest, pruefbares AC ergaenzt). Scope-Luecken geschlossen: plan/wrap-Variablentabellen-Konsistenz (a7), anchored.yml-Kommentar erklaert Zwei-Variablen-Muster (a9). rules-check: Coverage gruen (cli-only, Sprache=Englisch, no-abbrev, guard-prose-Gate als prose-gate-Phase); 2 ACs auto-ergaenzt (no-abbrev auf skill-fixes a6, Englisch fuer Ticket.md+anchored.yml a8). Nicht-anwendbare Regel-Familien korrekt ausgeschlossen (factory-functions, colocation, test-file-naming, fractal-substrate — kein core/src-Code)."
questions:
  - id: q1
    text: |-
      NODE_SLUG is documented in the skill prose and used in the example anchored.yml, but the engine (cli/layout.ts, the build runner) does not currently inject a NODE_SLUG environment variable — only TASK_SLUG, PHASE_SLUG, PHASE_NAME, and EPIC_SLUG are injected today. The example anchored.yml uses ${NODE_SLUG} in ensure-epic-branch (and potentially ensure-task-branch) to replace the hardcoded 'epic/task-app' literal. If NODE_SLUG is not injected at runtime, the shell expansion will produce an empty string and the git commands will silently fail.
      Recommendation: Define NODE_SLUG injection as in-scope for this task — a one-line addition to the build runner that sets NODE_SLUG to the epic slug when running epic.build steps, and to the task slug when running task.build steps (i.e. NODE_SLUG = EPIC_SLUG if at epic tier, else TASK_SLUG). This is a pure substrate/mechanism addition (not policy), consistent with fractal-substrate-integrity.md, and the example becomes immediately functional.
      Implications:
      - If in-scope: the example anchored.yml is fully functional out of the box; adds a small engine change to phase skill-fixes (or a new phase), which is outside the pure-prose scope originally framed but is necessary for the variable to exist at runtime.
      - If out-of-scope (prose-only): the example anchored.yml must NOT use ${NODE_SLUG} — it would need to retain the 'epic/task-app' literal, defeating the purpose of the variable; the skill docs would describe a variable that does not yet exist, which is misleading.
      - A middle path: document NODE_SLUG as 'planned, not yet injected' in the skill prose, use a comment in the example anchored.yml explaining the workaround — keeps this task prose-only but requires a follow-up task before the example is usable.
    priority: high
    status: resolved
    answer: "Prosa-only, kein Engine-Code: NODE_SLUG wird als Env-Var vom Build-Skill-Orchestrator gesetzt."
    source: ai
    reasoning: "Verifiziert in plugin/skills/build/SKILL.md (~Z.198-216): Step-Env-Vars setzt der Orchestrator ('you make them real env vars'), nie die Engine/CLI. NODE_SLUG injizieren = eine Zeile in der Variablen-Tabelle + im bash-Beispiel; der Orchestrator kennt den eigenen Slug (er rief /a:build <slug> auf). Konsistent mit der Nutzervorgabe 'kein Engine-Code'. Scope bleibt in Phase skill-fixes."
  - id: q2
    text: "The anchored-test anchored.yml has the epic/task-app literal hardcoded in SIX operational instruction strings (lines 82, 95, 114, 125 — in ensure-task-branch, squash-merge, ensure-epic-branch, merge-to-main). The plan says 'replace epic/task-app with ${NODE_SLUG}' but NODE_SLUG is only defined for the epic tier (epic-build context). At task-build time the variable is TASK_SLUG, not NODE_SLUG. The plan's AC a2 says the example uses ${NODE_SLUG} across all four steps — but the ensure-task-branch and squash-merge steps run at task-build, where NODE_SLUG would refer to the task slug, not the epic slug. The correct replacement is EPIC_SLUG in task/wrap steps (ensure-task-branch: git checkout epic/${EPIC_SLUG}; squash-merge: git checkout epic/${EPIC_SLUG}) and NODE_SLUG in epic-build steps (ensure-epic-branch: git checkout -B epic/${NODE_SLUG}; merge-to-main: git merge --no-ff epic/${NODE_SLUG}). Recommendation: define NODE_SLUG as the slug of the node currently being built at THAT tier: epic-build → epic slug; task-build → task slug. Then update AC a2 (example-files) to specify per step which variable fills which slot — ${NODE_SLUG} in epic steps, ${EPIC_SLUG} in task steps — rather than a blanket 'NODE_SLUG everywhere'. Implications: (1) if NODE_SLUG is defined as 'current node slug at any tier', then at task-build NODE_SLUG = TASK_SLUG, which is redundant but consistent — however the git commands would produce branch name epic/task-app-foundation, not epic/task-app, breaking the workflow; (2) the four task/wrap steps each need a specific variable call-out in the AC; (3) the variable-contract table row for NODE_SLUG must state 'epic slug when in epic-build, task slug when in task-build' and the example anchored.yml comments must explain the two-variable pattern."
    priority: high
    status: resolved
    answer: "Tier-korrekte Zuordnung: Epic-Schritte (ensure-epic-branch, merge-to-main) nutzen epic/${NODE_SLUG}; Task-Schritte (ensure-task-branch, squash-merge) nutzen epic/${EPIC_SLUG}. NODE_SLUG = Slug des Knotens, dessen Stage laeuft."
    source: ai
    reasoning: "plan-check (auf intense eskaliert) hat verifiziert: epic/task-app steht in 6 Strings ueber 4 Steps. Pauschal NODE_SLUG bricht die zwei Task-Tier-Steps (dort waere NODE_SLUG der Task-Slug task-app/foundation -> epic/task-app/foundation). EPIC_SLUG ist im Epic immer = task-app und damit fuer Task-Steps korrekt; NODE_SLUG fuellt nur die Luecke der Epic-eigenen Steps, wo EPIC_SLUG leer ist. Eine richtige Antwort, kein Praeferenz-Fork."
