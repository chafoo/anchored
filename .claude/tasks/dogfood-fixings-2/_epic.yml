questions:
  - id: q1
    text: "D1 form: does the epic get the full lifecycle symmetry with the same words as task (planâ†’draftedâ†’refinedâ†’buildâ†’wrapâ†’done)?"
    priority: high
    origin: dogfood
    status: resolved
    source: user
    answer: "Yes â€” full symmetry, identical words for all tiers. With that, plan/refine/build/wrap run the same stage transitions on every tier; the skills' tier branching falls away at the root."
  - id: q2
    text: "D2 home of the per-task acceptance criteria: where do the outcome acceptance criteria worked out in epic-refine live?"
    priority: high
    origin: dogfood
    status: resolved
    source: user
    answer: "At TaskStub.acceptance[] in the _epic.yml, built like the acceptance criteria in the task file, only at outcome / whole-task level. Two acceptance-criteria levels: epicâ†’task acceptance criteria (outcome, at the stub) vs taskâ†’phase acceptance criteria (build level, from the just-in-time plan-task). The wrap roll-up validates phase acceptance criteria against the stub task acceptance criteria."
  - id: q3
    text: "Stub status vs epic's own lifecycle: does the TaskStub status (queue marker) stay separate from the full epic lifecycle (D1)?"
    priority: medium
    origin: dogfood
    status: resolved
    source: ai
    answer: "Yes â€” the stub status stays queue semantics (pending|active|done|blocked), separate from the epic's own lifecycle (planâ†’â€¦â†’done). The build skill uses 'active' (not 'in-progress') to mark an epic child active â€” that is the skill side of G2."
    reasoning: "Stub status is a loop-queue marker of the parent, not the lifecycle of the child task; mixing them would only shift G2. Minimally invasive, overridable by the user."
  - id: q4
    text: "G1 error surface: on a parse failure in persist(), throw a typed anchoredError('InvalidNode', tier+slug+field path) instead of a raw ZodError?"
    priority: medium
    origin: dogfood
    status: resolved
    source: ai
    answer: "Yes â€” typed anchoredError('InvalidNode') with a localized one-line message (tier+slug+field path+reason), so the CLI emits the same JSON error envelope as any other op. Validate as a guard, but write the original node (render(node)), not the parsed projection â€” field order/intended keys stay."
    reasoning: "Consistent CLI JSON errors + human-localized; parse-as-guard avoids silently rewriting the on-disk form. Overridable by the user (exact kind string)."
  - id: q5
    text: "D1 legacy-wording migration: hard-rename the existing epic statuses planning/building (plus a one-time migration of existing _epic.yml) OR map them as aliases onto the new words? Affects all existing epic files (incl. dogfood-fixings-1, this file)."
    priority: high
    origin: dogfood
    status: resolved
    source: user
    answer: "Hard rename â€” we are not live, so no alias/compat layer. planning/building disappear entirely; the existing _epic.yml (dogfood-fixings-1, this file) are adjusted directly to the new words (planningâ†’plan, buildingâ†’build). No migration code, just a clean cut."
  - id: q6
    text: "Project tier: pull the project tier (schema/tiers/project.ts, currently also planning|building|done, RESERVED/not rolled out) onto the full symmetry in the same pass, or deliberately leave it reserved/untouched until it is needed?"
    priority: medium
    origin: dogfood
    status: resolved
    source: user
    answer: "Project tier stays out FOR NOW â€” we leave projects out of the phase for now, the epic tier has to be tested first. All tiers should have the same form in the end, but project NOT in this epic. If project-symmetry code has already slipped in: out. Scope of this epic = only epic (+ task/phase)."
  - id: q7
    text: "D2 roll-up strictness: does a child task whose delivered phase acceptance criteria do NOT fully cover the stub's outcome task acceptance criteria block (hard), or does the roll-up only report the gap as a finding/question (soft)? Determines how binding the epicâ†’task contract is."
    priority: medium
    origin: dogfood
    status: resolved
    source: user
    answer: "Hard with a reconcile seam: the roll-up BLOCKS on a gap (phase acceptance criteria do not cover an outcome stub acceptance criterion) â€” the epic cannot go done. But the gap lands as a question in the walk, which the user resolves: (a) acceptance criterion is met after all + evidence â†’ resolved, (b) re-open task â†’ rebuild, (c) acceptance criterion was too strict â†’ revise. A binding contract, but no dead false-stop. Run it hard for now and observe â€” the strictness is adjustable later."
  - id: q8
    text: "Epic loop parallelism (task level): should INDEPENDENT child tasks (same depends_on level, e.g. the three tabs features clear-completed/filter-bar/task-counter) in the epic build loop be built IN PARALLEL instead of serially? This is the BIGGER time lever â€” the 44-min run was mostly serial tasks, not serial phases. Phase fan-out (G12/e10) and task fan-out are two separate levels. Recommendation: yes, parallel tabs builds as a second fan-out level â€” but a scope decision (its own task in THIS epic, or only after the first green epic rerun?)."
    priority: medium
    origin: dogfood
    status: resolved
    source: user
    answer: "Yes â€” into THIS epic as its own task (epic-task-fanout). Both fan-out levels get built: phase fan-out (G12) AND task fan-out (independent child tasks of the same depends_on level in parallel in the epic loop). The bigger time lever comes right in with it."
tasks:
