goal: |
  The epic dogfood (skill-orchestrated runtime against ~/Dev/anchored-test:
  /a:plan epic â†’ refine â†’ build over the 4-task tabs app) ran through on the
  functional side (app built), but surfaced 11 real defects + two structural gaps
  that the unit tests had masked. Two roots:

    1. The write path does not validate â€” persist() writes unchecked, the schema
       only kicks in on read â†’ an invalid mutation = ok:true, breaks on the next
       read (one epic became unreadable and had to be repaired by hand).
    2. The skills are task-tier-coded â€” the epic tier gets task vocabulary
       (context.plan, drafted/refined/wrap, in-progress) that does not exist there.

  This epic hardens the substrate (G1 keystone: validate-before-write), closes
  the test gap (full-lifecycle e2e per tier), and pulls in two redesigns decided
  by the user: D1 â€” the epic gets the FULL lifecycle symmetry (same words as task:
  planâ†’draftedâ†’refinedâ†’buildâ†’wrapâ†’done); D2 â€” epic-refine becomes a REAL stage
  with per-task acceptance criteria at the TaskStub (outcome level), against which
  the wrap roll-up validates.

  Source of all findings + root cause + fix idea + file:line:
  `.claude/temp/dogfood-findings-2.md` (G1â€“G11, D1/D2, V1). The full task
  elaboration (goals, outcome acceptance criteria, detail questions per task) lives
  in `.claude/temp/dogfood-fixings-2-elaboration.json` â€” the basis for fleshing out
  the task files. Completion evidence: a third dogfood rerun (task + epic) runs
  end-to-end cleanly through the fixed CLI.
