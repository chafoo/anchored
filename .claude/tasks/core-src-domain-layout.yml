slug: core-src-domain-layout
status: build
created: 2026-06-13
title: Domain-Oriented Layout for core/src
context:
  intro: 'core/src is today a technical layer-cake (config/io/cli/parser/ops/engine/schema/state)
    where the domain is invisible in the folder structure and each core concept is scattered across
    many folders: a "Tier" lives in schema/tiers, ops/tier-derive.ts, ops/engine-ops.ts,
    state/transitions and cli/commands/plan; "Stage" is hardcoded in ops/validate (const STAGES)
    with no central home; the ops/ folder bundles eight unrelated responsibilities under a name that
    signals none of them, and cli/ mixes pure JSON transport with real domain logic
    (classifyTier/slugFromInput in cli/commands/plan). The full target — three domain-oriented
    layers domain/ (definitions+rules), store/ (the persist+mutate mechanism heart) and
    orchestration/ (steps→plan), plus separate config/ and a transport-only cli/ — is fully worked
    out in .claude/temp/codebase-refactor-plan.md (§4 target, §6 migration order). This is a PURE
    move-+-rename migration with NO behavior change: factory signatures, deps-injection, the hard
    invariant in invariants.ts, and the public package surface (index.ts exports createAnchored +
    re-exports tierOfNode; bin.ts) all stay intact — only file locations and internal import paths
    move. The migration presupposes the parallel test-file-naming migration (Phase 0, owned by
    another instance) is complete and the suite is green; that green, path-independent suite is the
    safety net that makes the moves verifiable. After migration the ops/, engine/, parser/, schema/
    and state/ folders no longer exist (fully dissolved).'
  plan: >-
    - Discovery confirmed all source paths exist as planned, with no material deviation from the §4
    target.

    - Tier-derivation duplication is real and verified: ops/engine-ops.ts:13-18 tierOfNode(node)
    (sync, from children, epic|task) AND ops/tier-derive.ts:12-31 makeTierFor(io,pathFor) (async,
    reads file, also detects phase). Both unite into domain/tiers/tiers.ts; both export names must
    be preserved (tierOfNode is re-exported from index.ts).

    - Test-discovery is structurally move-safe: bunfig.toml uses root='src' + bun's built-in .spec
    matcher; package.json test:e2e/test:int collect via `find src -name '*.e2e.ts'` (recursive,
    name-based); tsconfig.build.json excludes via src/**/*.{spec,e2e,int}.ts globs. All three are
    path-agnostic for moves WITHIN src/ — so no glob editing is needed, only verification that every
    suffix is still collected after the moves.

    - The parallel test-file-naming instance is renaming specs concurrently (.spec/.int/.e2e).
    Phases therefore bind to behavior + green gates, never to exact spec filenames — each spec moves
    with its subject regardless of kind-suffix.

    - Per-phase evidence source is uniform: each step is its own commit and the quality-gates (lint,
    format, tsc --noEmit, bun test incl. e2e/int, bun build) are green afterwards. That green-gate
    run IS the proof of no-behavior-change.

    - Migration order follows §6 (domain → store → orchestration+delete-ops → cli → docs/verify) so
    each step keeps the tree green and individually reviewable.

    - plan-check (2026-06-13, all confirmed against code): every source path resolves. Tier
    duplication real — ops/engine-ops.ts:13 tierOfNode (sync, from children) + ops/tier-derive.ts:12
    makeTierFor (async, reads file, detects phase); index.ts:13 imports + re-exports tierOfNode
    (`export { tierOfNode }`), index.ts:14 imports makeTierFor — both must survive the merge into
    domain/tiers/tiers.ts. STAGES hardcoded at ops/validate/validate.ts:11 (TIERS at :10).
    classifyTier (plan.ts:25, exported) + slugFromInput (plan.ts:10, module-local) in
    cli/commands/plan/plan.ts. engine/ contains only scope/resolve-steps/ (+
    resolve-injection.spec.ts) → dissolves cleanly. state/ = transitions + invariants. parser/ =
    parse/ + render/ + a parser-root roundtrip.spec.ts.

    - plan-check (parallelism): domain → store → orchestration touch progressively dependent paths
    (store imports domain/lifecycle/stages; orchestration's ops/ deletion depends on store having
    vacated it) → correctly serialized, NOT parallelizable. cli-restructure depends on index.ts's
    re-export source having moved to domain/tiers first. Serial §6 order is right.
  build:
    plan-check: "verdict: needs-attention (additive only — no drift). All source paths verified against
      code (tier-duplication engine-ops+tier-derive, STAGES@validate:11, classify/slug@plan.ts,
      empty engine/). No hidden architecture defaults — §5 cut-depth stays open as q1/q2.
      Auto-fixes: 0 path_patches, 0 rule_additions, 2 info_notes (folded into plan-trail). 5
      clarifying questions added (2 medium: store/validate→cli StepPlan upward-dep [q10], cli
      steps.ts + scope/lifecycle placement [q11]; 3 low: project.ts/tiers.spec move [q8],
      ops/scope/log flat-vs-folder [q9], parser-root roundtrip.spec home [q12]). ACs are path-robust
      (bound to green gates, not exact spec filenames)."
    rules-check: "verdict: needs-attention (additive coverage fixes). Systematic gap:
      tooling-quality-gates was attached only to phase 5 though every phase carries the verbatim
      green-gate AC → added to phases 1-4. test-file-naming (new orthogonal kind-suffix rule) was
      attached nowhere → added to all 5 phases (each relocates specs; the green proof runs bun test
      over the bare .int/.e2e suffixes whose discovery hinges on the bunfig.toml glob). 0 orphaned
      rule refs (all 6 paths exist), 0 cross-phase conflicts (the four base rules are mutually
      reinforcing; test-file-naming declares itself orthogonal to colocation). 2 low scoping
      questions added (test-file-naming.md in the cross-ref sweep [q13]; whether suffix-integrity is
      in scope here or owned by the parallel instance [q14])."
    task-validate: "- domain-layer (attempt 1) — verdict: PASS. task-validate: 5/5 ACs accepted, re-ran
      gates independently (lint 0, prettier clean, tsc 0, bun test 210 pass/0 fail, build 0).
      code-validate: PASS, all 6 phase rules clean (no index.ts/barrel under domain/, tiers.ts keeps
      pure injected helpers tierOfNode+makeTierFor unchanged, invariants.ts intact as data-model
      invariant, STAGES centralized, .js suffixes + spec-colocation preserved). One non-blocking
      warn (deferred to phase 5): stale header comment `// state/invariants.ts` in
      domain/invariants/invariants.ts:1 (cosmetic path label). No emergent decision matched a
      build.stop rule; no questions raised."
phases:
  - name: Domain Layer + Unified Tier Derivation
    slug: domain-layer
    status: done
    context: "Build domain/ via pure moves (plan §6 steps 1-3): schema/tiers→domain/tiers,
      schema/step→domain/steps, schema/config+schema/custom-fields→domain/config-schema,
      state/transitions→domain/lifecycle/transitions, state/invariants→domain/invariants,
      engine/scope/resolve-steps→domain/steps/resolve-steps. Then UNITE the two tier derivations:
      ops/engine-ops.ts (tierOfNode, sync) + ops/tier-derive.ts (makeTierFor, async, detects phase)
      → domain/tiers/tiers.ts, preserving BOTH export names (tierOfNode is re-exported in index.ts).
      Centralize the hardcoded STAGES (ops/validate/validate.ts:11) into domain/lifecycle/stages.ts;
      consumers import from there. Folder main files are named after the folder (tiers/tiers.ts); no
      index.ts, no barrels — imports point at the source module. Specs move with their subjects.
      invariants.ts stays a data-model invariant — do NOT turn it into a step. Codemod rewrites
      relative import paths only; .js suffixes stay."
    rules:
      - path: .claude/rules/colocation-and-naming.md
        why: new domain/ folders each get a folder-named main file (tiers/tiers.ts, stages.ts), no index.ts,
          no layer-aggregator barrel (domain/domain.ts forbidden); specs colocate with their moved
          subjects
      - path: .claude/rules/factory-functions.md
        why: uniting engine-ops + tier-derive must keep both as injected/pure helpers with unchanged
          signatures — no new singleton, no createX→free-function drift
      - path: .claude/rules/fractal-substrate-integrity.md
        why: this phase moves invariants.ts (the hard ac→done evidence rule) and dissolves part of the
          mechanism layer; the invariant must stay in the data model, not migrate into a step, and
          no mechanism may drift to policy
      - path: .claude/rules/cli-only-transport.md
        why: STAGES centralization touches what cli/commands consume; the stages constant is domain, not
          transport
      - path: .claude/rules/tooling-quality-gates.md
        why: this phase's no-behavior-change proof IS the green gate set (lint, format --check, tsc
          --noEmit, bun test incl. e2e/int, bun build) on the Bun/Node-compatible toolchain
      - path: .claude/rules/test-file-naming.md
        why: specs move with their subjects here; the green-gate proof runs bun test including the bare
          .int/.e2e suffixes, whose discovery depends on the bunfig.toml glob — moved specs must
          keep their kind-suffix and stay discoverable
    acceptance_criteria:
      - text: domain/ exists with tiers/, lifecycle/ (stages.ts + transitions/), steps/ (step.ts +
          resolve-steps/), invariants/ and config-schema/, each populated only by moved code (no
          behavior change).
        status: done
        evidence:
          - "`find core/src/domain -type f` → 20 files: tiers/ (epic.ts, task.ts, phase.ts,
            project.ts, tiers.spec.ts, tiers.ts), lifecycle/ (stages.ts +
            transitions/transitions.ts+.spec), steps/ (step.ts+.spec +
            resolve-steps/resolve-steps.ts+.spec+resolve-injection.spec), invariants/
            (invariants.ts+.spec), config-schema/ (config.ts+.spec + custom-fields.ts+.spec) — all
            moved code, no behavior change."
          - Moves done via git mv (commits d099eff/16ce221/6924cb9 show R-renames); emptied parents
            schema/, state/, engine/ removed.
          - "bun test green after moves: 146 unit + 4 e2e + 60 int = 210 pass / 0 fail — proves no
            behavior change."
      - text: ops/engine-ops.ts and ops/tier-derive.ts no longer exist; both their export names (tierOfNode
