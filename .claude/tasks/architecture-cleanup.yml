  wrap:
    intro: >-
      ## Wrap-up summary


      **Shipped**: 4 of 4 phases done. The low-severity architecture gaps from
      `.claude/temp/repo-analysis.md` §4 are closed: mechanism/policy line tightened, the evidence
      guarantee centralized, the published artifact made Node-clean, and two colocation stragglers
      swept. 4 commits: 35f61c5 (A6 worker-dispatch roster out of engine/ → ops/scope/), d95d45d (A7
      epic-DoD guard → state/invariants), 6f4eb19 (A10 Bun types out of the published build),
      4c55789 (cli straggler specs + file-structure doc reconcile).


      **Blocked/Deferred**: none. All phases terminal=done. (The originally-planned A8 spawn-seam
      phase was removed during refine — see decision below — and lives on as the separate
      `remove-headless-engine-path` task.)


      **ACs with evidence**: 14 of 14 (100% honest completion). Every AC carries concrete evidence
      (git-mv rename ratios, byte-identical error proof, tsc emit results, exact gate numbers).


      **Zero behavior change, proven**: `bun test` held green throughout — 274 → 275 (the single +1
      is A7's new focused helper test, not a behavior change); the build config tightening (A10) is
      the only deliberate change and it's verified to keep the build compilable. 8/8 build-time gate
      runs PASS (per-phase task-validate + code-validate).


      **Autonomous decisions (review these)**: 3 `source='ai'` refine-stage calls + 1 build-time
      deviation.

        worker-dispatch-relocate
        - q3: the rules-scan → plan-rules-scan mapping is NOT dangling, so neither add nor drop it — plugin/agents/plan-rules-scan.md already exists; the only work was deleting the stale NOTE comment that wrongly claimed the agent must still be added.

        colocation-stragglers
        - q4: only reconcile doc entries the tree already names — do NOT add a worker-dispatch line file-structure.md never listed; that AC2 clause is a conditional no-op (avoids scope-creep, keeps the doc delta minimal).
        - q5: file-structure.md:119-122 stays as the whole-blockquote span — line numbers are navigational anchors, the build agent matches the claim by content not by exact line; no AC churn.

        build-tsconfig-types (BUILD-TIME deviation, both validators flagged + accepted)
        - A10: shipped `types:["node"]` instead of the refine note's planned `types:[]`. Reason: bun-types transitively supplies @types/node, so `[]` strips Node globals too and breaks 23× on legitimate `node:*` usage in bin.ts/io.ts. `["node"]` keeps Node, excludes Bun — it meets the AC's actual goal (Bun types out of the published build) better than the literal plan. A correctness improvement, not a defect; verified by both task-validate + code-validate.

      **Notable findings during build**: each implement pass self-caught its own depth/runtime
      hazards before committing (A6 spec fixture-URL depth, A10 the `[]`→`["node"]` correction).
      Every red gate was fixed pre-commit; no phase committed dirty.


      **Notable findings from review** (post-build code-reviewer over the full diff — detail in the
      review subsection): all 4 changes CLEAN — A7's error is byte-identical (verified against git
      diff), A10 keeps the build genuinely Bun-free (zero Bun.* in production source), all
      moved-spec import depths + fixture paths resolve, the e2e rename did not collide with the
      pre-existing lifecycle-e2e.spec.ts. Two PRE-EXISTING items surfaced (neither introduced by
      this task, both follow-up candidates):

      - worker-dispatch.spec.ts's NAMES array lists 13 entries + says "all 13", but DEFAULT_WORKERS
      has 15 (missing epic-plan-check + epic-decompose from the static list). A6 relocated the file
      unchanged; the a3 test covers the gap dynamically + the suite is green. Recommend a follow-up
      to sync the static NAMES list + its "13" comment to the real 15-entry roster.

      - cli/cli.e2e.spec.ts has an .e2e.spec.ts name but lives in cli/ not e2e/ — a placement
      inconsistency predating this task; candidate for a future colocation sweep.


      **Outcome vs plan**: shipped as planned minus the deliberately-removed A8 phase. The notable
      refinements vs the original plan: (1) the whole task was enlarged mid-stream — the
      colocation-stragglers phase was folded in from the colocation-migration wrap review, which is
      exactly the kind of cross-task follow-up anchored is meant to absorb; (2) A10's `types:[]` →
      `types:["node"]` correction is the one substantive plan deviation, and it's a strict
      improvement the validators confirmed. Phase ordering (A6 first so the later doc-reconcile
      builds on its result) held. Net: a clean, fully-evidenced architecture tidy-up with no
      behavior change and two small pre-existing follow-ups surfaced for later.
    subsections:
      review: >-
        Review over the cumulative diff (35f61c5~1..4c55789, code-reviewer agent). 4 small targeted
        changes, already corroborated by 8 PASS gate runs. Verdict: CLEAN — no regressions, no
        broken paths, no Bun leak.


        - A7 (only logic-touching change): assertEpicAcHasEvidence at invariants.ts:53-67 is
        BYTE-IDENTICAL to the old inline throw — error name 'AcceptanceNoEvidence', message
        template, suggestion literal all match; condition `status==='done' &&
        (!merged||merged.length===0)` preserved exactly (deliberately NOT unified onto
        isEvidenceFilled which filters whitespace+sentinel). The `merged` construction at the
        call-site (node-ops.ts:326-327) is unchanged, so the guard fires on undefined/[] and passes
        on non-empty exactly as before. invariants.spec.ts a5 pins name+message+suggestion, so
        future drift is test-caught. No caller behaves differently.

        - A10 (build config): tsconfig.build.json types:["node"] override verified correct — zero
        Bun.* in production source (grep), so the runtime is genuinely Bun-free; import.meta comes
        from lib:["ES2022"] (not @types/bun); @types/node covers all node:* + NodeJS.* usage. Build
        compiles + emits clean, no masked Bun usage surfaced.

        - A6 + straggler moves (pure git-mv): all import depths + the readFileSync fixture path
        (worker-dispatch.spec.ts:47 ../../../../default-template/...) resolve correctly; the e2e
        rename (lifecycle.e2e.spec → archive-reset.e2e.spec) does NOT collide with the pre-existing
        e2e/lifecycle-e2e.spec.ts (distinct files confirmed).


        PRE-EXISTING finding (NOT introduced by this task, worth a tiny follow-up):
        worker-dispatch.spec.ts NAMES array (lines 7-21) has 13 entries + the a1 test title says
        "all 13 default step names", but DEFAULT_WORKERS in worker-dispatch.ts has 15 (missing
        epic-plan-check + epic-decompose from the static list). A6 relocated the file unchanged, so
        this predates these commits; the a3 test covers the gap dynamically (iterates all tiers,
        every step resolves) and the suite is green at 275. Recommend a follow-up to sync the a1
        NAMES list + its "13" comment to the real 15-entry roster.


        Also surfaced (pre-existing, out of scope): cli/cli.e2e.spec.ts has an .e2e.spec.ts name but
        lives in cli/ not e2e/ — placement inconsistency predating this task; candidate for a future
        colocation sweep.
