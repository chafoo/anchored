questions:
  - id: q1
    text: "A8 direction (product decision): do we COMMIT to the headless spawn path now — bin.ts feeds
      real exec/agent deps so `anchored build` can run autonomously headless — or keep it
      deliberately INERT and just document it (the skill path drives spawning in-session; headless
      is future work)? This decides whether v2 invests in the headless engine path at this stage."
    priority: high
    origin: plan-agent
    phase: spawn-seam
    status: resolved
    answer: "Rip the whole headless / engine-drives-AI path OUT — as its own dedicated task
      (remove-headless-engine-path), not part of architecture-cleanup. The reason is valid +
      documented (refine.ts:3-6, dogfood F11): a headless `claude -p` subprocess can't reach the
      session's Task tool, so the skill-orchestrated runtime won and the engine.run + spawn path
      never runs live. The spawn-seam phase is therefore removed from this task."
    source: user
    created_at: 2026-06-13T10:09:42.956Z
    resolved_at: 2026-06-13T11:41:56.198Z
  - id: q2
    text: "Cross-task ordering: A6 moves `worker-dispatch.ts` from `engine/scope/` to `ops/scope/`,
      while `colocation-migration` also relocates/colocates it within engine/scope. To avoid one
      undoing the other, do A6 FIRST (establishes the correct ops/scope/ home) and let colocation
      then colocate it there — or fold A6 into the colocation task entirely? Default: A6 first (it
      is a mechanism/policy correctness move, not just cosmetic)."
    priority: medium
    origin: plan-agent
    phase: worker-dispatch-relocate
    status: resolved
    answer: "A6 owns worker-dispatch: this task moves it out to ops/scope/ AND colocates it there;
      colocation-migration deliberately excludes it (already decided in the colocation refine). A6
      runs first / independently. Note: worker-dispatch survives the upcoming headless-path rip-out
      — it's the DEFAULT_WORKERS roster consumed by ops/steps-planner (skill path), so moving it to
      ops/ is even more clearly correct."
    source: user
    created_at: 2026-06-13T10:09:50.284Z
    resolved_at: 2026-06-13T11:42:08.448Z
  - id: q3
    text: "`worker-dispatch.ts:12-14` maps `rules-scan` to a `plan-rules-scan` agent that the plugin
      roster does not yet have (it only lists `refine-rules-check`). Add the missing
      `plan-rules-scan` agent to `plugin/agents/`, or drop the dangling mapping until that agent
