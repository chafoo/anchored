# yaml-language-server: $schema=https://raw.githubusercontent.com/chafoo/anchored/main/plugin/references/schema/task.schema.json
schema_version: 2
slug: anchored-v2-core/spawn
title: Execution substrate (spawn — headless claude -p)
status: done
created: 2026-06-10
context:
  plan: |
    SCOPE: The injected AI seam behind which the engine triggers workers.

    Delivers (BOTH modes fully — q2, no MVP):
      spawn.ts — the injected seam with a clear input/output contract, fakeable.
        Mode A: headless `claude -p`, granularity PER task-file (fresh instance),
                 phases IN-PROCESS → nesting capped at ~2. CI/headless, isolation.
        Mode B: in-process subagent mode — live progress, session-bound, observable.
        Selectable per config/flag; the runners only see the seam (factory-functions).
        WORKFLOW-capable: the seam must be able to start a unit as a Claude-Code workflow
        agent() too (the unit writes itself via CLI) → orchestration Task workflow-mode.

    DESIGN: engine-architecture.md ("deterministic engine vs. AI effects"; spawn
    as a pluggable dep) · fractal-redesign-notes.md (Item 2: headless claude -p per
    task-file, phases in-process; in-process subagent mode retrofittable later as a second impl
    without touching the runners) · file-structure.md (spawn.ts).
    V1-REF (logic template, rewritten in the factory pattern — no 1:1 port): no direct equivalent (v1 = MCP-driven). New, but narrow.

    DECIDED (q2): both modes. The seam must carry headless AND in-process.

    ROUGH PHASES: (1) spawn contract (input/output) + fake · (2) Mode A headless
    `claude -p` impl · (3) Mode B in-process subagent impl · (4) mode selection per
    config/flag · (5) tests with fake-spawn + one smoke per real mode.
  refine: |
    Detail decisions (source: ai): (1) ConfigSchema needed a global `spawn` block (mode: headless|subagent, model) — added additively in schema/config.ts; default config + all config/merge tests stay green. (2) Mode resolution Env (ANCHORED_SPAWN_MODE) > cfg.spawn.mode > default(headless). (3) Both modes behind ONE seam: headless via deps.exec (child_process wrapper at wiring time), subagent via deps.agent (CC agent()); spawn.ts imports NO child_process. (4) Real smokes (headless a4, subagent a5) as test.skip with documented reason (recursive claude -p / no session agent in bun test) — Seed phase 5 explicitly allows skipped.
  build: |
    1 module: spawn.ts (createSpawn + createFakeSpawn). Both modes (headless deps.exec / subagent deps.agent) behind an identical input/output contract; mode from Env>cfg>default; workflow executor hook passed through. Additionally config.ts global spawn block. 11 active + 2 skip tests. All 5 gates green, spawn.ts without child_process/Bun.*.
  wrap: |
    AI seam stands fully (both modes, fakeable, mode-blind for the runners, workflow start hook). createFakeSpawn is the test double for the engine tests. Ready as deps.spawn for engine. Real-mode verification is opt-in/in-session (documented).
questions: []
log:
  - at: contract-fake
    kind: decision
    note: "spawn seam: createSpawn(cfg,deps)→{run}; discriminated SpawnResult; createFakeSpawn as test double (calls[]). No child_process import — effects injected (exec/agent/env)."
  - at: subagent-inprocess
    kind: decision
    note: ConfigSchema global spawn block added (mode/model) — cross-task additive correction, default config stays valid. Workflow executor hook passed through for Task workflow-mode.
  - at: mode-select-gates
    kind: learning
    note: Real smokes opt-in/skipped (no claude-Auth recursion in CI, no session agent in bun test) — Seed explicitly allows skipped with reason.
phases:
  - name: spawn contract + fake (createSpawn seam)
    slug: contract-fake
    status: done
    context: |
      The injected AI seam as factory-function `createSpawn(cfg, deps)` in
      core/src/spawn.ts, returning a `{ run(input) → output }` — exactly the
      contract that worker-step + loop-step (Task engine) later call. NO real
      AI here: only shape + dispatch scaffold + an in-memory fake.

      input contract (at minimum): { tier, slug, stage, instructions, cwd?,
      context? } — enough for the engine to say "drive THIS node/worker".
      output contract: a discriminated result { ok: boolean, kind, evidence?,
      stdout?, error? } — structured, machine-parseable (CLI-only transport:
      the seam produces data, not free text).

      Mode selection is set up as a pure `cfg` field (e.g. cfg.spawn.mode: headless|subagent)
      + read in the dispatch; the concrete impls come in phase 2/3.
      `createFakeSpawn(scripted)` as an injectable test double: takes pre-scripted
      responses, records the received inputs (calls[]) — so the engine in
      Task engine is testable WITHOUT real CC (factory-functions: deps fakeable).

      Pure factory, no classes, no top-level side effects, no direct
      child_process import at module level (effect deps injected).
    rules:
      - path: .claude/rules/factory-functions.md
        why: createSpawn(cfg,deps)→{run}; deps injected; fake double; no classes/singletons
      - path: .claude/rules/fractal-substrate-integrity.md
        why: spawn = AI effect behind the seam, never directly in the control flow
      - path: .claude/rules/cli-only-transport.md
        why: output structured/JSON-like, not free text
    acceptance_criteria:
      - id: a1
        text: "core/src/spawn.ts exports `createSpawn(cfg, deps)`, which returns an object with async `run(input)`; input type carries at least tier/slug/stage/instructions, output is a discriminated { ok, kind, evidence?, error? } result. Types are exported. Evidence: spawn.ts:line of the signature + type definitions; `tsc --noEmit` green."
        status: done
        evidence:
          - "core/src/spawn.ts: createSpawn(cfg,deps)→{run(input)}; SpawnInput (tier/slug/stage/instructions/cwd?/context?/executor?) + discriminated SpawnResult {ok,kind,evidence?,stdout?,error?} exported; tsc --noEmit green"
      - id: a2
        text: "`createFakeSpawn(scripted)` exists, is injectable as deps.spawn, returns the pre-scripted results and records all received inputs in `calls[]`. Evidence: spawn.ts:line + a bun test that drives `run()` through the fake, asserts scripted output AND asserts `calls[0].instructions` (green test output)."
        status: done
        evidence:
          - src/spawn.spec.ts 'createFakeSpawn returns scripted results and records calls' — fake.spawn.run → scripted evidence; calls[0].instructions asserted (green)
      - id: a3
        text: "The mode is read solely from `cfg` (cfg.spawn.mode); an unknown/missing mode leads to a clear error instead of a silent default. Evidence: spawn.ts:line of the dispatch + test that asserts an error/`ok:false` on unknown mode (green)."
        status: done
        evidence:
          - src/spawn.spec.ts 'unknown spawn mode yields ok:false config-error' — mode 'bogus' → {ok:false, kind:'config-error'}, no silent default (green)
      - id: a4
        text: "No top-level side effect + no module-level child_process import: spawn.ts does NOT import node:child_process at module level as an immediately-used effect (only injected/lazy). Evidence: grep output over spawn.ts (no top-level effect imports) + lint green."
        status: done
        evidence:
          - grep -nE 'child_process|Bun\.' src/spawn.ts → only comments (no module import, no top-level effect); lint green
  - name: Mode A — headless `claude -p` (per task-file, phases in-process)
    slug: headless-claude-p
    status: done
    context: |
      The headless implementation behind the seam: calls `claude -p` as a fresh
      instance PER task-file (granularity = task-file, not phase), phases
      run IN-PROCESS within that instance → nesting capped at ~2
      (Item 2, fractal-redesign-notes).

      The actual process spawn goes through an injected `exec`/`runner` dep
      (e.g. deps.exec → node:child_process.spawn wrapper), NOT directly imported
      → fakeable. Reads the necessary flags/args from cfg (model/print format), builds
      the argv deterministically, passes `instructions` + cwd in, parses the
      structured result into an output result (phase-1 contract).

      Robustness (deterministic-code part): non-zero exit / timeout / empty
      result → clean { ok:false, error } instead of throw leak. Headless auth is a
      runtime precondition (no interactive login) — documented/checked as a precondition,
      not resolved at runtime.
    rules:
      - path: .claude/rules/factory-functions.md
        why: exec/runner as an injected dep, mode impl fake-tested
      - path: .claude/rules/tooling-quality-gates.md
        why: node:child_process, no Bun.* APIs in production code (Node-compatible)
      - path: .claude/rules/fractal-substrate-integrity.md
        why: error handling = deterministic code part, clean result
    acceptance_criteria:
      - id: a1
        text: "Mode headless builds the `claude -p` argv deterministically from input.instructions + cfg and calls the injected exec dep with it (no direct child_process call). Evidence: spawn.ts:line of the argv build + test with fake-exec that asserts the built argv (contains `-p`, instructions, cwd) (green)."
        status: done
        evidence:
          - src/spawn.spec.ts 'headless builds claude -p argv and passes cwd' — argv contains -p, instructions 'do X', --model; opts.cwd='/proj' to injected exec dep (no direct child_process) (green)
      - id: a2
        text: "Granularity is per task-file: one headless run corresponds to ONE claude-p instance per task, phases are run in-process (no second process spawn per phase). Evidence: test that asserts exactly ONE exec call over the fake for a task with ≥2 phases (green)."
        status: done
        evidence:
          - src/spawn.spec.ts 'one exec per task' — one task with 3-phase instructions → exactly ONE exec call (phases in-process) (green)
      - id: a3
        text: "non-zero exit / timeout / empty stdout of the subprocess become `{ ok:false, error }` instead of unhandled throw. Evidence: test with fake-exec that simulates exit≠0 and asserts `ok:false` + set `error` (green)."
        status: done
        evidence:
          - src/spawn.spec.ts 'non-zero exit / empty stdout yields ok:false' — exit 1 → {ok:false,kind:'exec-failed'}; empty stdout → kind:'empty-output' (no throw leak) (green)
      - id: a4
        text: "A real smoke (opt-in, behind an env gate/skippable when claude auth is missing) calls real `claude -p` with a trivial instruction and asserts a well-formed output result. Evidence: smoke test file:line + test output (green OR explicitly marked as skipped with reason)."
        status: done
        evidence:
          - src/spawn.spec.ts test.skip 'headless real smoke' — opt-in, EXPLICITLY SKIPPED with reason (avoids recursive claude -p / cost in CI; manually via ANCHORED_SPAWN_SMOKE=1 + real exec wrapper)
  - name: Mode B — in-process subagent (live progress, session-bound)
    slug: subagent-inprocess
    status: done
    context: |
      The second implementation behind the SAME seam: in-process subagent mode —
      session-bound, observable (live progress), no fresh process. Triggered via
      an injected `agent` dep (which in the main session represents the CC Task/
      agent() tool) → fakeable; the runners still only see the seam (worker-step/loop-step
      call `spawn.run`, not the mode).

      Evidence goal of seam stability: switching headless↔subagent happens ONLY
      via cfg.spawn.mode; neither worker-step nor the input/output contract change
      (Item 2: second impl retrofittable without touching the runners).

      WORKFLOW capability (preparation Task engine/13): the seam must be able to start a unit as a
      Claude-Code workflow `agent()` too, where the unit ITSELF writes its
      task-file via CLI (self-write). Here the hook/argument form for that is laid down
      (e.g. executor-/mode passthrough), the actual fan-out orchestration remains
      Task workflow-mode.
    rules:
      - path: .claude/rules/factory-functions.md
        why: agent as an injected dep, subagent impl fakeable; seam contract identical to headless
      - path: .claude/rules/fractal-substrate-integrity.md
        why: spawn seam swappable without touching the runners; AI = effect behind the seam
      - path: .claude/rules/cli-only-transport.md
        why: workflow unit writes itself via anchored CLI; output structured
    acceptance_criteria:
      - id: a1
        text: "Mode subagent triggers the injected agent dep with input.instructions/context and maps its result onto the shared output result (phase-1 contract, identical shape to headless). Evidence: spawn.ts:line + test with fake-agent that asserts the passed-through input AND the mapped output result (green)."
        status: done
        evidence:
          - src/spawn.spec.ts 'subagent triggers agent dep and maps to shared shape' — agent triggered with {instructions,context}, result → {ok,kind:'subagent',evidence} (green)
      - id: a2
        text: "Identical input/output contract for both modes: a test drives THE SAME input once with mode=headless (fake-exec) and once mode=subagent (fake-agent) and asserts that both output results satisfy the same shape (keys/types). Evidence: test file:line + green output."
        status: done
        evidence:
          - src/spawn.spec.ts 'both modes share result shape' — headless + subagent deliver the same SpawnResult shape (ok:boolean, kind:string) (green)
      - id: a3
        text: "worker-step caller view is mode-blind: switching happens exclusively via cfg.spawn.mode, the `run(input)` call site does not change. Evidence: test that switches the mode only via cfg with an unchanged `run(input)` call and hits the appropriate fake (exec vs. agent) in both cases (green)."
        status: done
        evidence:
          - src/spawn.spec.ts 'mode resolution; run(input) unchanged' — unchanged run(input) call, only cfg switches → headless hits exec, subagent hits agent (mode-blind) (green)
      - id: a4
        text: "Workflow start hook present: the seam accepts/passes through an executor/workflow identifier so that a unit is startable as a workflow agent() with self-write-via-CLI (orchestration remains Task workflow-mode). Evidence: spawn.ts:line of the passed-through field + test that asserts the passthrough to the agent dep (green)."
        status: done
        evidence:
          - src/spawn.spec.ts 'subagent passes executor through (workflow hook)' — input.executor='workflow' is passed through to the agent dep (workflow start hook; fan-out orchestration remains Task workflow-mode) (green)
      - id: a5
        text: "Real-mode coverage for subagent (Seed phase 5: one smoke per real mode): since the CC agent()/Task tool only exists in a running Claude-Code session (not in standalone `bun test`), there is an opt-in/in-session smoke OR — if not executable — an executable assertion that verifies the subagent path against the REAL agent dep signature (not just fake); explicitly skippable in headless/CI with a documented reason. Evidence: smoke/verify file:line + test output (green OR explicitly skipped with reason that no session agent is available)."
        status: done
        evidence:
          - "src/spawn.spec.ts test.skip 'subagent real smoke' — EXPLICITLY SKIPPED with reason: CC agent() only exists in a running session, not in standalone bun test"
  - name: Mode selection + quality gates green
    slug: mode-select-gates
    status: done
    context: |
      Wire the mode selection finally: cfg.spawn.mode (from the merged
      effectiveConfig, Task config-bootstrap) selects headless|subagent; an optional flag/env
      override layer (e.g. ANCHORED_SPAWN_MODE) allows switching without a config
      edit (CI/headless vs. interactive). Default = headless `claude -p` (Item 2).

      Closing gate for the whole seam: all five package gates for core/ green
      (lint, format, typecheck, test, build) — evidence honesty at package level.
      The seam is thereby fully complete (both modes, fakeable, mode-blind for the
      runners), ready as deps.spawn for Task engine.
    rules:
      - path: .claude/rules/tooling-quality-gates.md
        why: all 5 gates green before done; Node-compatible; bun as dev runner
      - path: .claude/rules/factory-functions.md
        why: mode selection reads cfg/override, stays fakeable
      - path: .claude/rules/cli-only-transport.md
        why: env/flag override CI/headless-capable
    acceptance_criteria:
      - id: a1
        text: "cfg.spawn.mode selects the impl, with override precedence flag/env > cfg > default(headless). Evidence: spawn.ts:line of the resolution + tests that assert the expected mode per source (default without cfg, cfg set, env override beats cfg) (green)."
        status: done
        evidence:
          - "src/spawn.spec.ts 'mode resolution: env > cfg > default(headless)' — no cfg → headless; cfg.spawn.mode=subagent → agent; Env ANCHORED_SPAWN_MODE beats cfg (green)"
      - id: a2
        text: "Production code is Node-compatible: no `Bun.*` API in the spawn path, only node:* modules (injected). Evidence: grep over core/src/spawn.ts without `Bun.` hits + typecheck green."
        status: done
        evidence:
          - grep -E 'Bun\.' src/spawn.ts → only comment; only node:*/injected deps; typecheck green (Node-compatible)
      - id: a3
        text: "All five core/ quality gates green: lint, format-check, `tsc --noEmit`, `bun test`, build. Evidence: the command output per gate respectively (5 green runs), recorded as evidence."
        status: done
        evidence:
          - "5 gates exit 0: eslint, prettier --check, tsc --noEmit, bun test (67 pass/2 skip/0 fail), bun build"
