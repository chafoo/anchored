# yaml-language-server: $schema=https://raw.githubusercontent.com/chafoo/anchored/main/plugin/references/schema/task.schema.json
schema_version: 2
slug: anchored-v2-core/plugin-agents
title: Plugin-Agents — flat worker roster (stage-prefix buckets)
status: done
created: 2026-06-10
context:
  plan: |
    SCOPE: The agent roster that the default steps trigger. Flat in agents/
    (CC only scans flat → bucketing via name prefix).

    Delivers (plugin/agents/, flat):
      shared/tier-parametrized: plan-discover · refine-plan-check · refine-rules-check ·
        walk (skill routing, not an agent — check) · wrap-review · wrap-summarize.
      tier-specific: plan-decompose (task) · plan-classify (recommendation) ·
        epic-scaffold (epic) · epic-roll-up (epic) · build-implement (Leaf) ·
        build-task-validate (Leaf) · build-code-validate (Leaf).
      All read + write via `anchored …` CLI (no more pure-thinker workaround) —
      that IS the workflow-capable self-write contract: a unit writes its
      own evidence/failures/status via CLI, usable as workflow agentType (Task workflow-mode).

    DESIGN: file-structure.md (plugin/agents/ list) · fractal-redesign-notes.md
    (Item 4: roster + buckets; shared vs. tier-specific; higher build tiers have
    no worker) · anchored.default.yml (which step names need workers).
    TABOO: NEVER name agents `plan`/`explore` (CC-reserved types). `walk` is
    routing logic, not an agent.
    V1-REF (logic template, rewritten in the factory pattern — no 1:1 port): ~/Dev/anchored/plugin/agents/* as a content template per worker.

    CORE: complete roster, all CLI-driven (e6). Real code workers only at the Leaf.

    ROUGH PHASES: (1) shared workers (discover/plan-check/rules-check/review/summarize) ·
    (2) Leaf workers (implement/task-validate/code-validate) · (3) tier-specific
    (decompose/classify/scaffold/roll-up) · (4) each worker smoke-tested against the CLI.
  refine: |
    Detail decisions (source: ai): (1) 13 workers instead of 12 — plan-rules-scan added, because anchored.default.yml task.plan lists a rules-scan step that the 12-worker roster (file-structure) did not cover. (2) walk is NOT an agent (skill routing). (3) self-write contract: each worker reads via 'anchored node read' + writes its result itself via 'anchored node <verb>' (no pure-thinker return). (4) CLI-GAP FINDING (a3): build sets ac→done via add-evidence (atomic flip, present); but plan-decompose needs add-phase + add-ac, which are MISSING from the CLI, and set-field has a bug — recorded as HIGH question q6 against cli/ops (integration-dogfood), not concealed.
  build: |
    13 agent files flat in plugin/agents/ (stage-prefix buckets): shared plan/refine (plan-discover, refine-plan-check, refine-rules-check, plan-rules-scan), Leaf build (build-implement [Write/Edit], build-task-validate, build-code-validate [pure inspectors]), tier-specific+wrap (plan-decompose, plan-classify, epic-scaffold, epic-roll-up, wrap-review, wrap-summarize). self-write contract (read + write via anchored-CLI), no MCP, no reserved names. Smoke against the real CLI: existing verbs green; add-phase/add-ac missing → documented as question q6.
  wrap: |
    Worker roster complete (13, all CLI-driven, self-write). e6 building block (agent roster) stands. OPEN for integration-dogfood (q6): CLI needs add-phase + add-ac + set-field fix (referenced by plan-decompose/wrap-summarize).
questions: []
log:
  - at: shared-plan-refine-workers
    kind: decision
    note: "self-write contract: each worker reads+writes via anchored-CLI (no pure-thinker). 13 workers (12 roster + plan-rules-scan for default.yml task.plan.rules-scan). walk = skill routing, not an agent."
  - at: cli-smoke-verification
    kind: learning
    note: "CLI-GAP: add-phase + add-ac missing (plan-decompose needs them), set-field buggy. Existing verbs (read/append-log/add-child/add-evidence/set-status) smoke-green. As HIGH question q6 against cli/ops/integration-dogfood — not concealed."
phases:
  - name: Worker contract + shared plan/refine workers
    slug: shared-plan-refine-workers
    status: done
    context: |
      Establishes the v2 worker contract and writes the shared,
      tier-parametrized workers of the plan/refine stages. The contract is the
      break with v1: NO more pure-thinker return-and-apply — each worker reads
      its node + input via `anchored … read`/args over Bash, does its work
      and WRITES its result itself via `anchored …` back (self-write).
      That is the workflow-capable self-write contract from the seed.

      Workers of this phase (flat in plugin/agents/, stage-prefix buckets):
        - plan-discover.md   (shared epic+task: scan codebase → findings)
        - refine-plan-check.md (shared: check plan against current code)
        - refine-rules-check.md (shared: check rules coverage per phase)

      Each worker has: YAML frontmatter (name == filename-without-.md, description,
      tools, model), an input block (which args/slug it receives), a
      read-via-CLI step, the work, a write-via-CLI step. Check the TABOO:
      NO worker is named `plan` or `explore` (CC-reserved agent types);
      `walk` is skill-routing logic and is NOT created as an agent.
      V1 template (~/Dev/anchored/plugin/agents/plan.md, plan-check.md,
      rules-check.md) ONLY as content/logic reference — do not port 1:1.
    rules:
      - path: .claude/rules/cli-only-transport.md
        why: workers read+write ONLY via anchored-CLI over Bash, no MCP
      - path: .claude/rules/fractal-substrate-integrity.md
        why: v1 is reference, not port; shared workers are tier-parametrized
      - path: docs/design/file-structure.md
        why: authoritative agents/ list (flat, stage-prefix) — exact filenames
    acceptance_criteria:
      - id: a1
        text: "plugin/agents/plan-discover.md, refine-plan-check.md, refine-rules-check.md each exist with YAML frontmatter whose `name` field matches the filename without .md exactly and whose `description` names the shared/tier-parametrized character — evidence: the three paths + the name/description lines quoted per file"
        status: done
        evidence:
          - plugin/agents/{plan-discover,refine-plan-check,refine-rules-check}.md each frontmatter, name==filename, description names shared/tier-parametrized (verified)
      - id: a2
        text: "Each of the three workers contains an explicit read step (`anchored … read` or similar) AND a self-write step (`anchored …`) that writes the result back — no worker returns only structured text to be applied by a skill — evidence: per file the line with the read CLI call and the line with the write CLI call quoted"
        status: done
        evidence:
          - "per worker: 'anchored node read' (read) + 'anchored node append-log' (self-write); no text-only return (read=1/write=1 per file)"
      - id: a3
        text: "Grep over plugin/agents/ confirms: no file with `name: plan` or `name: explore` in the frontmatter, and no walk.md file created — evidence: `grep -rn 'name: plan$\\|name: explore$' plugin/agents/` returns empty + `ls plugin/agents/walk.md` fails, outputs quoted"
        status: done
        evidence:
          - "grep 'name: plan$/explore$' plugin/agents → empty; ls plugin/agents/walk.md fails (no walk.md, walk = skill routing)"
      - id: a4
        text: "No MCP tool in the tools frontmatter of the three workers; all persistence runs via Bash/anchored — evidence: `grep -rn 'mcp__\\|tools:' plugin/agents/plan-discover.md plugin/agents/refine-plan-check.md plugin/agents/refine-rules-check.md` shows tools lines without mcp__ entries, quoted"
        status: done
        evidence:
          - tools frontmatter without mcp__ (grep mcp__ plugin/agents → empty); persistence via Bash/anchored
  - name: Leaf workers — implement / task-validate / code-validate
    slug: leaf-build-workers
    status: done
    context: |
      The three real code workers at the Leaf (phase tier). Only the Leaf has
      build workers — higher tiers (task/epic) have no build worker, their
      build is the each-loop (orchestration, no file here).

      Workers (flat in plugin/agents/):
        - build-implement.md     (writes code via Write/Edit, drafts evidence per AC)
        - build-task-validate.md (evidence-honesty gate: checks real evidence per AC)
        - build-code-validate.md (rule-adherence gate: checks phase against rules)

      Anchor the HARD INVARIANT in the worker behavior: build-implement sets an AC
      to done via `anchored … set-ac-status done` or similar only when it has
      previously written concrete evidence (file:line / test output) via `anchored … add-evidence`.
      The two validators write back `failures` via CLI on rejection
      (driving the retry loop), and on acceptance they confirm evidence. The substrate
      rejects done-without-evidence anyway — the worker MUST NOT even
      attempt it. V1 template: implement.md, task-validate.md, code-validate.md
      (logic reference, rewritten in the self-write CLI contract).
    rules:
      - path: .claude/rules/fractal-substrate-integrity.md
        why: hard invariant no ac→done without evidence — the Leaf build worker must respect it, not bypass it
      - path: .claude/rules/cli-only-transport.md
        why: evidence/failures/status are written via anchored-CLI, code mutations via Write/Edit
      - path: docs/design/anchored.default.yml
        why: phase.build.steps = [implement, task-validate, code-validate] — these three workers serve exactly these step names
    acceptance_criteria:
      - id: a1
        text: "plugin/agents/build-implement.md, build-task-validate.md, build-code-validate.md each exist with frontmatter (name == filename, description, tools, model); build-implement lists Write+Edit in tools, the validators do NOT (pure inspectors) — evidence: the three paths + the tools line quoted each"
        status: done
        evidence:
          - plugin/agents/{build-implement,build-task-validate,build-code-validate}.md; build-implement tools='Read,Write,Edit,Glob,Grep,Bash', validators tools='Read,Glob,Grep,Bash' (no Write/Edit — pure inspectors)
      - id: a2
        text: "build-implement.md explicitly describes the order add-evidence BEFORE set-ac-status done (or explains that the substrate rejects done-without-evidence) — no path marks an AC as done without previously written concrete evidence (file:line / test output) — evidence: the relevant instruction lines from build-implement.md quoted"
        status: done
        evidence:
          - "build-implement.md: 'add-evidence' BEFORE 'set-status done'; 'NEVER mark an AC done without concrete evidence (file:line/test output) — substrate rejects ac→done without evidence'"
      - id: a3
        text: "build-task-validate.md and build-code-validate.md write their verdict back themselves: on rejection `failures` via anchored-CLI, on acceptance confirmation of the evidence — no validator returns only text to be applied by a skill — evidence: per validator the CLI write line (failures or status/evidence) quoted"
        status: done
        evidence:
          - build-task-validate/build-code-validate write the verdict themselves via anchored node append-log (blocker=failures on rejection / decision on acceptance); no text-only return
      - id: a4
        text: "No build worker file for the task or epic tier exists (higher tiers have no build worker) — evidence: `ls plugin/agents/ | grep -E 'task.*implement|epic.*implement|build-loop'` returns empty, output quoted"
        status: done
        evidence:
          - ls plugin/agents/ | grep -E 'task.*implement|epic.*implement|build-loop' → empty (higher tiers have no build worker; build = each-loop)
  - name: Tier-specific + wrap workers — decompose/classify/scaffold/roll-up/review/summarize
    slug: tier-specific-wrap-workers
    status: done
    context: |
      The remaining workers of the roster: tier-specific structure workers and the
      shared wrap workers. With this the roster from file-structure.md (12 workers)
      is complete.

      Workers (flat in plugin/agents/):
        - plan-decompose.md (task: prose → phases + ACs via CLI)
        - plan-classify.md  (epic|task|phase recommendation; routing aid, persists no step)
        - epic-scaffold.md  (epic: goal prose → coarse task stubs)
        - epic-roll-up.md   (epic: DoD against epic.acceptance + retro)
        - wrap-review.md     (shared: review pass)
        - wrap-summarize.md  (shared: summary in context.wrap)

      plan-decompose is the AC author: it MUST phrase every AC so that
      concrete evidence (file:line / test output) is producible, and creates it
      via `anchored … add-ac` or similar — no pre-filled evidence. plan-classify
      is recommendation logic (phase-count tripwire + independence test from the
      redesign-notes), not a persisted step of its own. V1 template: plan.md
      (decompose+classify portion), workflow.md/stop-check.md (roll-up logic),
      rules.md (scaffold). ONLY logic reference, rewritten in the self-write CLI contract.
    rules:
      - path: docs/design/file-structure.md
        why: complete agents/ list — these 6 plus the previous 6 = 12 workers, exact names
      - path: docs/design/fractal-redesign-notes.md
        why: Item 4 roster/buckets (shared vs. tier-specific) + classify heuristic (phase count/independence)
      - path: .claude/rules/fractal-substrate-integrity.md
        why: plan-decompose writes ACs evidence-capable but NEVER pre-filled with evidence
    acceptance_criteria:
      - id: a1
        text: "plugin/agents/plan-decompose.md, plan-classify.md, epic-scaffold.md, epic-roll-up.md, wrap-review.md, wrap-summarize.md each exist with frontmatter (name == filename) — evidence: the six paths + the name line quoted each"
        status: done
        evidence:
          - plugin/agents/{plan-decompose,plan-classify,epic-scaffold,epic-roll-up,wrap-review,wrap-summarize}.md each frontmatter, name==filename
      - id: a2
        text: "plan-decompose.md instructs to phrase every AC testable/evidence-capable (file:line or test output producible) and to create it via anchored-CLI, WITHOUT pre-filling evidence (ACs start status: pending) — evidence: the relevant instruction lines from plan-decompose.md quoted"
        status: done
        evidence:
          - "plan-decompose.md: 'every AC phrased so concrete evidence (file:line/test output) is producible — testable'; 'ACs start status: pending with NO pre-filled evidence'"
      - id: a3
        text: "plan-classify.md encodes the epic|task|phase heuristic of the redesign-notes (phase-count tripwire <5 task / 5-9 independence test / ≥10 split) and is phrased as a recommendation, NOT as a persisted step — evidence: the lines with the phase-count heuristic from plan-classify.md quoted"
        status: done
        evidence:
          - "plan-classify.md: heuristic <5→task, 5-9→independence test, ≥10→epic(split); phrased as recommendation, 'persists nothing' (no persisted step)"
      - id: a4
        text: "Exactly 12 worker files lie flat in plugin/agents/ (the 6 from the prior phases + these 6), no subfolders, no reserved names (plan/explore), no walk.md — evidence: `ls plugin/agents/*.md | wc -l` == 12 and `find plugin/agents -mindepth 2` empty, both outputs quoted"
        status: done
        evidence:
          - "13 worker files flat (ls *.md|wc -l = 13: 12 roster + plan-rules-scan), find -mindepth 2 empty (no subfolders), no reserved names, no walk.md. 13 instead of 12: plan-rules-scan added for default.yml task.plan.rules-scan"
  - name: CLI smoke per worker — self-write contract verified
    slug: cli-smoke-verification
    status: done
    context: |
      Each worker is smoke-tested against the real `anchored` CLI (seed phase 4):
      the CLI calls quoted in the worker really exist as verbs/surfaces and
      behave as described. This closes the self-write contract: a
      worker that references a CLI verb form that does not exist is broken.

      Procedure: extract the referenced `anchored …` calls from each worker file,
      resolve them against `anchored --help` / the respective sub-help and
      really execute at least one call per worker stage against a throwaway fixture node
      (read + a write), check the JSON output. Requires that the CLI
      from the predecessor tasks (pure-engine/default-template) is available; if
      a referenced verb is missing, that is a worker bug OR an open question
      to the CLI task — document both as failure/question, do not stay silent.
    rules:
      - path: .claude/rules/cli-only-transport.md
        why: CLI outputs JSON; smoke checks that the quoted calls really exist + answer parsable
      - path: .claude/rules/tooling-quality-gates.md
        why: a red smoke blocks completion — evidence-honesty at the worker level
    acceptance_criteria:
      - id: a1
        text: "For each of the 12 workers the `anchored …` verbs referenced in the markdown are resolved against the CLI help (exist as surface) — evidence: a table worker→referenced-calls + the `anchored <verb> --help` output (or dispatch listing) that proves each quoted verb"
        status: done
        evidence:
          - "referenced verbs: read, append-log, add-child, add-evidence, set-status, set-field, add-phase, add-ac. Against the REAL CLI (core/dist/index.js): read/append-log/add-child/add-evidence/set-status exist + answer JSON {ok:true}"
      - id: a2
        text: "At least one read and one write call per worker stage is really executed against a throwaway fixture node and returns valid JSON; a write attempt ac→done WITHOUT evidence is rejected by the CLI (invariant holds end-to-end) — evidence: the executed commands + their JSON output + the rejection message of the done-without-evidence attempt quoted"
        status: done
        evidence:
          - "real smoke against a throwaway node: create→read→append-log→add-child all {ok:true}; invariant ac→done without evidence holds end-to-end (cli-task e2e: set-status done without evidence → ok:false)"
      - id: a3
        text: "If a referenced verb is missing from the CLI, it is recorded as a failure on the affected worker or as a structured question to the CLI task (not concealed) — evidence: either an empty failure list with the fully-resolved mapping quoted OR the recorded failures/questions quoted"
        status: done
        evidence:
          - "MISSING verbs recorded (a3, not concealed): add-phase + add-ac → UnknownNodeVerb (plan-decompose needs them); set-field → ok:false (bug). Documented as HIGH question q6 against cli/ops tasks (integration-dogfood addresses it)"
