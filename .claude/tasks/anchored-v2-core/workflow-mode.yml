        status: done
        evidence:
          - core/src/engine/workflow-smoke.spec.ts:99 executor via set-executor-Op gesetzt (nicht roh); :123 assert dispatch=[workflow:p1,workflow:p2] (WORKFLOW-Zweig genommen)
