  - name: anchored.yml config schema (schema/config.ts)
    slug: config-schema
    status: done
    context: |
      `core/src/schema/config.ts`: the anchored.yml schema as Zod, fractal
      (top-level blocks `phase`/`task`/`epic`; `project` schema-reserved, same
      form). Each tier has `plan`/`refine`/`build`/`wrap` (stages with `steps`),
      `build` may additionally carry `each: <tier>` + `stop` (string[]) + `retry_limit`
      (int>=1). `fields` per tier = the data-model shape (default fields
      + user custom via the same mechanism â€” supersedes the global
      `_fields` bucket from V1).

      Contract = docs/design/anchored.default.yml (every stage/every field there must
      be accepted by the schema). V1 template: anchored-yml.ts:114-205 (stage configs +
      top-level), but NEW in the fractal tier layout instead of flat â€” no 1:1 port.

      Specifics:
        - Top-level `.strict()` except for the allowed `_lib` path (YAML anchor
          aliases ONLY allowed there â€” anchored.yml profile, NOT task-file profile).
        - `each` is ONLY allowed in the `build` of a tier (not in plan/refine/wrap).
        - Merge-fitness: all stages/fields optional with defaults, so that a
          near-empty user anchored.yml is valid (base-dependency principle).
      `merge(default,user)` itself is NOT this task (config/merge.ts) â€” here
      only the schema that validates both sides.
    rules:
      - path: .claude/rules/fractal-substrate-integrity.md
        why: Stage steps + fields = policy shape; the schema knows NO concrete step names (config-driven)
      - path: .claude/rules/factory-functions.md
        why: Pure Zod schemas + parse helpers; cfg is the base dependency injected later
      - path: .claude/rules/cli-only-transport.md
        why: Config is read once at bootstrap; schema must allow minimal user deltas
