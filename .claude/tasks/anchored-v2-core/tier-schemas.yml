phases:
  - name: Step grammar (schema/step.ts)
    slug: step-schema
    status: done
    context: |
      First building blocks: the step grammar as a Zod schema in `core/src/schema/step.ts`,
      as pure factory-conforming module exports (no top-level side effect, no
      singleton â€” only Zod schemas + pure parse helpers; that is the
      "pure-data-types/Zod" exception allowed per [[factory-functions]]).

      Form (see anchored.default.yml + fractal-redesign-notes Item 5a + V1
      anchored-yml.ts:89-103 as a logic template, do NOT port 1:1):
        - `name` required (non-empty string).
        - EXACTLY ONE of `run` (Bash/prose) XOR `use` (worker ref) â€” refine
          enforces `count(run,use) === 1`.
        - `type` (agent | skill) ONLY valid on a `use` step.
        - `instructions` optional on EVERY step.
        - `involve` (all | high-only | none) ONLY allowed on walk steps.
        - `each: <tier>` + optional `steps` body (recursive `Step[]`) for the
          loop step; a loop step carries NO run/use (it is the loop, not a worker).
      Reserved-name semantics (implement/decompose/â€¦) does NOT live here â€” that comes
      in resolve-steps (another task). Here only the structural grammar.

      Tooling seam: `parseStep`/`safeParseStep` as pure helpers; zod dep wired in
      core/package.json if not already present.
    rules:
      - path: .claude/rules/factory-functions.md
        why: Zod schemas are the allowed pure-data exception; no module-level side effect/singleton in step.ts
      - path: .claude/rules/fractal-substrate-integrity.md
        why: Step grammar = mechanism (code); reserved step names = policy â†’ stay out
      - path: .claude/rules/tooling-quality-gates.md
        why: zod dep + bun test green for the schema tests
