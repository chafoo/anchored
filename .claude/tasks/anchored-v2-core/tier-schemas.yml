  refine: |
    Cross-task correction (source: ai): step-schema a1 originally required 'exactly one of run/use' (neither â†’ rejected), which would have rejected the default built-in steps ({name: implement} without run/use) and thereby broken config-schema a1 (parses the full anchored.default.yml). Corrected to 'at most one of run|use|each; bare name = built-in reference' â€” derived from anchored.default.yml (the contract); AC a1 text adjusted. zod 4 API verified (strictObject, refine{error:...}, lazy-recursive). NodeNext: .js import extensions throughout.
  build: |
    6 modules: schema/{step,config}.ts, schema/tiers/{phase,task,epic,project}.ts, state/{transitions,invariants}.ts. Additionally: reserved executor on phase (optional, no default) + before/after on the StepSchema (preparation for config-bootstrap before/after merge). 22 tests across 6 spec files. Typed errors via anchoredError(kind,message,suggestions) factory (no class). All 5 gates green.
  wrap: |
    Substrate foundation in place: step grammar, fractal config schema, 3 active tier descriptors (+ project reserved), forward-only state machine, hard invariant doubled (data-model asserts + Zod refine). Ready for parser-io + ops-core.
