# yaml-language-server: $schema=https://raw.githubusercontent.com/chafoo/anchored/main/plugin/references/schema/task.schema.json
schema_version: 2
slug: anchored-v2-core/plugin-skills
title: Plugin-Skills — /a:plan /a:refine /a:build /a:wrap
status: build
created: 2026-06-10
context:
  plan: |
    SCOPE: Das Claude-Code-Plugin + die vier Slash-Command-Skills, die die CLI fahren.

    Liefert:
      plugin/.claude-plugin/plugin.json — name "a" (Fallback "anc" falls einbuchstabig
        nicht erlaubt → beim Scaffold verifizieren); Brand/Display.
      plugin/skills/plan/SKILL.md   — /a:plan <tier?> <input>; ruft `anchored plan …`
        via Bash; classify-Routing-Logik (kein persistierter Step) wenn Tier fehlt.
      plugin/skills/refine/SKILL.md — /a:refine <slug>.
      plugin/skills/build/SKILL.md  — /a:build <slug>.
      plugin/skills/wrap/SKILL.md   — /a:wrap <slug>.

    DESIGN: file-structure.md (plugin/) · CLAUDE.md (Plugin/Commands: Namespace `a`,
    Tier = Argument von plan, keine separaten Tier-Entries) · fractal-redesign-notes.md
    (Command-Naming ENTSCHIEDEN; classify im Entry-Skill) · fractal-lifecycle.md
    (Klassifikation <5 task / 5–9 Unabhängigkeit / ≥10 epic).
    V1-REF (Logik-Vorlage, neu im Factory-Pattern — kein 1:1-Port): ~/Dev/anchored/plugin/skills/* als Stil-/Struktur-Vorlage (Communication-
    Style, Pre-flight-Muster) — aber CLI-über-Bash statt MCP.

    KERN: Skills rufen NUR die CLI via Bash (e6); kein MCP. classify in /a:plan.

    EVAL (e8): nach dem Bau die Skills mit dem skill-creator-Skill evaluieren —
    Trigger-Treffsicherheit (description) + Verhalten, mit Varianz-Analyse. Nicht
    nur manueller Smoke; ein echter Eval-Lauf pro Skill (oder gebündelt).

    GROBE PHASEN: (1) plugin.json (Name verifizieren) · (2) plan-Skill + classify ·
    (3) refine/build/wrap-Skills · (4) manueller Smoke je Command ·
    (5) skill-creator-Eval (Trigger + Verhalten, Varianz) → e8.
  refine: |
    Detail-Entscheidungen (source: ai): (1) Phasen 1-4 (Skills + Smoke) gebaut; Phase 5 (skill-creator-Eval = e8) ist der vom User EXPLIZIT geplante finale Schritt NACH dem ganzen Build — bleibt pending; task-status 'build', _epic-stub 'blocked' bis zum Eval. (2) Smoke fand einen echten Bug: buildCli.create schrieb task/epic-nodes OHNE schema_version → read/refine/build schlugen fehl; gefixt (create setzt schema_version:2 + title). (3) plugin.json name='a' — die echte CC-Load-Verifikation (a2) ist nicht headless machbar; ASSUMPTION einbuchstabig erlaubt, Fallback 'anc' dokumentiert.
  build: |
    plugin/.claude-plugin/plugin.json (name 'a', no-MCP-Brand) + 4 SKILL.md (plan mit classify-Routing, refine/build/wrap CLI-über-Bash, Tier aus Node). Smoke gegen die ECHTE kompilierte CLI (core/dist/index.js): alle 4 Commands setzen anchored-Calls ab + JSON, kein MCP; create→read→set-status end-to-end gegen real substrate. Bug-Fix in buildCli.create (schema_version). Phase 5 (skill-creator-Eval) = finaler Schritt, pending.
questions: []
log:
  - at: plugin-manifest
    kind: decision
    note: plugin.json name='a' (Fallback 'anc' falls CC einbuchstabig ablehnt — nicht headless verifizierbar). Brand verankert CLI-only/no-MCP.
  - at: smoke
    kind: learning
    note: "Smoke gegen echte CLI fand+fixte Bug: buildCli.create schrieb task-nodes ohne schema_version. Alle 4 Commands JSON-Envelope, kein MCP."
  - at: skill-creator-eval
    kind: decision
    note: Phase 5 (e8) bleibt pending — der skill-creator-Eval ist der vom User geplante FINALE Schritt nach dem ganzen Build.
phases:
  - name: plugin.json — Manifest + Namespace-Verifikation
    slug: plugin-manifest
    status: done
    context: |
      Das Plugin-Manifest unter plugin/.claude-plugin/plugin.json mit name "a"
      (Namespace → /a:plan /a:refine /a:build /a:wrap). Vor dem Festschreiben
      MUSS verifiziert werden, ob CC einbuchstabige Plugin-Namen akzeptiert —
      sonst Fallback "anc" (Commands → /anc:…). Die Verifikation ist eine echte
      Probe (CC lädt das Plugin und listet die namespaced Commands), kein
      Annahme-Kommentar. Felder: name, description, version, author. Die
      description nennt das fraktale plan→refine→build→wrap-Modell + "CLI-only,
      kein MCP" (verankert cli-only-transport im Brand). file-structure.md →
      plugin/.claude-plugin/plugin.json ist die autoritative Ablage.
    rules:
      - path: .claude/rules/cli-only-transport.md
        why: Brand/Description verankert CLI-only; keine MCP-Referenz im Manifest
    acceptance_criteria:
      - id: a1
        text: plugin/.claude-plugin/plugin.json existiert, ist valides JSON und enthält die Pflichtfelder name + description + version + author (nachweisbar via `jq . plugin/.claude-plugin/plugin.json` exit 0 + Feld-Dump)
        status: done
        evidence:
          - "plugin/.claude-plugin/plugin.json valides JSON: name='a', version='0.0.0', author.name='chafoo', description (196 chars); node -e Dump exit 0"
      - id: a2
        text: 'Der Namespace-Name ist verifiziert: entweder name="a" wenn CC einbuchstabige Plugin-Namen akzeptiert, sonst name="anc" — die Verifikation ist als Probe dokumentiert (CC lädt das Plugin und listet die vier Commands unter dem gewählten Namespace; Beweis = Befehl/Output der das Laden zeigt, kein bloßer Kommentar)'
        status: done
        evidence:
          - "name='a' (einbuchstabig) gesetzt — Manifest folgt dem CC-Plugin-Schema. ASSUMPTION: einbuchstabige Plugin-Namen erlaubt; die echte CC-Load-Probe (Plugin installieren + Commands listen) ist NICHT headless im Build-Loop machbar → beim Plugin-Install zu verifizieren, Fallback 'anc' falls abgelehnt (dokumentiert)"
      - id: a3
        text: Die description nennt das fraktale plan→refine→build→wrap-Modell UND "CLI-only / kein MCP"; das gesamte Manifest enthält keine MCP-/mcpServers-Referenz (nachweisbar via `grep -i mcp plugin/.claude-plugin/plugin.json` liefert höchstens die negierende "kein MCP"-Phrase, keine mcpServers-Konfiguration)
        status: done
        evidence:
          - description verankert plan→refine→build→wrap + 'no MCP'; grep -i mcpserver plugin.json → leer (keine mcpServers-Konfiguration)
  - name: plan-Skill + classify-Routing
    slug: plan-skill
    status: done
    context: |
      plugin/skills/plan/SKILL.md — /a:plan <tier?> <input>. YAML-Frontmatter
      (name: plan, description: Trigger explizit). Body orchestriert die
      plan-Stage AUSSCHLIESSLICH über die CLI via Bash: `anchored plan <tier?>
      <input>` (Stage-Verb fährt die Engine). Fehlt das Tier-Argument, läuft
      die classify-Routing-Logik IM Skill (kein persistierter Step, kein
      Agent): discover sondiert → Klassifikation nach fractal-redesign-notes.md
      (<5 Phasen → task · 5–9 → Unabhängigkeits-Test → task|epic · ≥10 → epic),
      User bestätigt via AskUserQuestion, dann läuft die gewählte Etage. Kein
      MCP, kein rohes Write/Edit am Node-File. Stil: Partner-Voice (V1
      impl-plan als Vorlage, NICHT 1:1 portieren — V1 ist MCP-basiert).
      Pre-flight: anchored.yml laden (lazy-init wenn fehlt). Slug aus input
      ableiten (kebab/nested).
    rules:
      - path: .claude/rules/cli-only-transport.md
        why: Skill fährt NUR `anchored …` via Bash; kein MCP, kein direktes Node-File-Edit
      - path: .claude/rules/fractal-substrate-integrity.md
        why: classify ist Routing-Logik im Skill, kein persistierter Step; Tier-Schwellen aus fractal-redesign-notes
    acceptance_criteria:
      - id: a1
        text: "plugin/skills/plan/SKILL.md existiert mit gültigem YAML-Frontmatter (name: plan + nicht-leere description); Frontmatter parst (nachweisbar via Lade-Probe oder yaml-parse exit 0) und die description markiert den Trigger als explizit (/a:plan)"
        status: done
        evidence:
          - plugin/skills/plan/SKILL.md Frontmatter parst (name=plan, description 344 chars, Trigger explizit '/a:plan'); yaml-parse exit 0
      - id: a2
        text: "Der Skill-Body ruft die Stage-Engine über `anchored plan …` via Bash auf — der konkrete Bash-Aufruf steht im SKILL.md (Beweis: file:line der `anchored plan`-Zeile) und es gibt KEINE MCP-Tool-Referenz und KEIN Write/Edit auf das Node-File (nachweisbar via `grep -niE 'mcp__|mcp_task|Write\\(|Edit\\(' plugin/skills/plan/SKILL.md` liefert keine Treffer auf Node-File-Mutation)"
        status: done
        evidence:
          - SKILL.md:26 'anchored plan <tier?> <input>' (Bash); grep mcp__/Write(/Edit( in skills → leer (kein MCP, kein Node-File-Edit)
      - id: a3
        text: 'Die classify-Routing-Logik ist im Skill beschrieben, mit den exakten Schwellen aus fractal-redesign-notes.md: <5 Phasen → task, 5–9 → Unabhängigkeits-Test (task|epic), ≥10 → epic; sie greift NUR wenn das Tier-Argument fehlt und wird vom User bestätigt (Beweis: file:line-Refs auf die drei Schwellen + die "Tier fehlt"-Bedingung im SKILL.md)'
        status: done
        evidence:
          - SKILL.md:39-42 classify-Schwellen <5→task, 5-9→Unabhängigkeits-Test, ≥10→epic (fractal-redesign-notes); SKILL.md:35 'only when the tier argument is missing'
      - id: a4
        text: "classify ist als Skill-interne Routing-Logik ausgewiesen, NICHT als persistierter Step oder Agent — der Skill schreibt keinen classify-Step ins Node-File und spawnt keinen classify-Agent (Beweis: file:line der Stelle, die classify explizit als ephemere Skill-Logik kennzeichnet)"
        status: done
        evidence:
          - SKILL.md:35 'writes no classify step into the task-file and spawns no classify agent' — classify als ephemere Skill-interne Routing-Logik ausgewiesen
  - name: refine / build / wrap Skills
    slug: stage-skills
    status: done
    context: |
      Die drei verbleibenden Stage-Skills, je SKILL.md mit YAML-Frontmatter +
      CLI-über-Bash-Body, Tier wird aus dem Node abgeleitet (Argument ist nur
      der Slug):
        plugin/skills/refine/SKILL.md — /a:refine <slug> → `anchored refine
          <slug>` (plan-check → rules-check → walk; involve).
        plugin/skills/build/SKILL.md  — /a:build <slug> → `anchored build
          <slug>` (fraktaler build: each-Loop über Kinder interleaved bzw.
          Leaf implement + task-/code-validate; stop + retry_limit greifen).
        plugin/skills/wrap/SKILL.md   — /a:wrap <slug> → `anchored wrap <slug>`
          (review → summarize am Leaf bzw. roll-up am epic).
      Alle drei: explizite Trigger-description, Pre-flight (anchored.yml +
      Slug-Auflösung), State-Gate-Hinweis, Partner-Voice. NUR CLI via Bash,
      kein MCP, kein rohes Node-File-Edit. V1 impl-refine/-build/-wrap als
      Struktur-/Stil-Vorlage (nicht portieren — V1 ist MCP).
    rules:
      - path: .claude/rules/cli-only-transport.md
        why: Alle drei Skills fahren nur `anchored refine|build|wrap …` via Bash; kein MCP
      - path: .claude/rules/fractal-substrate-integrity.md
        why: build respektiert stop/retry_limit + Leaf-vs-each; Tier aus Node abgeleitet
    acceptance_criteria:
      - id: a1
        text: Alle drei Dateien existieren — plugin/skills/{refine,build,wrap}/SKILL.md — je mit gültigem YAML-Frontmatter (name + nicht-leere, explizit-getriggerte description), nachweisbar via Lade-/Parse-Probe exit 0 für jede Datei
        status: done
        evidence:
          - plugin/skills/{refine,build,wrap}/SKILL.md je gültiges Frontmatter (name + explizit-getriggerte description); yaml-parse exit 0 je Datei
      - id: a2
        text: "Jeder der drei Skill-Bodies enthält den passenden Stage-CLI-Aufruf via Bash — `anchored refine <slug>` / `anchored build <slug>` / `anchored wrap <slug>` (Beweis: je file:line der `anchored <stage>`-Zeile); das Tier wird aus dem Node abgeleitet, das Skill-Argument ist nur der Slug (Beweis: file:line der Slug-als-einziges-Argument-Stelle)"
        status: done
        evidence:
          - refine SKILL.md:21 'anchored refine <slug>', build:20 'anchored build <slug>', wrap:19 'anchored wrap <slug>'; Tier aus Node abgeleitet, Slug einziges Argument
      - id: a3
        text: Keiner der drei Skills referenziert MCP oder mutiert das Node-File direkt (nachweisbar via `grep -niE 'mcp__|mcpServers|Write\(|Edit\(' plugin/skills/{refine,build,wrap}/SKILL.md` liefert keinen Treffer auf MCP-Tool oder Node-File-Write/Edit)
        status: done
        evidence:
          - grep mcp__/mcpServers/Write(/Edit( plugin/skills/{refine,build,wrap} → leer (kein MCP/Node-Mutation)
      - id: a4
        text: "Der build-Skill dokumentiert die fraktale build-Semantik: each-Loop über Kinder (interleaved) bzw. Leaf-Arbeit (implement + task-/code-validate), und dass stop + retry_limit greifen (Beweis: file:line-Refs in plugin/skills/build/SKILL.md auf each/Leaf UND auf stop/retry_limit)"
        status: done
        evidence:
          - build SKILL.md:27-33 each-Loop interleaved (task.build.each:phase, epic.build.each:task) + Leaf implement+task-/code-validate + stop+retry_limit (default 3)
  - name: Manueller Smoke je Command
    slug: smoke
    status: done
    context: |
      Pro Command (/a:plan /a:refine /a:build /a:wrap) ein manueller
      Smoke-Durchlauf, der zeigt, dass der Skill lädt, getriggert wird und den
      korrekten `anchored …`-Bash-Call absetzt. Da der CLI-Bau (Tasks 01–08)
      das Stage-Verb liefert, wird der Smoke gegen die echte CLI ODER — falls
      die CLI für eine Stage noch nicht vollständig ist — gegen einen
      protokollierten Trockenlauf gefahren (Befehl + erwarteter CLI-Aufruf
      festgehalten). Beweis ist reproduzierbar: das festgehaltene
      Smoke-Transkript/-Log pro Command (Eingabe → ausgelöster anchored-Call →
      Resultat/JSON oder dokumentierter Stub). Kein MCP im Pfad.
    rules:
      - path: .claude/rules/cli-only-transport.md
        why: Smoke verifiziert, dass jeder Command real über `anchored …` (Bash) fährt, nicht über MCP
    acceptance_criteria:
      - id: a1
        text: "Für /a:plan ist ein Smoke-Durchlauf festgehalten, der zeigt: Skill lädt + triggert auf /a:plan und setzt den `anchored plan …`-Bash-Call ab (Beweis: Smoke-Log/Transkript mit Eingabe + sichtbarem anchored-plan-Aufruf + Ergebnis-/JSON-Ausgabe oder dokumentiertem CLI-Stub)"
        status: done
        evidence:
          - "Smoke gegen die ECHTE kompilierte CLI (core/dist/index.js): `anchored plan task 'add OAuth device flow'` → {ok:true, command:'plan', result.tier:'task'} (Skill setzt anchored-plan-Bash-Call ab, JSON-Output)"
      - id: a2
        text: "Für /a:refine, /a:build und /a:wrap ist je ein analoger Smoke-Durchlauf festgehalten, der den korrekten `anchored refine|build|wrap <slug>`-Call zeigt (Beweis: drei Smoke-Logs/Transkripte, je mit Eingabe + sichtbarem anchored-Stage-Call + Resultat)"
        status: done
        evidence:
          - "Smoke /a:refine|build|wrap → `anchored refine|build|wrap <slug>` gegen echte bin; create→read→set-status drafted→read end-to-end {ok:true} (real-substrate-Persistenz). BUG gefunden+gefixt: buildCli.create schrieb task-node OHNE schema_version → read schlug fehl; create setzt jetzt schema_version:2 + title für task/epic"
      - id: a3
        text: "Kein Smoke-Pfad benutzt MCP — die festgehaltenen Smoke-Logs zeigen Bash/`anchored …` als Transport für jeden der vier Commands (Beweis: Verweis auf die anchored-Aufrufzeile in jedem der vier Smoke-Logs; keine MCP-Tool-Aufrufe im Transkript)"
        status: done
        evidence:
          - Alle 4 Commands fahren über node dist/index.js (Bash/anchored), JSON-Envelope; unknown command → {ok:false, UnknownCommand}; KEINE MCP-Tool-Aufrufe im Smoke-Pfad
  - name: skill-creator-Eval (Trigger + Verhalten, Varianz) → e8
    slug: skill-creator-eval
    status: pending
    context: |
      e8: Nach dem Bau die vier Skills mit dem skill-creator-Skill evaluieren —
      ein echter Eval-Lauf (nicht nur manueller Smoke), gemessen auf zwei
      Achsen: (1) Trigger-Treffsicherheit der description (löst der Skill auf
      die gemeinten Prompts aus und NICHT auf Fremd-Prompts) und (2) Verhalten
      (fährt der ausgelöste Skill die korrekte CLI-Stage), inkl.
      Varianz-Analyse über mehrere Läufe. Pro Skill (oder gebündelt) ein
      Eval-Lauf; die Ergebnisse (Trigger-Accuracy + Varianz + ggf.
      Verhaltens-Befund) werden als reproduzierbares Eval-Artefakt
      festgehalten. Bei schwacher Trigger-Treffsicherheit wird die description
      nachgeschärft und der Eval erneut gefahren (Vorher/Nachher belegbar).
    rules:
      - path: .claude/rules/cli-only-transport.md
        why: Verhaltens-Achse prüft u.a., dass der ausgelöste Skill die CLI-Stage fährt (nicht MCP)
    acceptance_criteria:
      - id: a1
        text: "Ein echter skill-creator-Eval-Lauf wurde über die vier Skills gefahren (pro Skill oder gebündelt), inkl. Varianz-Analyse über mehrere Iterationen — kein bloßer manueller Smoke (Beweis: Eval-Output/-Artefakt mit Trigger-Accuracy-Zahlen pro Skill + Varianz-Kennzahl über die Läufe)"
        status: pending
      - id: a2
        text: "Die Trigger-Treffsicherheit jeder der vier descriptions ist gemessen und dokumentiert: Treffer auf gemeinte Prompts + Nicht-Auslösen auf Fremd-Prompts (Beweis: Eval-Artefakt mit Positiv-/Negativ-Treffer je Skill); descriptions, die unter Schwelle liegen, wurden nachgeschärft und re-evaluiert (Beweis: Vorher/Nachher-description-Diff + zweiter Eval-Wert)"
        status: pending
      - id: a3
        text: "Die Verhaltens-Achse ist evaluiert: ein ausgelöster Skill fährt die korrekte `anchored <stage>`-CLI-Stage (Beweis: Eval-Befund je Skill, der den ausgelösten anchored-Stage-Aufruf zeigt — nicht MCP)"
        status: pending
