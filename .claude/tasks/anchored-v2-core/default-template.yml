# yaml-language-server: $schema=https://raw.githubusercontent.com/chafoo/anchored/main/plugin/references/schema/task.schema.json
schema_version: 2
slug: anchored-v2-core/default-template
title: Default-Template — anchored.default.yml as the merged base
status: done
created: 2026-06-10
context:
  plan: |
    SCOPE: Wire the opinionated behavior as a default template — active by
    default, fully overridable. "No built-ins" means: every default is a step.

    Delivers:
      core/default-template/anchored.default.yml — the shipped reference
        (source: docs/design/anchored.default.yml; NOT copied into the user project).
      resolve-steps integration — insert default steps + canonical order
        when the user writes nothing; extend-only (never removable).
      step-name → worker dispatch — every built-in step name (implement, task-validate,
        code-validate, discover, rules-scan, decompose, plan-check, rules-check, walk,
        review, summarize, scaffold, roll-up) mapped to its worker.

    DESIGN: anchored.default.yml (THE contract — every step/field/stage is a
    requirement) · fractal-redesign-notes.md ("anchored.default.yml = the foundation";
    "storage/roles") · fractal-lifecycle.md (default steps per stage/tier).
    DEPENDS: resolve-steps (Task engine) must be able to do the injection; the workers themselves
    are plugin agents (Task plugin-agents) — here only the dispatch mapping (name→worker ref).

    CORE: minimal user-yml ⇒ full default runs (e3); validators in phase.build
    and phase.wrap per the default.

    ROUGH PHASES: (1) finalize anchored.default.yml (resolve open semantics q3) ·
    (2) resolve-steps default injection + extend-only · (3) step-name→worker dispatch ·
    (4) test: every default step/field resolvable.
  refine: |
    Detail decisions (source: ai): (1) anchored.default.yml already exists (copied from docs/design in the package scaffold) — phase.build=[implement,task-validate,code-validate] (q3: canonical sequence, NOT the build/wrap split). (2) Loader = createBootstrap.defaultConfig() additively extended (config-bootstrap). (3) createResolveSteps additively in resolve-steps.ts (cfg lookup, NO domain names → engine-a3 grep stays green). (4) createWorkerDispatch + 13-entry DEFAULT_WORKERS in a NEW module engine/scope/worker-dispatch.ts (NOT resolve-steps.ts, otherwise engine-a3 would break). (5) REFINE FINDING: default.yml has task.plan.rules-scan, but the agent roster (file-structure) has no plan-rules-scan (only refine-rules-check) — I map rules-scan→plan-rules-scan; Task plugin-agents must add this agent. walk→skill-routing (no agent).
  build: |
    3 building blocks: (1) anchored.default.yml (exists) verified as the contract. (2) createBootstrap.defaultConfig() loader + createResolveSteps (resolve-steps.ts) for default injection/extend-only. (3) NEW module engine/scope/worker-dispatch.ts (createWorkerDispatch + 13-entry map). 12 new tests; e3 proven end-to-end (default file → resolve → worker dispatch, no step unmapped). All 5 gates green.
  wrap: |
    The opinionated default behavior is wired: minimal user-yml ⇒ full default runs (e3), extend-only enforced, each of the 13 built-in step names resolvable to a worker. Ready for plugin-agents (builds the 13 agents including plan-rules-scan) + epic-tier.
questions: []
log:
  - at: default-file
    kind: decision
    note: anchored.default.yml (copied from docs/design) verified as the contract; phase.build=[implement,task-validate,code-validate] (q3 canonical). Loader = createBootstrap.defaultConfig() additive.
  - at: resolve-injection
    kind: decision
    note: createResolveSteps additively in resolve-steps.ts (no domain names → engine-a3 stays green); default injection via merged cfg, extend-only through config-merge.
  - at: worker-dispatch
    kind: learning
    note: "createWorkerDispatch + 13-entry map in NEW worker-dispatch.ts. REFINE FINDING: rules-scan→plan-rules-scan — plugin-agents needs this agent (roster has only refine-rules-check). walk→skill (no agent)."
phases:
  - name: finalize anchored.default.yml + loadable as the merged base
    slug: default-file
    status: done
    context: |
      Place the shipped default template as the authoritative file under
      core/default-template/anchored.default.yml — 1:1 the contract from
      docs/design/anchored.default.yml: all three tiers (phase/task/epic) with
      their plan/refine/build/wrap steps AND their `fields` blocks.

      Resolve open semantics (q3) + pin them in the file: phase.build holds the
      canonical sequence [implement, task-validate, code-validate] exactly like the
      design contract (docs/design/anchored.default.yml:28-34) — NOT the
      build/wrap split sketched in fractal-lifecycle.md. One variant is
      chosen and the default is unambiguous.

      The file must be loadable by the config bootstrap (Task config-bootstrap) as the framework base +
      validatable against the config schema (Task package-scaffold/01):
      merge(anchored.default.yml, user) ⇒ effectiveConfig. Here we deliver the
      base side of the merge (the merge mechanism itself lives in config/merge.ts
      from Task config-bootstrap). Loader injects via factory (createX(cfg,deps)); the path to the
      file comes in as a dep (fakeable), no top-level read on import.
    rules:
      - path: .claude/rules/fractal-substrate-integrity.md
        why: No built-ins — every default is a step; policy lives in the template, not in the code.
      - path: .claude/rules/factory-functions.md
        why: Default loader as createX(cfg,deps); file path injected/fakeable, no import side effect.
      - path: docs/design/anchored.default.yml
        why: THE contract — every step/field/stage maps 1:1.
    acceptance_criteria:
      - id: a1
        text: core/default-template/anchored.default.yml exists and contains for phase/task/epic each the complete plan/refine/build/wrap block + fields block, matching docs/design/anchored.default.yml (every step name, every field present).
        status: done
        evidence:
          - src/config/default-file.spec.ts 'default.yml has phase/task/epic stages + fields' — core/default-template/anchored.default.yml (copied from docs/design); phase/task/epic each build+fields (green)
      - id: a2
        text: "phase.build lists exactly the sequence [implement, task-validate, code-validate] in this order; task.build and epic.build carry `each: phase` and `each: task` respectively plus stop + retry_limit: 3 — testable via parse + assert on the step/each values."
        status: done
        evidence:
          - default-file.spec.ts 'phase.build sequence + task/epic each/stop/retry' — phase.build=[implement,task-validate,code-validate]; task.build each:phase, epic.build each:task, retry_limit:3, stop non-empty (green)
      - id: a3
        text: A bootstrap/loader factory reads the file via an injected path, parses it against the config schema without errors and returns the typed default config; a test with a fake path/fake reader proves this without real FS at module top level.
        status: done
        evidence:
          - default-file.spec.ts 'bootstrap.defaultConfig loads + validates' — createBootstrap(deps).defaultConfig() reads via injected readDefault, parses against ConfigSchema, typed config (no top-level FS) (green)
      - id: a4
        text: "A minimal user anchored.yml (only schema directive, no tier blocks) merged against the default yields an effectiveConfig in which all default steps of all three tiers are present — test asserts the full default resolution (e3: minimal user-yml ⇒ full default)."
        status: done
        evidence:
          - default-file.spec.ts 'minimal/missing user yields full default' — missing anchored.yml → effectiveConfig with all default steps (phase.build + task.plan=[discover,rules-scan,decompose]); merge(default,{}) → epic.plan present (e3) (green)
  - name: "resolve-steps: default injection + extend-only order"
    slug: resolve-injection
    status: done
    context: |
      Wire resolve-steps (mechanism from Task engine) so that it inserts the default
      steps + their canonical order from the default template when
      the user writes nothing for a stage — and so that user deltas are EXTEND-ONLY:
      own steps can be inserted before/between/after or enriched via
      `instructions` on a default step, but a default step is
      NEVER removable (fractal-lifecycle.md: "only extendable via instructions, never
      removable").

      Concretely against the merged cfg from phase 1: for each tier/each stage
      resolve-steps delivers the effective ordered step list. Empty/missing
      user stage ⇒ canonical default sequence. User stage with additional steps ⇒
      defaults stay in canonical position, custom steps at their declared
      place. Loop step: task.build/epic.build resolve to the each form (shorthand
      `each: <tier>` = loop with implicit body [run]).

      Factory pattern: createResolveSteps(cfg, deps) → { resolve(tier, stage) →
      Step[] }; cfg = effectiveConfig, deterministic + fakeable, no AI/FS.
    rules:
      - path: .claude/rules/factory-functions.md
        why: resolve-steps as createX(cfg,deps) → { resolve(...) }; purely deterministic, testable with fake cfg.
      - path: .claude/rules/fractal-substrate-integrity.md
        why: Engine dispatches config-driven; extend-only is a policy guarantee — default step never removable.
      - path: docs/design/fractal-lifecycle.md
        why: Canonical order + 'only extendable via instructions, never removable' + loop-as-step semantics (each shorthand).
    acceptance_criteria:
      - id: a1
        text: resolve(tier, stage) for a stage the user does NOT override returns the canonical default sequence in exact order (e.g. task.plan ⇒ [discover, rules-scan, decompose]) — test asserts order + names.
        status: done
        evidence:
          - src/engine/scope/resolve-injection.spec.ts 'resolve(task,plan) canonical' — createResolveSteps(default).resolve('task','plan')=[discover,rules-scan,decompose] in order (green)
      - id: a2
        text: If the user adds own steps to a stage, all default steps still appear in their canonical relative position and the custom steps at their declared place; a test with a default+custom mix proves the merged ordered list.
        status: done
        evidence:
          - resolve-injection.spec.ts 'custom merge keeping order' — user step {lint, after:implement} → [implement,lint,task-validate,code-validate] (defaults in canonical position) (green)
      - id: a3
        text: "Extend-only is enforced: a user delta that tries to remove/empty a default step still leaves the default step in the resolved list (or is rejected) — test shows that e.g. implement/task-validate/code-validate are present after resolve despite a removal attempt."
        status: done
        evidence:
          - "resolve-injection.spec.ts 'extend-only: empty override' — user phase.build.steps=[] → implement/task-validate/code-validate stay present (never removable) (green)"
      - id: a4
        text: "resolve(task, build) and resolve(epic, build) deliver a loop step with `each: phase` and `each: task` respectively and implicit body [run] for the shorthand; test asserts the each edge + default body."
        status: done
        evidence:
          - resolve-injection.spec.ts 'loop steps with implicit body' — resolve(task,build)[0]={each:'phase',steps:[{name:run}]}; resolve(epic,build)[0].each='task' (green)
  - name: step-name → worker dispatch mapping + full resolvability
    slug: worker-dispatch
    status: done
    context: |
      Map every built-in step name from the default template to its worker
      reference (name→worker ref). The workers themselves are plugin agents (Task plugin-agents) —
      here ONLY the dispatch mapping that points a resolved step to the right
      agent/worker identifier. The engine knows no step names hardcoded
      (substrate rule): the mapping is data/policy, encapsulated in a factory
      and injectable.

      Full roster (fractal-redesign-notes "agent roster", file-structure
      plugin/agents): implement, task-validate, code-validate (leaf/phase),
      discover, rules-scan, decompose (task.plan), plan-check, rules-check, walk
      (task.refine), review, summarize (task.wrap), scaffold, roll-up (epic).
      Worker-ref form fits the spawn substrate (Task spawn): use step → spawn(agent).
    rules:
      - path: .claude/rules/cli-only-transport.md
        why: Workers run as spawn(agent) behind the seam; dispatch delivers an agent ref, no MCP tools.
      - path: .claude/rules/factory-functions.md
        why: Dispatch as createWorkerDispatch(cfg,deps) → { resolveWorker(stepName) }; mapping injected/fakeable.
      - path: .claude/rules/fractal-substrate-integrity.md
        why: No hardcoded step names in the engine — mapping is policy/data.
    acceptance_criteria:
      - id: a1
        text: resolveWorker(name) for each of the 13 default step names (implement, task-validate, code-validate, discover, rules-scan, decompose, plan-check, rules-check, walk, review, summarize, scaffold, roll-up) returns a non-empty worker/agent reference — test iterates the list and asserts a hit for each.
        status: done
        evidence:
          - src/engine/scope/worker-dispatch.spec.ts 'non-empty ref for all 13' — resolveWorker for implement/task-validate/code-validate/discover/rules-scan/decompose/plan-check/rules-check/walk/review/summarize/scaffold/roll-up → each a non-empty ref (green)
      - id: a2
        text: The worker refs correspond to the agent file names listed in docs/design/file-structure.md (e.g. implement→build-implement, decompose→plan-decompose, scaffold→epic-scaffold, walk→skill-routing/non-agent handled correctly) — test asserts the concrete target ref per name.
        status: done
        evidence:
          - worker-dispatch.spec.ts 'refs match roster; walk skill' — implement→build-implement, decompose→plan-decompose, scaffold→epic-scaffold, roll-up→epic-roll-up; walk→{type:skill} (non-agent handled correctly) (green)
      - id: a3
        text: "End-to-end resolvability: for phase, task and epic all stages are resolved via resolve-steps (P2) and every resulting built-in step name mapped to a worker via the dispatch (P3); a test runs all three tiers through and ensures that NO default step stays unmapped (e3 fully proven)."
        status: done
        evidence:
          - "worker-dispatch.spec.ts 'no unmapped worker-step across all tiers' — all default steps from resolve over phase/task/epic × 4 stages mapped to a worker, unmapped===[] (e3 end-to-end: default file → resolve-steps → worker dispatch) (green)"
      - id: a4
        text: "Quality gates for core/ green before completion: lint, format-check, tsc --noEmit, bun test, bun build run without errors — test/tool output as evidence."
        status: done
        evidence:
          - "5 gates exit 0: eslint, prettier --check, tsc --noEmit, bun test (109 pass/2 skip/0 fail), bun build"
