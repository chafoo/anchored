    goal: "core/ npm-Paket: package.json (bin: anchored) + tsconfig + Quality-Gate-Tooling (lint/format/typecheck/test/build) + src-Skelett"
    status: done
    depends_on: []
  - slug: tier-schemas
    goal: "Zod-Schemas: step-Grammatik + config + Tier-Deskriptoren (phase/task/epic) + State-Machine (transitions forward-only) + harte Invariante (kein done ohne evidence)"
    status: done
    depends_on:
      - package-scaffold
  - slug: parser-io
    goal: "parse/render (zwei Profile: task-file no-alias, anchored.yml alias-ok; Schema-Directive; block-scalar für Prosa) + atomic-write io (lock + mkdir -p + POSIX-rename)"
    status: done
    depends_on:
      - tier-schemas
  - slug: config-bootstrap
    goal: merge(anchored.default.yml, user anchored.yml) → effectiveConfig; einmal beim Bootstrap validiert + als deps.config injiziert
    status: done
    depends_on:
      - tier-schemas
      - parser-io
  - slug: ops-core
    goal: "createNodeOps(tierSchema, deps): tier-generischer Op-Kern — create/read/set-status/add+next-child (DAG)/add+resolve question/append log; Invariante greift am schreibenden Op"
    status: done
    depends_on:
      - tier-schemas
      - parser-io
  - slug: spawn
    goal: "Ausführungs-Substrat: spawn = headless `claude -p` pro Task-File, Phasen in-process; injizierte Naht (in-process Subagent-Modus später nachrüstbar)"
    status: done
    depends_on:
      - tier-schemas
  - slug: engine
    goal: "fraktale Factory-Engine: createEngine → tier/stage/step-runner + scope/(run-step · worker-step · loop-step · resolve-steps); loopStep schließt Rekursion (ruft tier-runner der Kind-Etage)"
    status: done
    depends_on:
      - config-bootstrap
      - ops-core
      - spawn
  - slug: cli
    goal: "anchored CLI (einziger Transport): index dispatch + commands/(plan classify-wenn-tier-fehlt · refine · build · wrap · node generische Verben); JSON-Output"
    status: done
    depends_on:
      - engine
  - slug: default-template
    goal: anchored.default.yml als mitgelieferte Referenz + resolve-steps Default-Injektion + step-name→worker Dispatch; jeder Step/Feld/Stage des Defaults ist umgesetzt
    status: done
    depends_on:
      - engine
  - slug: plugin-skills
    goal: plugin/.claude-plugin/plugin.json (name 'a', Fallback 'anc') + skills/{plan,refine,build,wrap}/SKILL.md — rufen `anchored <verb>` via Bash; classify-Routing im plan-Skill
    status: blocked
    depends_on:
      - cli
  - slug: plugin-agents
    goal: "flacher Agent-Roster (Stage-Präfix-Buckets): discover/plan-check/rules-check/walk/review/summarize (geteilt) + decompose/scaffold/implement/task-validate/code-validate/roll-up (spezifisch); lesen+schreiben via CLI"
    status: done
    depends_on:
      - cli
      - default-template
  - slug: epic-tier
    goal: "epic als volle Etage: build.each:task-Loop + scaffold/walk/roll-up + nested slugs (<epic>/<slug>) durch parser/io/ops + classify-Erkennung; beweist den fraktalen Loop end-to-end"
    status: done
    depends_on:
      - engine
      - cli
      - default-template
      - plugin-agents
  - slug: workflow-mode
    goal: "Workflow-Fan-out-Executor: Build-Loop wahlweise als Claude-Code-Dynamic-Workflow (≤16 parallel, self-write via CLI, resume-safe via Task-File-Evidence); reserved executor-Feld + Orchestrierung"
    status: done
    depends_on:
