# yaml-language-server: $schema=https://raw.githubusercontent.com/chafoo/anchored/main/plugin/references/schema/epic.schema.json
schema_version: 2
slug: anchored-v2-core
title: anchored v2 — fraktaler Rewrite (Engine + Substrat + CLI + Default-Template + Plugin)
status: building
goal: |
  anchored v2 von Grund auf bauen: EINE fraktale Lebenszyklus-Form
  (plan→refine→build→wrap) auf jeder Etage (phase▸task▸epic, project reserviert).
  Keine privilegierten Built-ins — alles Step; opinioniertes Verhalten lebt im
  Default-Template (anchored.default.yml), aktiv by default, überschreibbar.
  Integrität im Substrat (kein ac→done ohne evidence). CLI-only Transport (kein
  MCP), funktioniert in Main-Session UND headless. Factory-Functions
  createX(cfg, deps)→{run(input)→output}; anchored.yml als gemergte Base-Dependency.

  Verbindliche Spec: docs/design/ (fractal-lifecycle · engine-architecture ·
  anchored.default.yml · file-structure · fractal-redesign-notes). Build-Reihenfolge
  aus CLAUDE.md: pure-engine → default-template → epic-tier.

  Vorgehen-PRINZIP (gilt für anchored selbst): epic.plan/scaffold schreibt NUR die
  coarse Stubs hier ins _epic.yml — KEINE Task-Files. Ein Task-File entsteht lazy erst
  bei task.plan (decompose), wenn der epic.build-Loop den Stub erreicht; dann läuft die
  volle Iteration drüber. Vor task.plan stehen alle Infos ausschließlich im _epic.yml.
  Ausnahme in DIESEM Repo: wir haben die Decompose pragmatisch vorgezogen (manuelles
  task.plan von Hand), weil die Engine, die das sonst führt, erst hier gebaut wird.
acceptance:
  - id: e1
    text: core/ baut grün — lint + format + typecheck + test + build alle pass
    status: done
  - id: e2
    text: "anchored CLI: plan|refine|build|wrap + generische node-Verben laufen, JSON-Output"
    status: done
  - id: e3
    text: effectiveConfig = merge(default, user) injiziert; minimale anchored.yml reicht (zero-config)
    status: done
  - id: e4
    text: harte Invariante erzwungen — kein ac→done ohne evidence (Substrat-Test grün)
    status: done
  - id: e5
    text: "fraktaler Loop bewiesen: task.build.each:phase UND epic.build.each:task laufen end-to-end"
    status: done
  - id: e6
    text: Plugin /a:plan /a:refine /a:build /a:wrap rufen die CLI; Agent-Roster vollständig
    status: pending
  - id: e7
    text: "Dogfood-Smoke: eine triviale Task wird end-to-end geplant + gebaut"
    status: done
  - id: e8
    text: Plugin-Skills (/a:plan /a:refine /a:build /a:wrap) via skill-creator-Eval getestet + gebenchmarkt (Trigger-Treffsicherheit + Verhalten)
    status: pending
  - id: e9
    text: "Workflow-Modus: Build-Loop läuft wahlweise sequential ODER als Claude-Code-Workflow-Fan-out (executor=workflow); echter Workflow-Smoke grün"
    status: done
questions:
  - id: q1
    text: "Tooling-Stack für core/ (CLAUDE.md: 'in pure-engine festgelegt')"
    priority: high
    origin: scaffold
    status: resolved
    answer: Bun all-in (install/test/build) + eslint + typescript-eslint + prettier + tsc (typecheck & .d.ts). Code Node-kompatibel (node:* APIs, kein Bun.*), publish als Node-Paket.
    source: user
    reasoning: "User-Entscheid: Bun für dev-Speed, eslint gewünscht. Node-Kompatibilität gewahrt → npm-publishbar, Konsumenten brauchen kein Bun. Festgehalten in .claude/rules/tooling-quality-gates.md."
  - id: q2
    text: "spawn: nur headless `claude -p` pro Task-File, oder in-process Subagent-Modus gleich als zweite Impl mitnehmen?"
    priority: medium
    origin: scaffold
    status: resolved
    answer: BEIDE Modi vollumfänglich bauen — headless `claude -p` (CI/headless, Isolation) UND in-process Subagent-Modus (Live-Progress, session-gebunden). spawn als injizierte Naht, die beide Impls trägt; per Config/Flag wählbar.
    source: user
    reasoning: "User-Leitplanke: vollumfänglich, kein MVP. Kein 'später' — beide Ausführungsarten von Anfang an. Naht-Design (factory-functions) hält sie austauschbar."
  - id: q3
    text: "loop als positionierbarer Built-in-Step ({name: loop, each: task}) mit interleaved Body bestätigen?"
    priority: medium
    origin: scaffold
    status: resolved
    answer: "Bestätigt (Item 5a): `each` = Step-Attribut; loop-Step trägt `each` + steps-Body, der INTERLEAVED pro Kind läuft (Kind A: alle Body-Steps, dann Kind B); eigene build.steps davor/danach laufen einmal (Setup/Teardown); Kurzform `build:{each:task}` = Body [run]. Per-Iteration-Mechanik (Status/log/stop) macht die loopStep nach jedem Body-Durchlauf."
    source: ai
    reasoning: Interleaved ist die einzig sinnvolle Reihenfolge (jede Einheit komplett fertig+committed vor der nächsten; Pass-Modell würde ungetestete Builds aufstauen). User-Erklärung gegeben + akzeptiert. Konsistent mit engine-architecture.md.
  - id: q4
    text: project-Tier in diesem Epic mitnehmen?
    priority: low
    origin: scaffold
    status: resolved
    answer: Nein. project bauen wir nicht und planen es hier nicht mit — erst epic austesten. Aus Task tier-schemas entfernt (nur phase/task/epic).
    source: user
    reasoning: "User-Entscheid: 'projekt bauen wir noch nicht, ich will erstmal austesten wie epic funktioniert'. project ist dank Fraktal billig nachzurüsten, sobald epic steht."
  - id: q5
    text: Ablage `.claude/tasks/<epic>/` bestätigen (Design-Konvention)?
    priority: low
    origin: scaffold
    status: resolved
    answer: Ja — `.claude/tasks/<epic>/_epic.yml` + `.claude/tasks/<epic>/<slug>.yml`. Faktisch bereits so umgesetzt.
    source: ai
    reasoning: Design-Konvention (fractal-redesign-notes 'Struktur-Definition') + epic.example.yml; das Scaffold liegt schon dort. Low-level, im Sinne der Doku autonom geschlossen.
  - id: q6
    text: "CLI-Gap (plugin-agents-Fund): add-phase, add-ac fehlen im CLI/node-ops (plan-decompose braucht sie für Phasen+ACs); set-field hat einen Bug; wrap-summarize braucht nested set-field (context.wrap). integration-dogfood muss diese ergänzen."
    priority: high
    origin: plugin-agents
    status: resolved
    answer: "integration-dogfood ergänzt: node-Verben add-phase/add-ac/add-phase-evidence (node-ops addPhase/addAc/addChildEvidence) + set-field-Bug behoben (Facade read→setField mit reserved-Guard). nested set-field (context.wrap) via generischem set-field abgedeckt."
    source: ai
tasks:
