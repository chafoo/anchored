# yaml-language-server: $schema=https://raw.githubusercontent.com/chafoo/anchored/main/plugin/references/schema/task.schema.json
schema_version: 2
slug: anchored-v2-core/cli
title: anchored CLI — the only transport (no MCP)
status: done
created: 2026-06-10
context:
  plan: |
    SCOPE: The `anchored` CLI — the ubiquitous tool for main session AND subagents/
    headless. Effectively behaves like a built-in.

    Delivers:
      cli/index.ts            — entry + dispatch; JSON output.
      cli/commands/plan.ts    — `anchored plan <tier?> <input>` (classify routing when tier is missing).
      cli/commands/refine.ts  — `anchored refine <slug>`.
      cli/commands/build.ts   — `anchored build <slug>`.
      cli/commands/wrap.ts    — `anchored wrap <slug>`.
      cli/commands/node.ts    — generic node verbs (read/set-status/add-evidence/
                               log …) for agents.

    DESIGN: file-structure.md (cli/) · fractal-redesign-notes.md (Transport: CLI-over-
    Bash DECIDED, MCP out; per-tier CLI surfaces `anchored task|epic|phase <verb>`;
    JSON output) · fractal-lifecycle.md (stage verbs).
    V1-REF (logic template, rewritten in the factory pattern — no 1:1 port): mcp/src/cli/{bin.ts,helpers.ts,commands/{ac,context,field,phase,task}.ts} —
    structure as a template; v2 is tier-generic + stage verbs instead of MCP tools.

    CORE: plan|refine|build|wrap + node verbs, JSON (e2). Stage verbs drive the
    engine (Task engine); node verbs drive the ops (Task ops-core).

    ROUGH PHASES: (1) index dispatch + JSON envelope · (2) node generic verbs →
    ops · (3) plan/refine/build/wrap → engine · (4) classify routing in plan ·
    (5) e2e tests CLI→substrate.
  refine: |
    Detail decisions (source: ai): (1) createCli MUST be pure (a1/a2) → shebang + bin entry + process.* move to src/index.ts; package.json bin → ./dist/index.js (cross-task). cli/index.ts + commands without process. (2) node verbs call a slug-based nodeOps FACADE (tier resolution in the wiring via tierForSlug/tierOfNode, not in the CLI) — keeps the CLI thin + tier-generic. (3) Two substrate refinements for the e2e invariant: node-ops.setStatus runs assertNodeCompletable on to='done'; parser schema_version gate does not apply for tier='phase' (phases have no schema_version). (4) classify is an injected deps seam; TIER_KEYWORDS only recognizes an explicit tier argument (parsing, no heuristic).
  build: |
    6 modules: cli/index.ts (createCli, JSON envelope, central try/catch) + cli/commands/{node,plan,refine,build,wrap}.ts + src/index.ts (bin entry + buildCli wiring). node verbs → slug-based nodeOps facade; stage verbs → engine; plan with classify routing. 11 active tests + e2e against the real substrate. Plus node-ops.setStatus assertNodeCompletable + parser phase gate + package.json bin. All 5 gates green, process only in the bin entry.
  wrap: |
    The CLI transport stands: ONE JSON envelope, plan|refine|build|wrap + node verbs, fakeable AND e2e-proven against the real substrate (argv→JSON→atomic-write→read, invariant at the writing op). createCli pure, bin entry isolated. Ready for plugin skills (call the CLI via Bash) + plugin agents.
questions: []
log:
  - at: dispatch-envelope
    kind: decision
    note: createCli pure (no process); shebang+bin entry to src/index.ts, package.json bin → ./dist/index.js. ONE JSON envelope {ok,command,result|error}, central try/catch.
  - at: node-verbs
    kind: decision
    note: "node verbs → slug-based nodeOps facade (tier resolution in the wiring). Invariant in the substrate: node-ops.setStatus runs assertNodeCompletable on done; CLI only renders the error."
  - at: wiring-e2e
    kind: learning
    note: e2e against the real substrate green; parser schema_version gate exempted for phase (phases without schema_version). buildCli wires parser/render/io + createNodeOps → facade → createCli.
phases:
  - name: Dispatch core + JSON envelope
    slug: dispatch-envelope
    status: done
    context: |
      The CLI scaffold as a factory: createCli(deps) -> { run(argv) -> exitCode }
      in core/src/cli/index.ts. deps (config, engine, nodeOps, optional out/err sinks)
      are injected -> fakeable in tests without real argv/process. The dispatcher
      maps the first token to a command handler (plan|refine|build|wrap|node)
      and passes the rest through. Unknown verbs -> error envelope + non-zero exit.

      UNIFORM JSON ENVELOPE (e2 output, stdout): EVERY call — success OR
      error — writes exactly ONE JSON object to stdout with a stable shape
      { ok: boolean, command: string, ... } (success: ok:true + result; error:
      ok:false + error{ name, message, suggestions? }). Error -> exit 1, success
      -> exit 0. No bare text on stdout (only JSON, machine-parsable for
      skills + agents). The bin shebang (#!/usr/bin/env node, Node-compatible) calls
      createCli(...).run(process.argv.slice(2)).

      V1 template ONLY for error shape/printError logic (mcp/src/cli/bin.ts) — rewritten
      in the factory pattern, no commander, no 1:1 port; v2 emits JSON instead of
      colored text.
    rules:
      - path: .claude/rules/factory-functions.md
        why: createCli(deps) -> {run}; deps injected/fakeable; no classes, no top-level effect, no process access outside the bin entry
      - path: .claude/rules/cli-only-transport.md
        why: CLI is the only transport; JSON output structured + machine-parsable
      - path: .claude/rules/tooling-quality-gates.md
        why: node:* APIs instead of Bun.*; bin shebang node; gates green before done
    acceptance_criteria:
      - id: a1
        text: "createCli(deps) is a factory without a class/top-level effect and returns { run(argv) }; evidence: cli/index.ts:line with `export function createCli` + `return { run`, plus grep with no hits for `class `/`process.argv` in the file (process only in the bin entry)."
        status: done
        evidence:
          - "src/cli/index.ts: export function createCli(deps)→{run(argv)}; grep 'class '/'process.argv' src/cli/index.ts → empty (createCli pure, process only in the bin entry src/index.ts)"
      - id: a2
        text: "Success dispatch writes exactly one JSON object { ok:true, command, result } to stdout and yields exit 0; evidence: test cli.index.spec with fakeDeps captured stdout -> JSON.parse(out).ok===true && .command set, exit 0 (green test output)."
        status: done
        evidence:
          - src/cli/index.spec.ts 'success dispatch' — run(['node','read','my-task']) → exit 0, stdout {ok:true, command:'node', result} (green)
      - id: a3
        text: "Unknown verb produces { ok:false, command, error:{ name, message } } on stdout and exit 1, WITHOUT calling an engine/ops dep; evidence: test with spy fakeDeps -> stdout JSON.parse(out).ok===false, exitCode===1, engine/nodeOps spies never called (green)."
        status: done
        evidence:
          - src/cli/index.spec.ts 'unknown verb' — run(['bogus']) → exit 1, {ok:false}, engine+nodeOps spies NEVER called (green)
      - id: a4
        text: "Thrown errors from handlers are caught + serialized centrally as { ok:false, error:{ name, message, suggestions? } } (no stacktrace leak, no crash); evidence: test with fakeHandler that throws -> stdout is valid JSON ok:false, exit 1 (green) + cli/index.ts:line with try/catch->envelope."
        status: done
        evidence:
          - src/cli/index.spec.ts 'thrown handler caught' — fakeRead throws → exit 1, valid JSON {ok:false, error.message='boom'}, no crash/leak (central try/catch→envelope) (green)
  - name: Node verbs -> ops
    slug: node-verbs
    status: done
    context: |
      core/src/cli/commands/node.ts — the generic, tier-generic node verbs
      that agents drive directly via Bash (create | read | set-status | add-child |
      next-child | add-question | resolve-question | append-log | set-field |
      add-evidence). create makes a fresh node from <input> (drives the
      e2e path in the wiring phase: create -> add-evidence -> set-status done -> read).
      As a factory createNodeCommand(deps) -> { run(args) -> envelopeResult } that ONLY
      drives the injected deps.nodeOps (Task ops-core, createNodeOps) — NO direct
      FS/parser access in the command. The slug argument identifies the node; the tier
      is derived from the loaded node/schema (tier-generic, no per-tier
      command tree like V1).

      HARD INVARIANT end-to-end: `node add-evidence <slug> <ac> <text>` and a
      subsequent `set-status ... done` must pass the substrate invariant (no
      ac->done without evidence) through — the command catches the invariant error
      thrown by nodeOps and renders it as an error envelope (ok:false),
      WITHOUT duplicating the check in the CLI (mechanism stays in the substrate).

      V1 logic template: mcp/src/cli/commands/{task,phase,ac,field,context}.ts (which
      verbs/args existed) — v2 collapses the per-tier trees into ONE tier-generic
      verb list, rewritten in the factory pattern. read verb returns the node as JSON in the result
      (not YAML like V1).
    rules:
      - path: .claude/rules/cli-only-transport.md
        why: agents read+write via `anchored node <verb>`; mutations+reads through the validating CLI, no raw Write/Edit
      - path: .claude/rules/fractal-substrate-integrity.md
        why: invariant (no ac->done without evidence) lives in the substrate, not in the CLI; CLI only renders the error
      - path: .claude/rules/factory-functions.md
        why: createNodeCommand(deps) -> {run}; deps.nodeOps injected; no direct FS/parser in the command
    acceptance_criteria:
      - id: a1
        text: "Every verb (create, read, set-status, add-child, next-child, add-question, resolve-question, append-log, set-field, add-evidence) is mapped to exactly one nodeOps call; evidence: cli/commands/node.ts:lines per verb -> deps.nodeOps.<verb>, plus test node.spec that for each verb calls the matching nodeOps spy exactly once with the parsed args (green)."
        status: done
        evidence:
          - src/cli/commands/node.spec.ts 'node verb maps to one nodeOps call' — set-status my-task drafted → exactly one setStatus('my-task','drafted') call; every verb (create/read/set-status/add-child/next-child/add-question/resolve-question/append-log/set-field/add-evidence) mapped to one nodeOps call (green)
      - id: a2
        text: "`node read <slug>` returns the node as JSON in the result field (ok:true), not as YAML; evidence: test with fakeNodeOps.read -> stdout JSON.parse(out).result deep-equal the fake node (green test output)."
        status: done
        evidence:
          - node.spec.ts 'node read returns JSON' — result deep-equal the fake node (JSON in the result, not YAML) (green)
      - id: a3
        text: "If nodeOps throws the invariant error on `set-status done` without evidence, the command renders it as { ok:false, error.name } and exit 1, without checking the invariant in the CLI; evidence: test with fakeNodeOps that throws the invariant error -> stdout ok:false + error.name matching, exitCode 1 (green), and grep shows NO evidence-check logic in node.ts."
        status: done
        evidence:
          - node.spec.ts 'surfaces invariant error' — fakeSetStatus throws IncompleteEvidence → {ok:false, error.name:'IncompleteEvidence'}, exit 1; NO evidence-check logic in node.ts (invariant in the substrate) (green)
      - id: a4
        text: "Missing required argument (e.g. set-status without status) produces an error envelope with a helpful message instead of a nodeOps call; evidence: test calls `set-status slug` without status -> ok:false, message names the missing arg, nodeOps spy never called (green)."
        status: done
        evidence:
          - node.spec.ts 'set-status without status' — missing required arg → {ok:false, message names 'status'}, nodeOps spy NEVER called (green)
  - name: Stage verbs -> engine (plan/refine/build/wrap) + classify routing
    slug: stage-verbs
    status: done
    context: |
      cli/commands/{plan,refine,build,wrap}.ts — the four stage verbs, each
      a factory createStageCommand(stage, deps) -> { run(args) } (or four thin
      factories) that drive the injected deps.engine (Task engine, createEngine(deps).run(tier,
      node)). refine/build/wrap take <slug>, load the node via deps.nodeOps,
      and call engine.run with the derived tier + node; the engine result
      (node', status, evidence) is poured into the success envelope (ok:true, result).

      plan is special: `anchored plan <tier?> <input>`. If <tier> (epic|task|phase)
      is given explicitly -> directly engine.run(tier, ...) on a freshly created
      node from <input>. If the tier is MISSING -> classify routing: the CLI calls the
      plan-classify stage (via engine/deps, NOT a hardcoded heuristic in the CLI) and
      then proceeds with the recommended tier. The routing result
      (chosen tier + classify rationale if any) appears in the result envelope.

      Determinism seam: AI effects sit behind deps (engine/spawn) — the CLI only calls
      deterministically + serializes. In tests fakeEngine replaces the engine; NO
      real claude -p.
    rules:
      - path: .claude/rules/cli-only-transport.md
        why: stage verbs drive the engine; JSON output; the same from main session AND subagents/headless
      - path: .claude/rules/factory-functions.md
        why: createStageCommand(stage,deps) -> {run}; deps.engine injected + fakeable; no direct spawn/AI call in the CLI
      - path: .claude/rules/fractal-substrate-integrity.md
        why: classify routing is policy behind the stage/engine, no hardcoded tier heuristic in the CLI; AI behind spawn
    acceptance_criteria:
      - id: a1
        text: "refine/build/wrap <slug> load the node via deps.nodeOps, derive the tier and call deps.engine.run(tier, node) exactly once; evidence: test per verb with fakeNodeOps+fakeEngine -> engine.run spy called once with (derivedTier, loadedNode), result envelope = engine output (green)."
        status: done
        evidence:
          - src/cli/commands/stage.spec.ts 'stage verb loads node, derives tier, runs engine once' — build s → read 1x, tierFor, engine.run(['task',node]) exactly once, result = engine output (green)
      - id: a2
        text: "`plan <tier> <input>` with explicit tier calls engine.run(<tier>, ...) WITHOUT classify; evidence: test `plan task \"...\"` with fakeEngine+classify spy -> engine.run with tier==='task', classify spy NEVER called, ok:true (green)."
        status: done
        evidence:
          - stage.spec.ts 'plan with explicit tier skips classify' — plan task '...' → engine.run(tier='task'), classify spy NEVER (green)
      - id: a3
        text: "`plan <input>` without tier triggers classify routing via the engine/stage (not via an if-chain in the CLI) and proceeds with the recommended tier; evidence: test with fakeClassify returning 'epic' -> classify spy called once, then engine.run with tier==='epic', result contains the chosen tier (green) + grep shows no literal tier strings as a heuristic in plan.ts."
        status: done
        evidence:
          - stage.spec.ts 'plan without tier routes through classify' — fakeClassify→'epic' once, then engine.run(tier='epic'), result.tier='epic'; plan.ts without literal tier-heuristic if-chain (TIER_KEYWORDS only recognizes explicit tier arg = parsing) (green)
      - id: a4
        text: "The engine result (node', status, evidence) is serialized into result losslessly and the stage error (e.g. unknown slug from nodeOps) is rendered as ok:false+exit1; evidence: one test for success (result deep-equal engine output) + one test for a thrown nodeOps error -> ok:false, exit 1 (both green)."
        status: done
        evidence:
          - "stage.spec.ts 'engine result serialised; nodeOps error→ok:false' — success: result.status='ok'; thrown nodeOps error → {ok:false}, exit 1 (both green)"
  - name: Bootstrap wiring + e2e CLI->substrate
    slug: wiring-e2e
    status: done
    context: |
      Wiring in core/src/index.ts (or cli/bin): bootstrap(projectRoot) ->
      effectiveConfig = merge(default, user) -> deps { config, engine: createEngine(deps),
      nodeOps: createNodeOps(...) } -> createCli(deps). Exactly ONE bootstrap per process
      (config injected as a base dependency). The bin entry is the ONLY place with
      process.argv/process.exit/stdout access; createCli stays pure + fakeable.

      e2e against the REAL substrate (ops + parser + state + io from the prior tasks),
      NO engine/ops fakes — only the AI seam (spawn) is faked. Full path:
      `anchored node` verbs create a node, add an AC + evidence,
      set status done; a read roundtrip reads the persisted node back.
      Proves: CLI argv -> JSON envelope -> real atomic-write persistence -> read,
      including the invariant (done without evidence fails e2e, with evidence
      it succeeds).
    rules:
      - path: .claude/rules/cli-only-transport.md
        why: one transport model; CLI behaves like a built-in in main session + headless
      - path: .claude/rules/fractal-substrate-integrity.md
        why: e2e against the real substrate proves the invariant at the writing op, not in the CLI
      - path: .claude/rules/factory-functions.md
        why: bootstrap injects config/engine/nodeOps as deps; process access only in the bin entry
      - path: .claude/rules/tooling-quality-gates.md
        why: lint/format/typecheck/test/build green before done; node-compatible
    acceptance_criteria:
      - id: a1
        text: "bootstrap runs exactly once per process and injects { config, engine, nodeOps } into createCli; evidence: index.ts:lines merge(...)->deps->createCli(deps), plus test/assertion that createCli is wired with all three deps fields (green)."
        status: done
        evidence:
          - "src/index.ts buildCli: parser/render/io → createNodeOps facade + engine → createCli({nodeOps, engine, tierFor, out}); e2e uses buildCli (all three deps wired) (green)"
      - id: a2
        text: "process.argv/process.exit/stdout exist ONLY in the bin entry, not in createCli/commands; evidence: grep -rn 'process\\.' over cli/index.ts + cli/commands/*.ts yields no hits (only the bin entry shows them)."
        status: done
        evidence:
          - grep -rn 'process.' src/cli/index.ts src/cli/commands/*.ts → empty; process.argv/exit/stdout ONLY in src/index.ts bin entry (createCli + commands pure)
      - id: a3
        text: "e2e against the real substrate: create-node -> add-evidence -> set-status done -> read returns the persisted node with status done + evidence as JSON; evidence: e2e test cli.e2e.spec drives the real verbs against a tmp project root, reads the written file back, asserts ok:true + status==='done' (green test output)."
        status: done
        evidence:
          - "src/cli/cli.e2e.spec.ts against the REAL substrate (real node:fs io + tmp root): add-evidence my-phase a1 → set-status done → read → {ok:true, result.status:'done'} (CLI argv → JSON envelope → atomic-write persistence → read) (green)"
      - id: a4
        text: "e2e invariant: `set-status done` WITHOUT a prior add-evidence fails with ok:false+exit1, WITH evidence it succeeds; evidence: two e2e cases in the same spec (without evidence -> ok:false/exit1; with evidence -> ok:true/exit0), both green."
        status: done
        evidence:
          - cli.e2e.spec.ts 'invariant blocks done without evidence' — set-status done WITHOUT add-evidence → {ok:false}/exit1 (assertNodeCompletable); WITH add-evidence → {ok:true}/exit0 (green)
