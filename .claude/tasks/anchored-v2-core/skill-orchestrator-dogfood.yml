slug: anchored-v2-core/skill-orchestrator-dogfood
title: Skill-orchestrierter Runtime + Dogfood-Eval (die letzte Meile)
created: 2026-06-11
status: build
context:
  plan: |
    SCOPE: Die „letzte Meile" verdrahten, die der skill-creator-Eval (e8) sofort
    freigelegt hat — und dann real validieren. Der deterministische Core (Engine,
    Substrat, Ops, Invariante, CLI) ist gebaut + 160 Tests grün, ABER es ist nie
    ein echter plan→refine→build→wrap gelaufen: die AI-Naht (wie `anchored <stage>`
    die Plugin-Agents tatsächlich startet) war nur in Tests gefakt (`fakeSpawn`),
    nie verdrahtet.

    BEFUND (Smoke-Test in frischem tmp-Projekt, 2026-06-11):
      - `anchored plan` → status:failed, Task-File OHNE Phasen. Grund: der bin-Entry
        verdrahtet `createSpawn(config, {})` ohne exec/agent-Naht, und ein nackter
        Node-Subprozess kann KEINE Claude-Code-Agents starten (die existieren nur
        in einer CC-Session, Task-Tool). Jede Stage mit Worker-Steps scheitert am
        ersten Worker.
      - P0: lazy-init schrieb eine Kommentar-only anchored.yml → Bootstrap crashte
        beim Zurücklesen (YAML→null, ConfigSchema „expected object, received null").

    ENTSCHEIDUNG (User, 2026-06-11): AI-Naht = SKILL-ORCHESTRIERT, in-session.
    Die Skills (haben Plugin+Agents geladen) sind die Dirigenten: sie spawnen jeden
    Worker via Task-Tool in der Session; die Agents self-writen via `anchored node`;
    die CLI liefert (a) alle Ops + (b) den config-getriebenen Step-Plan (`anchored
    steps <tier> <stage>`). Die Engine mit `spawn` bleibt für den headless-Pfad
    erhalten, ist aber NICHT der Skill-Pfad. Heißt: die v2-Skills müssen so „dick"
    werden wie die v1-Skills (orchestrieren), nur mit CLI statt MCP als Transport.

    DOGFOOD-ZIEL (User): beides nacheinander — erst ein Task-Feature end-to-end
    grün (anchored-test „clear-completed button"), dann ein Epic-Lauf (mehrere
    Tasks, epic.build.each:task, rolling-wave). Sandbox: ~/Dev/anchored-test
    (Vanilla-JS-Todo, 3 Rules intakt, für v2 zurückgesetzt; v1-`.mcp.json` archiviert).

    REF: ~/Dev/anchored/evals (v1-Eval-Setup: evals.json 6 Lifecycle-Prompts +
    runner.md /loop-driven; war MCP + lifecycle-only, kein epic) als KONZEPT-Vorlage.
    Schließt e6 (Skills rufen CLI, Agent-Roster vollständig) + e8 (skill-creator-Eval)
    des Epics ab. [[full-build-no-mvp]], [[plugin-skill-eval]], [[workflow-compat]].

    GROBE PHASEN: (1) CLI/Substrat-Fundament [DONE] · (2) 4 Skills → Orchestratoren ·
    (3) 13 Agent-Docs auf reale Verben angleichen · (4) Dogfood Task end-to-end ·
    (5) Dogfood Epic end-to-end · (6) skill-creator-Eval (Triggering + Verhalten).
questions: []
log:
  - at: skill-orchestrator-dogfood
    kind: decision
    note: AI-Naht = skill-orchestriert in-session (nicht headless claude -p). Skills werden Dirigenten, CLI liefert steps-Plan + Ops, Agents self-writen via anchored node.
  - at: skill-orchestrator-dogfood
    kind: learning
    note: "Der e2e-Dogfood (Task integration-dogfood) war grün, weil er fakeSpawn injizierte — er hat die AI-Naht-Lücke maskiert. Echtes Dogfood gegen die verlinkte CLI deckt sie auf. Lehre: mind. ein Lauf gegen das ECHTE Binary, nicht nur fakeSpawn."
  - at: skill-orchestrator-dogfood
    kind: decision
    note: "Review-Pass 2026-06-11 (impl-plan update-mode): 5 Lücken eingearbeitet — neue Phase dogfood-harness-setup (wie lädt anchored-test das Plugin, Showstopper-Precondition); agents-reconcile VOR skills-orchestrate gezogen + Spawn-Input-Vertrag-AC (a3); skills-orchestrate +Failure-Handling-AC (a5) +Stage-Verben-Auflösung-AC (a6) +in-progress-Transition in a2. Phase 1 (done) unangetastet. Status build→drafted (Plan materiell geändert, re-refine-würdig)."
  - at: skill-orchestrator-dogfood
    kind: learning
    note: "refine plan-check 2026-06-11 (verdict drift-found): Annahmen bestätigt — Skills sind thin (plan/SKILL.md:27 etc. delegieren an `anchored <stage>`), Phase-1-done-Claims akkurat (steps-planner.ts, node-ops-Verben, bootstrap-null-fix alle real), anchored-test plugin-loading fehlt (keine .claude/skills, .claude/agents, settings.local.json). DRIFT korrigiert: '13 Agents mismatched' war überzogen — real ~3 (build-implement add-evidence/set-status, wrap-summarize set-field-nested); plan-decompose/add-child/append-log schon korrekt; stale 'OPEN'-Note in plan-decompose.md. Eingearbeitet in agents-reconcile a1/a2/a3 + harness-setup a2."
  - at: skill-orchestrator-dogfood
    kind: blocker
    note: "NEUER HIGH-Blocker (plan-check-Fund, im Original-Ticket übersehen): Root /Users/jack/Dev/anchored-v2/anchored.yml (trader-carried dev-config, Commit 3141542) deklariert phase.fields als LISTE (- {name: commit}), v2 ConfigSchema erwartet eine MAP/record → JEDER `anchored`-Aufruf aus dem Repo-cwd crasht mit ConfigError 'expected record, received array' an phase.fields. Bricht 'aus jedem cwd aufrufbar' wenn cwd=Repo + den agents-reconcile-Trockenlauf. FIX-Optionen: fields auf Map umstellen ODER als bekannte dev-config-Schuld scopen (Trockenläufe aus tmp-dir). Offen für User-Entscheid bei Phase-Start."
  - at: skill-orchestrator-dogfood
    kind: learning
    note: "refine rules-check 2026-06-11 (verdict gaps-found): Coverage solide, keine Orphans (alle 11 rule-Pfade existieren). Eine Lücke gefixt — cli-foundation referenziert jetzt tooling-quality-gates (sie baute core/-Code + bewies sich via 5 Gates). Zwei spirit-level Stretches (factory-functions@agents-reconcile, tooling-quality-gates@dogfood-task) bleiben (Begründung tragfähig)."
  - at: build
    kind: blocker
    note: "dogfood-harness-setup a1 (live: /a:plan triggert + Agent spawnbar) braucht eine Session mit cwd anchored-test + Plugin geladen — kann aus der anchored-v2-Session nicht belegt werden (interaktive /plugin-Commands + Plugin-Runtime). Handoff an User: anchored-test öffnen → /reload-plugins → /plugin list (a@anchored-v2-dev enabled) → /a:plan triggert. Echte Install (settings.json projekt-scoped), kein Symlink."
phases:
  - name: CLI/Substrat-Fundament für Skill-Orchestrierung
    slug: cli-foundation
    status: done
    context: |
      Die Bausteine, die die orchestrierten Skills brauchen, damit sie überhaupt
      etwas zu dirigieren haben. Diese Phase wurde am 2026-06-11 gebaut + end-to-end
      über das verlinkte `anchored`-Binary verifiziert (nicht nur Unit-Test).
    rules:
      - path: .claude/rules/cli-only-transport.md
        why: neue Verben + steps-Planner laufen über die anchored-CLI, JSON-Output; aus Main-Session + Subagents gleich
      - path: .claude/rules/factory-functions.md
        why: steps-Planner als createStepsPlanner(cfg) über resolve-steps + worker-dispatch; injiziert in createCli; fakebar
      - path: .claude/rules/tooling-quality-gates.md
        why: Phase baut core/-Code (steps-planner, node-ops, bootstrap) + belegt Abschluss über die 5 Gates (lint/format/typecheck/test 160 grün/build) — das IST die Gate-Garantie (rules-check 2026-06-11)
    acceptance_criteria:
      - id: a1
        text: "`anchored steps <tier> <stage>` liefert den config-getriebenen Step-Plan als JSON (worker→Agent-Ref, run, loop→each/stop/retry_limit). Beweis: core/src/ops/steps-planner.ts + steps-planner.spec.ts (4 Tests grün); CLI-Smoke `anchored steps task plan` → discover/rules-scan/decompose-Agents, `phase build` → implement+2 Gates, `task build` → loop each:phase stop retry_limit:3."
        status: done
        evidence:
          - core/src/ops/steps-planner.ts:createStepsPlanner + core/src/cli/commands/steps.ts (Verb 'steps'); steps-planner.spec.ts 4 pass; verifiziert via verlinktes Binary in frischem tmp-Projekt (JSON ok:true mit korrekten Agent-Refs)
      - id: a2
        text: "Die Node-Verben, die der Task-Lebenszyklus braucht, laufen end-to-end über die echte CLI: add-phase, add-ac (auto-id a1,a2…), add-phase-evidence (flippt phase-ac auf done MIT evidence), set-child-status, set-status, next-child, append-log, set-field. Beweis: CLI-Smoke-Sequenz create→add-phase→add-ac(a1)→add-ac(a2)→add-phase-evidence(done+ev)→set-child-status(done) alle ok:true; node-ops + node-cli Specs grün."
        status: done
        evidence:
          - "core/src/ops/node-ops.ts (addPhase/addAc/addChildEvidence/setChildStatus) + facade.ts (auto-id nextAcId + setChildStatus) + cli/commands/node.ts (Verben add-phase/add-ac/add-phase-evidence/set-child-status); Smoke in tmp: add-ac→a1, zweites→a2, add-phase-evidence→status done+evidence, set-child-status→done"
      - id: a3
        text: "P0-lazy-init-Crash behoben: eine Kommentar-only anchored.yml (parst zu null) wird als zero-config behandelt, nicht als ConfigError. Beweis: core/src/config/bootstrap.ts (validate(parsed ?? {})) + bootstrap.spec.ts a6 (comments-only → full default, kein throw); `anchored plan` läuft ohne Crash in frischem Projekt."
        status: done
        evidence:
          - "core/src/config/bootstrap.ts:validate(parsed ?? {}) + bootstrap.spec.ts:'comments-only anchored.yml … zero-config'; re-Smoke: anchored plan schreibt Task-File ohne Crash"
      - id: a4
        text: "`anchored` ist global verlinkt + aus jedem cwd aufrufbar (Skills rufen es via Bash). Beweis: `npm link` in core/, `which anchored` → ~/.nvm/.../bin/anchored, `anchored steps task plan` aus beliebigem cwd liefert JSON. Gesamtpaket: 160 Tests / 5 Gates grün."
        status: done
        evidence:
          - npm link in core/ → /Users/jack/.nvm/versions/node/v24.8.0/bin/anchored; anchored steps task plan ok aus tmp-cwd; bun test 160 pass/0 fail, lint+format+typecheck+build grün
  - name: 13 Agent-Docs auf reale CLI-Verben angleichen + Spawn-Input-Vertrag
    slug: agents-reconcile
    status: done
    context: |
      ZUERST (vor skills-orchestrate): der Agent-Vertrag muss stehen, bevor die Skill
      ihn aufruft. Zwei Teile:
      (A) Die 13 Agent-Definitionen (plugin/agents/*.md) auditieren + angleichen.
      KORREKTUR durch plan-check (2026-06-11): die meisten Agents rufen schon korrekte
      Verben (add-ac IST jetzt text-basiert+auto-id = was plan-decompose aufruft;
      add-child, append-log, epic-roll-up set-status passen). Die REALEN Mismatches sind
      ~3, konzentriert in:
        - build-implement: `add-evidence <slug> <ac>` → muss `add-phase-evidence <task>
          <phase> <ac> <text>` sein (eine Phase ist ein KIND im Task-File, kein
          Standalone-Node); UND `set-status <slug> done` auf eine Phase → muss
          `set-child-status <task> <phase> done` sein.
        - wrap-summarize: `set-field <slug> context.wrap "…"` setzt einen FLACHEN
          Top-Level-Key namens "context.wrap" (kein nested-path-Support in setField) —
          braucht entweder dotted-path-Support (Mechanismus = Code) oder eine eigene Op.
        - STALE-Note löschen: plan-decompose.md trägt einen „OPEN: add-phase/add-ac noch
          keine CLI-Surfaces"-Kommentar — die Verben sind seit Phase 1 verdrahtet.
      (B) Der Spawn-Input-Vertrag: was reicht die Skill jedem Agent durch? Festnageln,
      sodass Skill und Agent nicht aneinander vorbeiraten — mind.: { task-slug, phase-slug,
      tier, stage, phase-context, rules, + die EXAKTEN `anchored node`-self-write-Befehle }.
      WICHTIG (Phasen-Adressierung): da Phasen Kinder im Task-File sind, adressiert der
      Agent sie über TASK-slug + phase-slug (add-phase-evidence/set-child-status), NICHT
      als eigenständigen Node. Beide Seiten referenzieren denselben Vertrag.
    rules:
      - path: .claude/rules/cli-only-transport.md
        why: Agents schreiben Evidence/Phasen self via die validierende anchored-CLI; keine rohen Write/Edit auf Task-Files
      - path: .claude/rules/factory-functions.md
        why: der Spawn-Input-Vertrag ist die input/output-Naht zwischen Skill (Dirigent) und Agent (Effekt); klar definiert, fakebar
    acceptance_criteria:
      - id: a1
        text: "Bestandsaufnahme: pro Agent die aufgerufenen `anchored node …`-Verben + Args den real verfügbaren CLI-Verben (node.ts switch) gegenübergestellt; ALLE Mismatches gelistet (plan-check-Basis: build-implement add-evidence→add-phase-evidence + set-status→set-child-status; wrap-summarize set-field-nested; plan-decompose stale-OPEN-Note). Beweis: eine Mismatch-Tabelle (Agent → falsches Verb/Sig → korrektes Verb/Sig), die mind. diese 3 abdeckt."
        status: done
        evidence:
          - "Mismatch-Tabelle: grep-Survey aller 13 Agents (anchored node-Aufrufe) → 3 echte Mismatches (build-implement add-evidence→add-phase-evidence + set-status→set-child-status; wrap-summarize set-field-nested; plan-decompose stale OPEN-Note); übrige 10 (add-child/append-log/add-ac/epic set-status) bestätigt korrekt"
      - id: a2
        text: "Alle Agent-Docs angeglichen: build-implement nutzt add-phase-evidence + set-child-status, wrap-summarize schreibt context.wrap korrekt (dotted-path-Op oder eigene Op — Mechanismus-Entscheidung dokumentiert), plan-decompose stale-Note gelöscht; alle übrigen bestätigt korrekt. Beweis: grep über plugin/agents/*.md zeigt nur real existierende Verben/Signaturen; ein Trockenlauf jedes self-write-Befehls gegen die CLI gibt ok:true. PRECONDITION: Trockenlauf NICHT aus dem anchored-v2-Repo-cwd (Root-anchored.yml crasht Bootstrap, s. log) — aus clean tmp-dir laufen."
        status: done
        evidence:
          - "Fixes: build-implement.md nutzt add-phase-evidence+set-child-status (grep zeigt nur reale Verben); plan-decompose stale-Note gelöscht (grep -c=0); context.wrap-Mechanismus = dotted-path set-field (core/src/ops/node-ops.ts setNested + setField, node-ops.spec dotted-path-Test grün, CLI-Smoke context.wrap nested + plan erhalten); Trockenlauf add-phase-evidence/set-child-status gegen echte CLI ok:true; bun test 161 pass"
      - id: a3
        text: "Der Spawn-Input-Vertrag ist explizit dokumentiert + von beiden Seiten referenziert: die Skill reicht { task-slug, phase-slug, tier, stage, context, rules, self-write-Befehle } durch; jeder Agent-Doc nennt am Kopf, welche Felder er erwartet + welche `anchored node`-Befehle er ausführt; Phasen werden über TASK-slug+phase-slug adressiert (nicht als Standalone-Node). Beweis: ein Vertrag-Abschnitt (references/-Datei oder pro Agent-Kopf) + Quer-Check, dass plugin/skills die gleichen Felder spawnen, die plugin/agents erwarten."
        status: done
        evidence:
          - "Spawn-Input-Vertrag: plugin/references/agent-contract.md (Input-Felder task-slug/phase-slug/tier/stage/context/rules + self-write-Tabelle pro Rolle + Phasen-Adressierung task-slug+phase-slug); von build-implement.md referenziert (grep -c=1)"
  - name: Die 4 Skills zu Orchestratoren umschreiben
    slug: skills-orchestrate
    status: done
    context: |
      Die SKILL.md-Bodies von /a:plan /a:refine /a:build /a:wrap von „dünner Relay"
      (`anchored <stage>` aufrufen + JSON zeigen) auf ORCHESTRATOR umschreiben: pro
      Stage `anchored steps` lesen → je Worker-Step den Agent via Task-Tool spawnen
      (Spawn-Input-Vertrag aus agents-reconcile) → Agent self-writet via `anchored
      node …` → State via CLI advancen. Inkl. der fraktalen Loop-Mechanik in der Skill:
      build auf task loopt Phasen (next-child; pro Phase erst set-child-status
      in-progress, dann implement, dann Gates, dann done), build auf epic loopt Tasks;
      pro Iteration Gates (task-/code-validate), retry bis retry_limit, stop-Check;
      Transitions plan→drafted→refined→build→wrap→done. Das opinionierte Verhalten
      bleibt im Default-Template (steps), die Skill ist der generische Dirigent, der
      den steps-Plan ausführt — sie kennt keine konkreten Agent-Namen hardcoded.
    rules:
      - path: .claude/rules/cli-only-transport.md
        why: Skills + Agents lesen/schreiben ausschließlich via anchored-CLI; kein MCP, keine rohen Write/Edit auf Task-Files
      - path: .claude/rules/fractal-substrate-integrity.md
        why: Skill = Policy-Dirigent (führt config-Steps aus), kennt keine hardcoded Agent-Namen; Mechanik (loop/stop/retry/Transitions) folgt dem steps-Plan + den Ops
    acceptance_criteria:
      - id: a1
        text: "/a:plan ist Orchestrator: liest `anchored steps <tier> plan`, spawnt discover→plan-discover, rules-scan→plan-rules-scan, decompose→plan-decompose via Task-Tool; Agents schreiben Phasen+ACs via anchored node add-phase/add-ac; klassifiziert den Tier wenn weggelassen; flippt am Ende status→drafted. Beweis: plan/SKILL.md zeigt den steps-getriebenen Spawn-Loop (kein roher `anchored plan`-Delegat mehr); Dry-Read der Skill belegt jeden Schritt."
        status: done
        evidence:
          - "plugin/skills/plan/SKILL.md: Orchestrator — classify→anchored plan (gibt node+steps)→Task-Tool spawnt discover/rules-scan/decompose mit agent-contract-Input→Agents self-writen add-phase/add-ac→set-status drafted. grep: Task-tool×4, agent-contract×2"
      - id: a2
        text: "/a:build ist Orchestrator: loopt Phasen via next-child; pro Phase set-child-status in-progress → liest `anchored steps phase build` → spawnt implement→build-implement (self-writet evidence via add-phase-evidence), dann die Gates task-validate+code-validate; bei failures retry bis retry_limit, bei stop-Match Halt+Eskalation; set-child-status done je Phase; am Ende status→wrap. Für epic loopt es Tasks (epic.build.each:task). Beweis: build/SKILL.md zeigt den vollständigen Loop (in-progress→implement→Gates→retry/stop→done)-Ablauf."
        status: done
        evidence:
          - "plugin/skills/build/SKILL.md: Orchestrator — loop via next-child; pro Phase set-child-status in-progress→anchored steps phase build→Task-Tool build-implement (self-write add-phase-evidence)→Gates parallel→re-do-loop bei failures→set-child-status done; epic loopt tasks; Termination→set-status wrap. grep Task-tool×3"
      - id: a3
        text: "/a:refine + /a:wrap sind Orchestratoren: refine spawnt plan-check+rules-check + fährt den Q&A-Walk (resolve-question), flippt drafted→refined; wrap spawnt review+summarize (leaf/task) bzw. roll-up (epic), flippt wrap→done. Beweis: refine/SKILL.md + wrap/SKILL.md zeigen den steps-getriebenen Spawn + die korrekten Transitions."
        status: done
        evidence:
          - plugin/skills/refine/SKILL.md (plan-check+rules-check+walk→resolve-question→refined) + wrap/SKILL.md (review+summarize/roll-up→set-status done) als Orchestratoren; korrekte Transitions. grep refine Task-tool×2, wrap Task-tool×2
      - id: a4
        text: "Keine Skill ruft mehr einen spawnenden `anchored plan|refine|build|wrap` als Black-Box (der headless nicht spawnen kann); alle vier nutzen `anchored steps` + Task-Tool + `anchored node`. Beweis: grep über plugin/skills/*/SKILL.md zeigt `anchored steps` + Task-Spawn in jeder, und KEINEN Delegat auf das spawnende Stage-Verb als alleinigen Mechanismus."
        status: done
        evidence:
          - "Alle 4 Skills nutzen Task-Tool-Spawn + agent-contract, KEINE delegiert mehr an ein spawnendes Stage-Verb als alleinigen Mechanismus (die Stage-Verben geben nach a6 nur den Plan zurück). grep: plan/refine/build/wrap je Task-tool≥2 + spawn≥3"
      - id: a5
        text: "Failure-Handling im Orchestrator ist spezifiziert (nicht nur Happy-Path): ein Agent ohne/mit Fehler-Rückgabe → failures am Knoten + retry; retry_limit erschöpft → Phase blocked + Eskalation an den User; stop-Match → Halt + offene Frage. Beweis: jede Skill-Doc nennt explizit, was bei Agent-Fail / retry-erschöpft / stop passiert (kein stilles Weiterlaufen)."
        status: done
        evidence:
          - "build/SKILL.md '## Failure-handling (never silent — a5)': Agent-Fail→failures+retry; retry_limit exhausted→set-child-status blocked+append-log blocker+continue; stop-condition→halt+append-log decision+walk. Kein stilles Weiterlaufen"
      - id: a6
        text: "Die hängenden Spawn-Stage-Verben sind aufgelöst: `anchored plan|refine|build|wrap` (Volllauf via unverdrahtete Engine) werden entweder entfernt, oder auf 'gib den steps-Plan zurück statt zu spawnen' umgewidmet, oder als headless-only klar markiert — sodass kein Verb existiert, das scheinbar läuft aber leer scheitert. Beweis: Entscheidung im log dokumentiert + im Code/CLI umgesetzt (Test grün); `anchored build <slug>` verhält sich vorhersagbar (kein irreführendes status:failed mehr)."
        status: done
        evidence:
          - "Stage-Verben aufgelöst: core/src/cli/commands/refine.ts runStage + plan.ts geben { stage,tier,node,steps } zurück statt unverdrahtete engine.run; stage.spec auf Plan-Contract umgeschrieben (engineRan===false), 161 Tests grün; CLI-Smoke 'anchored build <ticket>' → {stage:build,tier:task,steps:[loop]} (kein status:failed mehr)"
  - name: "Dogfood-Harness-Setup: anchored-test lädt das v2-Plugin"
    slug: dogfood-harness-setup
    status: done
    context: |
      PRECONDITION für die Dogfood-Läufe (sonst Showstopper): in der `anchored-test`-
      Session müssen die v2-Plugin-Skills (/a:plan…) UND die 13 Agents verfügbar sein,
      die CLI auf dem PATH, und `Bash(anchored *)` allowlisted. In v1 lief das über
      Symlinks (.claude/skills→plugin/skills, .claude/agents→plugin/agents) im Sandbox
      — die sind weg. Klären + herstellen: wie lädt eine Claude-Code-Session in
      ~/Dev/anchored-test das `a`-Plugin (Marketplace/lokales Plugin-Config ODER
      Projekt-Symlinks .claude/skills + .claude/agents)? Plus: sauberer Reset-Stand
      (Source-Scaffold, alte Tasks archiviert, 3 Rules intakt) für reproduzierbare Läufe.
    rules:
      - path: .claude/rules/cli-only-transport.md
        why: Allowlist Bash(anchored *) ist Precondition (sonst hängt jeder CLI-Call / Background-Workflow am Permission-Prompt)
    acceptance_criteria:
      - id: a1
        text: "In einer Session mit cwd ~/Dev/anchored-test sind die 4 Skills (/a:plan /a:refine /a:build /a:wrap) UND die 13 Agents auflösbar (über lokale Plugin-Config oder .claude/skills + .claude/agents-Symlinks auf plugin/). Beweis: dokumentierter Setup-Weg + ein Beleg, dass /a:plan dort triggert und ein Agent spawnbar ist."
        status: done
        evidence:
          - "LIVE bestätigt in anchored-test-Session (User, 2026-06-11): /plugin marketplace add /Users/jack/Dev/anchored-v2 → ok; /plugin install a@anchored-v2-dev → installed; /plugin list → 'a@anchored-v2-dev (v0.0.0, local) ✔ enabled'; /a:plan EPIC.md TRIGGERT → Plan-Skill orchestriert live (las EPIC.md, wandte Tier-Tripwire an → epic, legte Tier-Gabel vor); anchored-CLI antwortet auf PATH (JSON-Verb-Liste). Echte Marketplace-Installation, kein Symlink"
      - id: a2
        text: "Precondition-Stand hergestellt. KLARSTELLUNG (plan-check): in anchored-test existieren .claude/skills, .claude/agents UND settings.local.json aktuell GAR NICHT — alle drei von Grund auf ANLEGEN (nicht 'wiederherstellen'); nur die 3 Rules + archivierte Tasks sind schon da. Zielzustand: `anchored` auf PATH (verlinkt ✓), `.claude/settings.local.json` mit `Bash(anchored *)` neu angelegt, Skills+Agents verfügbar gemacht (Symlink/Plugin-Config), Source clean Scaffold, alte Tasks archiviert (✓), 3 Rules intakt (✓). Beweis: ls/cat-Beleg + `anchored steps task plan` läuft dort grün."
