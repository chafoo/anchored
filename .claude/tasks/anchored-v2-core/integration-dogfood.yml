      npm-Scripts verdrahtet (Bun-Toolchain als dev-Runner; Produktivcode bleibt
      node-kompatibel, keine Bun.*-APIs).

      Fuenf Gates, alle gruen vor done:
        1. lint     — eslint sauber
        2. format   — prettier --check sauber
        3. typecheck — tsc --noEmit ohne Fehler
        4. test     — bun test gruen (inkl. der e2e-Smoke aus Phase 3)
        5. build    — bun build / Kompilat ohne Fehler (target node)

      Dies verifiziert den GANZEN Stack (e1..e7 + Phasen 1-3 dieser Task) als
      gruenes Ganzes. Ein roter Gate blockiert done.
    rules:
      - path: .claude/rules/tooling-quality-gates.md
        why: alle fuenf Gates (lint/format/typecheck/test/build) gruen vor done; als npm-Scripts; node-kompatibel, keine Bun.*-APIs im Produktivcode
      - path: .claude/rules/factory-functions.md
