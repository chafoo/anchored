schema_version: 2
slug: anchored-v2-core/integration-dogfood
title: Integration + Dogfood-Smoke (end-to-end)
status: done
created: 2026-06-10
context:
  plan: |
    SCOPE: Bring everything together + prove it runs as a whole. The capstone.

    Delivers:
      core/src/index.ts — public entry point: wiring createEngine + createOps (with
        injected deps: ops, parser/render, validate/state, spawn, config).
      lazy-init — write a minimal anchored.yml (schema directive + pointer to the reference)
        into the user project when there isn't one.
      Bash(anchored *) allowlist via .claude/settings.local.json (lazy on init).
      e2e-smoke: run a trivial task end-to-end through plan→(refine)→build
        (with fake OR real spawn), invariant + status transitions verified.

    DESIGN: file-structure.md (index.ts = wiring) · engine-architecture.md (deps graph) ·
    fractal-redesign-notes.md (lazy-init minimal yml; Bash allowlist; friction) ·
    CLAUDE.md (quality gates per package green).

    CORE: e1 (core builds green) + e2/e3/e4/e5/e7 verified together. Prepares the
    epic roll-up.

    ROUGH PHASES: (1) index.ts wiring · (2) lazy-init yml + allowlist · (3) e2e-smoke
    test (trivial task) · (4) full quality-gate round core/ green.
  build: |-
    Capstone built (4 phases, 15 ACs):
    - Phase 1 public-wiring: index.ts is now a PURE factory createAnchored(deps)→{cli,engine,ops,config}; bin entry split out into src/bin.ts (the only process.*/top-level-await location), engineOps moved to src/ops/engine-ops.ts, slug facade to src/ops/facade.ts. Bootstrap merges config exactly once (injectable merge seam). Deps-graph order ops→engine→cli.
    - Phase 2 lazy-init: src/config/init.ts createInit(deps)→{ensure} — minimal anchored.yml (directive+pointer, no default copy) + Bash(anchored *) allowlist in .claude/settings.local.json (idempotent merge, no clobbering), all via the io seam.
    - Phase 3 e2e-smoke: e2e.dogfood.spec against tmp-root with real substrate (only fakeSpawn): plan→build→wrap, forward-only transitions, hard invariant e2e, evidence per phase. engineOps re-reads before mutations (cli-only-transport: worker self-write, engine re-read — no clobber).
    - Phase 4 quality-gates: all 5 gates green (lint/format/typecheck/test 153 pass/build with dist/bin.js+shebang).
    q6 RESOLVED: node verbs add-phase, add-ac, add-phase-evidence (→ node-ops addPhase/addAc/addChildEvidence) added; set-field bug fixed (facade routes read→setField with reserved guard instead of create reconstruction). plan-decompose/build-implement now have their real verbs.
  wrap: "CORE met: e1 (core builds green) + e2/e3/e4/e5/e7 verified together. The whole stack runs as one object graph (createAnchored) end-to-end against real substrate. Only open point in the epic: skill-creator eval (e8) as the final step — unblocks plugin-skills, then epic roll-up."
questions: []
log:
  - at: integration-dogfood
    kind: learning
    note: "Keeping index.ts await-free (a1-grep) forced the clean separation: pure wiring factory (index) vs. await-carrying glue (ops/facade.ts, ops/engine-ops.ts) vs. process/bin (bin.ts). engineOps re-reads before every mutation — exactly the cli-only-transport reconciliation model (worker self-write ↔ engine re-read)."
phases:
  - name: index.ts — public wiring (createEngine + createOps + bootstrap)
    slug: public-wiring
    status: done
    context: |
      core/src/index.ts is the ONLY public entry point of the core package. It
      wires the entire substrate into a runnable whole — as a factory,
      NO top-level effect: createAnchored(projectRoot, overrides?) ->
      { cli, engine, ops, config } (or a thin bootstrap() factory). Exactly
      ONE bootstrap per process: effectiveConfig = merge(default-template, user)
      (task config-bootstrap), build the deps from it and pass them through:
        deps = { config, parser/render (task parser-io), io (task parser-io),
                 validate/state (task tier-schemas/invariant), spawn (task spawn),
                 ops: createNodeOps(...) (task ops-core),
                 engine: createEngine(deps) (task engine),
                 cli: createCli(deps) (task cli) }.
      The injection order follows the deps graph from
      engine-architecture.md (substrate -> ops -> engine -> cli). No module builds
      state at import; process.argv/exit/stdout stay EXCLUSIVELY in the
      bin entry (task cli), index.ts stays pure + fakeable.

      DESIGN: file-structure.md (index.ts = wiring; "core = the CLI/engine package")
      · engine-architecture.md (deps graph: deps -> createEngine -> tier/stage/step).
      This is the point where e1..e7 come together as ONE object graph.
    rules:
      - path: .claude/rules/factory-functions.md
        why: createAnchored/bootstrap as a factory; all deps injected + passed through; no classes, no module-level effect, no process access in index.ts
      - path: .claude/rules/cli-only-transport.md
        why: the wired cli is the only transport; index.ts exports no MCP, no alternative seam
      - path: .claude/rules/fractal-substrate-integrity.md
        why: config as a base dependency merged + injected exactly once; invariant stays in the substrate (ops/state), not duplicated in the wiring
    acceptance_criteria:
      - id: a1
        text: "core/src/index.ts exports a factory (e.g. `export function createAnchored` / `bootstrap`) that returns { cli, engine, ops, config } and contains NO top-level side effect/`class`/`process.`; evidence: index.ts:line of the export signature + the `return {` object, plus `grep -nE 'class |process\\.|^[^/]*await ' core/src/index.ts` with no hits (empty output)."
        status: done
        evidence:
          - core/src/index.ts:createAnchored returns { cli, engine, ops, config } (Anchored interface); index.spec.ts a1 green + grep -nE 'class |process\.|^[^/]*await ' src/index.ts EMPTY (await/process split out into the bin entry src/bin.ts + engineOps in src/ops/engine-ops.ts)
      - id: a2
        text: "Bootstrap runs exactly once and injects the merged effectiveConfig + all substrate deps into createEngine AND createCli (config as a base dependency); evidence: test index.spec with fakeMerge/fake sub-factories -> merge spy called exactly 1x, createEngine + createCli each called with the same deps object including the config field (green bun-test output, file:line of the assertion)."
        status: done
        evidence:
          - core/src/index.ts:183 bootstrap.load() merges exactly once (createBootstrap with injected merge seam); index.spec.ts a2 green — mergeCalls===1, createEngine+createCli get config-carrying deps (engineConfig.task defined)
      - id: a3
        text: "The deps graph is wired in substrate->ops->engine->cli order (each layer gets the previously created deps); evidence: index.spec asserts that createNodeOps is called BEFORE createEngine and createEngine BEFORE createCli (call-order spy) and that createCli receives the engine+ops from the prior stages (green test, file:line)."
        status: done
        evidence:
          - "core/src/index.ts:186-205 order buildSubstrate(ops) → createEngineFn → createCliFn; index.spec.ts a3 green (call-order spy: ops index < engine index < cli index)"
  - name: lazy-init — minimal anchored.yml + Bash(anchored *) allowlist
    slug: lazy-init
    status: done
    context: |
      When a user project does NOT yet have an anchored.yml, anchored writes
      a MINIMAL file lazily on the first run (schema directive + commented
      pointer to the reference plugin/references/anchored.default.yml) — NOT
      copying the whole default config (defaults are immutable; copy = drift,
      fractal-redesign-notes "storage/roles"). An existing anchored.yml is
      NEVER overwritten (idempotent).

      Additionally, lazy-init adds the `Bash(anchored *)` allowlist in
      `.claude/settings.local.json` so the CLI calls run without a permission
      prompt (fractal-redesign-notes "friction"; cli-only-transport rule
      "lazy-init adds Bash(anchored *)"). An existing settings.local.json is
      merged (existing permissions.allow stay, the entry is only added
      when not already there) — NO clobbering, JSON stays valid.

      As a factory createInit(deps) -> { ensure(projectRoot) -> { wroteYml,
      wroteAllowlist } }, deps = { io/fs seam (atomic-write from task parser-io), maybe
      parser } injected -> fakeable in test with fakeFs without a real FS. lazy-init
      is triggered in the bootstrap (Phase 1) or on the first stage verb.

      V1-REF only as a logic template (there was no lazy-minimal-yml in v1) — new in
      the factory pattern.
    rules:
      - path: .claude/rules/factory-functions.md
        why: createInit(deps) -> {ensure}; fs/io as injected seam, fakeable; no class, no top-level FS access
      - path: .claude/rules/cli-only-transport.md
        why: lazy-init adds Bash(anchored *) in settings.local.json so CLI calls run without a prompt
      - path: .claude/rules/fractal-substrate-integrity.md
        why: minimal yml = schema directive + pointer, NOT copying the default config (defaults immutable); atomic-write via the io seam
    acceptance_criteria:
      - id: a1
        text: "When anchored.yml is missing, ensure() writes a MINIMAL file with a schema-directive comment + pointer to plugin/references/anchored.default.yml and NO copied default step/field block; evidence: test with fakeFs (anchored.yml missing) -> written content contains 'yaml-language-server: $schema' and the references/anchored.default.yml pointer, but `grep` finds NO tier-stage blocks (e.g. no 'steps:'); wroteYml===true (green test, file:line)."
        status: done
        evidence:
          - core/src/config/init.ts:MINIMAL_YML (schema directive + pointer plugin/references/anchored.default.yml, NO copied tier blocks); init.spec.ts a1 green — content contains $schema + pointer, no 'steps:', wroteYml===true
      - id: a2
        text: "ensure() is idempotent: an existing anchored.yml is NOT overwritten; evidence: test with fakeFs reporting an existing anchored.yml with marker content -> no write call on anchored.yml (write spy for this path 0x), wroteYml===false (green test, file:line)."
        status: done
        evidence:
          - core/src/config/init.ts:ensure() exists() guard on anchored.yml; init.spec.ts a2 green — existing yml NOT overwritten (writes without YML path), wroteYml===false
      - id: a3
        text: "ensure() adds `Bash(anchored *)` in .claude/settings.local.json -> permissions.allow WITHOUT losing existing entries, and idempotent (no duplicate on a repeat run); evidence: test with fakeFs (settings.local.json with one pre-existing allow entry) -> resulting JSON is valid, contains the prior entry AND exactly one 'Bash(anchored *)'; a second ensure() run does NOT add it again (green test, file:line)."
        status: done
        evidence:
          - core/src/config/init.ts:ensureAllowlist merges permissions.allow idempotently; init.spec.ts a3 green — Bash(git status) preserved + exactly one Bash(anchored *); second ensure() does NOT add it again (wroteAllowlist===false)
      - id: a4
        text: "If settings.local.json is entirely missing, ensure() creates it with valid { permissions: { allow: ['Bash(anchored *)'] } } JSON (atomic-write via the io seam, no direct fs import in the logic); evidence: test with fakeFs (file missing) -> JSON.parse(written content) has the allow entry, and `grep -n \"from 'node:fs'\" core/src/<init>.ts` shows no direct fs call in the core logic (only via deps) (green test, file:line)."
        status: done
        evidence:
          - core/src/config/init.ts:ensureAllowlist creates { permissions:{ allow:[Bash(anchored *)] } } (atomic-write via io seam); init.spec.ts a4 green — JSON.parse valid + init.ts without "from 'node:fs'"
  - name: e2e-dogfood-smoke — trivial task plan->refine->build through the real substrate
    slug: e2e-smoke
    status: done
    context: |
      The capstone proof: a TRIVIAL task is run end-to-end through the REAL
      object graph (createAnchored from Phase 1: real ops/parser/state/io/config)
      — plan -> (refine) -> build -> status terminal. Only the AI seam
      `spawn` is faked (fakeSpawn, deterministic; NO real claude -p), as
      envisioned in engine-architecture.md "worker steps = AI effects behind spawn,
      replaceable by a fake in test". The test runs against a tmp project
      root (real atomic-writes of the task file), not against fakes of the substrate.

      Verified is the WHOLE path as an integration of the prior tasks e2..e7:
      - Status transitions forward-only: plan -> drafted/refined -> build -> wrap/
        done (task tier-schemas transitions), NO backward jump.
      - The HARD INVARIANT takes effect end-to-end: a build step (via
        fakeSpawn) sets a phase-ac to done WITH evidence -> succeeds + persists;
        a run that attempts done WITHOUT evidence fails at the writing op
        (invariant in the substrate, not duplicated in the test).
      - build loops the phases (each: phase) interleaved and writes evidence into the
        task file; a read roundtrip reads the persisted end state back.

      DESIGN: file-structure.md (single task file) · fractal-lifecycle.md (stages +
      each: phase) · CLAUDE.md (CORE: e2/e3/e4/e5/e7 verified together).
    rules:
      - path: .claude/rules/fractal-substrate-integrity.md
        why: e2e against the REAL substrate proves the invariant (no ac->done without evidence) at the writing op; engine deterministic, AI only via faked spawn
      - path: .claude/rules/factory-functions.md
        why: only spawn is faked (injected seam); ops/parser/state/io/engine are the real factories from createAnchored
      - path: .claude/rules/cli-only-transport.md
        why: the path runs through the wired engine/CLI as in main-session/headless; one transport model
    acceptance_criteria:
      - id: a1
        text: "e2e-smoke runs a trivial task through plan->refine->build against a tmp project root with real substrate (only fakeSpawn) and ends with task status terminal (build->wrap or done); evidence: test e2e.dogfood.spec -> after the run a read roundtrip reads the task file back from tmp, Task.status is 'wrap' or 'done' and all phases are terminal (green bun-test output, file:line)."
        status: done
        evidence:
          - "core/src/e2e.dogfood.spec.ts:90 — trivial 2-phase task against tmp-root with REAL substrate (createAnchored, only fakeSpawn): plan→drafted→refined→build→engine→wrap; read roundtrip: status===wrap, all phases done. Green"
      - id: a2
        text: "Status transitions are forward-only: an attempt at a backward jump (e.g. build->plan) throws at the substrate (task tier-schemas transitions); evidence: a case in the e2e spec that triggers an illegal transition -> assertThrows with the transition error, plus a positive case with a valid forward sequence (both green, file:line)."
        status: done
        evidence:
          - "core/src/e2e.dogfood.spec.ts:143 — forward-only: plan→drafted→refined→build OK; build→plan throws InvalidTransition at the substrate (assertTransition). Green"
      - id: a3
        text: "HARD INVARIANT end-to-end: fakeSpawn sets a phase-ac WITH evidence -> persists as status:done; a parallel run aiming for done WITHOUT evidence fails at the writing op (not checked in the test); evidence: two e2e cases in the same spec — (with evidence: read ac.status==='done' + evidence non-empty; without evidence: assertThrows invariant error), both green (file:line)."
        status: done
        evidence:
          - "core/src/e2e.dogfood.spec.ts:156 — invariant e2e: addChildEvidence flips ac done WITH evidence (persists); node-ops.setAcStatus done WITHOUT evidence throws IncompleteEvidence at the writing op. Green"
      - id: a4
        text: "build loops the phases (each: phase) and the faked spawn is triggered exactly as configured per phase/build step (deterministic, no real claude -p); evidence: test asserts fakeSpawn call count == number of phase worker steps and the written task file contains evidence for EVERY phase after the read roundtrip (green test, file:line)."
        status: done
        evidence:
          - "core/src/e2e.dogfood.spec.ts:135 — build loops each:phase, fakeSpawn triggered per phase (set of phase-build slugs === [p1,p2]); read roundtrip: evidence per phase persisted. Green"
  - name: Full quality-gate round core/ green
    slug: quality-gates
    status: done
    context: |
      The closing proof at package level (CLAUDE.md "quality gates per package
      green"; tooling-quality-gates rule). After the wiring + e2e, the entire
      core/ package must pass all five gates cleanly — that is evidence-honesty
      at package level and closes out e1 ("core builds green"). The gates are
      wired as npm scripts (Bun toolchain as dev runner; production code stays
      node-compatible, no Bun.* APIs).

      Five gates, all green before done:
        1. lint     — eslint clean
        2. format   — prettier --check clean
        3. typecheck — tsc --noEmit without errors
        4. test     — bun test green (incl. the e2e-smoke from Phase 3)
        5. build    — bun build / compile without errors (target node)

      This verifies the WHOLE stack (e1..e7 + phases 1-3 of this task) as a
      green whole. A red gate blocks done.
    rules:
      - path: .claude/rules/tooling-quality-gates.md
        why: all five gates (lint/format/typecheck/test/build) green before done; as npm scripts; node-compatible, no Bun.* APIs in production code
      - path: .claude/rules/factory-functions.md
        why: the green typecheck/lint covers the consistent factory pattern (createX(cfg,deps)) across the whole package
    acceptance_criteria:
      - id: a1
        text: "lint + format-check are green across the entire core/; evidence: terminal output of `bun run lint` (eslint exit 0, no errors) AND `bun run format` (prettier --check exit 0, 'All matched files use Prettier code style' or similar), both without error lines."
        status: done
        evidence:
          - bun run lint → eslint . exit 0 (no errors); bun run format → "All matched files use Prettier code style!" across the entire core/
      - id: a2
        text: "typecheck is green: `tsc --noEmit` over core/ without a single error; evidence: terminal output of `bun run typecheck` with exit 0 and NO 'error TS' line."
        status: done
        evidence:
          - bun run typecheck → tsc --noEmit exit 0, no error-TS line
      - id: a3
        text: "The full test suite is green, including the e2e-dogfood-smoke from Phase 3; evidence: output of `bun test` with 0 fail / 0 error, and the e2e.dogfood.spec appears by name as passing in the test summary."
        status: done
        evidence:
          - bun test → 153 pass / 2 skip / 0 fail (155 tests, 36 files); e2e.dogfood.spec + index.spec + init.spec + loop-workflow.spec + workflow-smoke.spec passing by name
      - id: a4
        text: "build is green: `bun build` (target node) compiles core/ without errors to the publish artifact; evidence: terminal output of `bun run build` with exit 0 and produced output (file:path of the compile output e.g. dist/index.js + #!/usr/bin/env node shebang in the bin artifact)."
        status: done
        evidence:
          - "bun run build → tsc -p tsconfig.build.json exit 0; artifact dist/bin.js (with #!/usr/bin/env node shebang) + dist/index.js; package.json bin → ./dist/bin.js"
