      - id: a2
        text: "typecheck ist gruen: `tsc --noEmit` ueber core/ ohne einen einzigen Fehler; Beweis: Terminal-Output von `bun run typecheck` mit exit 0 und KEINER 'error TS'-Zeile."
        status: done
