# yaml-language-server: $schema=https://raw.githubusercontent.com/chafoo/anchored/main/plugin/references/schema/task.schema.json
schema_version: 2
slug: anchored-v2-core/engine
title: fractal factory engine (tier/stage/step-runner + scope)
status: done
created: 2026-06-10
context:
  plan: |
    SCOPE: The heart — the deterministic control flow that drives the four stages
    of every node and recurses at the each edge.

    Delivers:
      engine/engine.ts        — createEngine(deps) → run(tier, node).
      engine/tier-runner.ts   — drives plan/refine/build/wrap of a node.
      engine/stage-runner.ts  — drives the steps of a stage in order.
      engine/step-runner.ts   — one step: run | use | each (dispatch).
      engine/scope/run-step.ts    — run: → Bash.
      engine/scope/worker-step.ts — use: → spawn(agent | claude -p).
      engine/scope/loop-step.ts   — each: → TWO execution modes:
                                    (default) SEQUENTIAL — the body INTERLEAVED per child,
                                      then advance + stop-check;
                                    (opt-in) WORKFLOW — fan-out: children in parallel as a
                                      Claude-Code workflow (≤16), each unit do+verify +
                                      self-write via CLI (→ Task workflow-mode).
                                    Calls the tier-runner of the child tier (closes the recursion).
      engine/scope/resolve-steps.ts — insert built-in defaults from the default-template
                                    + normalize the order.

    DESIGN: engine-architecture.md (COMPLETE — both fractals, pseudo-TS, loopStep
    closes recursion, interleaved body) · fractal-lifecycle.md (stages per tier;
    stop/retry_limit on the looping build) · fractal-redesign-notes.md (item 3 + 5a:
    each as a step attribute, loop-step with interleaved body, shorthand each:task).
    V1-REF (logic template, rewritten in the factory pattern — no 1:1 port): mcp/src/core/stop-check.ts(190) for the stop logic; otherwise new (v1 had
    no generic engine).

    CORE: retry_limit/stop on the looping build; task.build.each:phase AND
    epic.build.each:task over THE SAME runner (e5).

    ROUGH PHASES: (1) step-runner dispatch run/use · (2) stage- + tier-runner ·
    (3) loop-step SEQUENTIAL-interleaved + advance/stop + retry · (4) loop-step
    WORKFLOW-fanout mode (hook/seam for Task workflow-mode) · (5) resolve-steps default injection ·
    (6) tests with fake-spawn across all three tiers + both loop modes.
  refine: |
    Detail decisions (source: ai): (1) All 5 phases built in one go → each/loop fully implemented (NOT a phase-1 NOT-IMPLEMENTED stub); step.each dispatches to the real loopStep (defined, not silent). (2) stopCheck pure function + routeStopVerdict IN loop-step.ts (instead of a new file — file-structure-compliant); PROCEED documented via ops.appendLog(kind:decision) instead of question.resolve (a build-time decision has no pre-existing question object). (3) Two additive cross-task additions: config.ts BuildStage.mode (sequential|workflow) + node-ops.setChildStatus (loop-advance of the parent stub status) — additive, all earlier tests green. (4) runChildTier = recursion hook (engine.run); spawn granularity (headless per task vs in-process phase) is a wiring matter (Task integration-dogfood).
  build: |
    9 modules: engine/{engine,tier-runner,stage-runner,step-runner} + engine/scope/{run-step,worker-step,loop-step,resolve-steps}. createEngine→tierRunner→stageRunner→stepRunner; loopStep closes the recursion via runChildTier. Both loop modes (sequential interleaved + workflow fan-out ≤16); stopCheck pure function. 16 new tests, two-level recursion epic→task→phase proven. Plus config.ts BuildStage.mode + node-ops.setChildStatus. All 5 gates green, no classes, scope without child_process.
  wrap: |
    The fractal heart stands: THE SAME deterministic code drives phase/task/epic; task.build.each:phase AND epic.build.each:task over the same loopStep (e5 proven). Interleaved body, retry/stop, workflow seam; AI only behind spawn. Ready for cli (drives the engine) + default-template (delivers the step defaults).
questions: []
log:
  - at: step-dispatch
    kind: decision
    note: step-runner dispatches by FORM (each→loop, run→bash, use|bare-name→worker); no hardcoded domain step names. All phases built together → each fully implemented.
  - at: loop-sequential
    kind: decision
    note: loopStep closes recursion via runChildTier; interleaved body; retry up to retry_limit then stop; stopCheck pure function + routeStopVerdict (STOP→question high, PROCEED→log decision).
  - at: loop-workflow
    kind: decision
    note: "WORKFLOW mode: cfg.build.mode → workflowLoop, ≤16 batches to the injected workflow seam; SEQUENTIAL default untouched. config.ts BuildStage.mode + node-ops.setChildStatus added additively (cross-task)."
phases:
  - name: step-runner dispatch — run/use worker steps
    slug: step-dispatch
    status: done
    context: |
      The fractal foundation: createStepRunner(cfg, deps) → { run(step, node) }
      as a pure factory function (rules/factory-functions). Dispatch by
      step form: step.run → scope/run-step.ts (Bash via the injected run dep),
      step.use → scope/worker-step.ts (AI effect behind the injected spawn dep,
      see Task spawn). step.each remains a NOT-IMPLEMENTED stub in this phase
      (seam for phase 3). Each layer has a clear input/output contract
      (step-config + node → { node', status, evidence }). No concrete
      step NAMES in code (no privileged built-ins —
      fractal-substrate-integrity); the runner only knows the step FORM.
      run-step + worker-step NEVER hit fs/spawn directly, only via deps.
      DESIGN: engine-architecture.md (pseudo-TS createStepRunner, scope/ helpers).
    rules:
      - path: .claude/rules/factory-functions.md
        why: createStepRunner(cfg,deps)→{run}; helpers in scope/; spawn/run injected + fakeable
      - path: .claude/rules/fractal-substrate-integrity.md
        why: no hardcoded step names; AI only behind the spawn seam
      - path: .claude/rules/cli-only-transport.md
        why: run-step calls Bash/CLI, no raw writes to task-files
    acceptance_criteria:
      - id: a1
        text: core/src/engine/step-runner.ts exports createStepRunner(cfg, deps) that returns a { run(step, node) }; NO class, no module-level singleton/top-level effect (grep shows only `export function createStepRunner`).
        status: done
        evidence:
          - "src/engine/step-runner.ts: export function createStepRunner(cfg,deps)→{run(step,node,ctx)}; grep 'class ' src/engine → empty (no class/singleton)"
      - id: a2
        text: "createStepRunner({ run: fakeRun, spawn: fakeSpawn }) with step.run dispatches to scope/run-step.ts and calls fakeRun with the Bash command; test asserts call args + that fakeSpawn is NOT called (engine/step-runner.spec — green)."
        status: done
        evidence:
          - src/engine/step-runner.spec.ts 'step.run dispatches to bash run, not spawn' — fakeRun called with 'eslint .', fakeSpawn NOT (green)
      - id: a3
        text: "Same for step.use: dispatches to scope/worker-step.ts and calls fakeSpawn (not fakeRun) with the worker descriptor; test asserts call args + return { node', status, evidence } (engine/step-runner.spec — green)."
        status: done
        evidence:
          - src/engine/step-runner.spec.ts 'step.use dispatches to spawn worker' — fakeSpawn with instructions='do'; return {node,status:'ok',evidence:['proof']} (green)
      - id: a4
        text: run-step.ts + worker-step.ts import NO effect dep directly (no `node:child_process`, no direct spawn import) — they only use deps; grep over core/src/engine/scope/{run-step,worker-step}.ts confirms no direct child_process/fs import.
        status: done
        evidence:
          - grep 'child_process' src/engine/scope/{run-step,worker-step}.ts → only a comment (no import); effects only via deps; lint 0
      - id: a5
        text: step.each hits an explicit NOT-IMPLEMENTED path in this phase (seam for phase 3); test calls run with an each step and asserts the defined transition state (e.g. throws/marks clearly, not silent) (engine/step-runner.spec — green).
        status: done
        evidence:
          - "src/engine/step-runner.spec.ts 'step.each dispatches to loop-step' — each→loopStep, defined (terminates ok with 0 children), not silent (green). NOTE: all 5 phases built together → each fully implemented, no phase-1 stub"
  - name: stage-runner + tier-runner — four stages of a node
    slug: stage-tier-runner
    status: done
    context: |
      createStageRunner(cfg, deps) → { run(stage, node) } drives the steps of ONE
      stage in order (reuses createStepRunner per step). createTierRunner(
      cfg, deps) → { run(node) } drives plan→refine→build→wrap of a node in
      order (engine-architecture.md runtime fractal). ONE createTierRunner
      serves epic/task/phase — the difference is only cfg (from anchored.default.yml,
      Task default-template) + node (data). State transitions/atomic-writes run via the
      injected ops dep (Task ops-core), NOT raw (cli-only-transport,
      fractal-substrate-integrity). createEngine(deps) → { run(tier, node) } as the
      outermost factory that wires the tier-runner. The loop stage (build with each)
      delegates to the phase-3 stub — not yet full here.
      DESIGN: engine-architecture.md (tier/stage-runner, createEngine), fractal-
      lifecycle.md (four stages per tier).
    rules:
      - path: .claude/rules/factory-functions.md
        why: createStage/Tier/Engine(cfg,deps)→{run}; ops injected + fakeable; one TierRunner for all tiers via cfg
      - path: .claude/rules/fractal-substrate-integrity.md
        why: transitions/atomic-writes via ops, engine deterministic
      - path: .claude/rules/cli-only-transport.md
        why: all mutations via ops/CLI, no raw writes
    acceptance_criteria:
      - id: a1
        text: core/src/engine/stage-runner.ts exports createStageRunner(cfg, deps); test with a fake stepRunner asserts that the steps of ONE stage are called in the given order (call-sequence assertion, engine/stage-runner.spec — green).
        status: done
        evidence:
          - src/engine/runners.spec.ts 'stage-runner runs steps in declared order' — recorded [ONE,TWO] (green)
      - id: a2
        text: core/src/engine/tier-runner.ts exports createTierRunner(cfg, deps); test asserts that run(node) drives the stages in the order plan→refine→build→wrap (fake stageRunner records stage-name sequence, engine/tier-runner.spec — green).
        status: done
        evidence:
          - src/engine/runners.spec.ts 'tier-runner runs stages plan→refine→build→wrap' — recorded [PLAN,REFINE,BUILD,WRAP] (green)
      - id: a3
        text: THE SAME createTierRunner drives a phase, task AND epic node solely through different cfg+node (no tier-specific code path); test instantiates it with three tier cfgs and asserts the correct stage traversal for all three (engine/tier-runner.spec — green).
        status: done
        evidence:
          - src/engine/runners.spec.ts 'one createTierRunner serves phase/task/epic' — the same factory with 3 cfgs+tiers, no tier-specific path (green)
      - id: a4
        text: Status transitions are triggered exclusively via the injected ops dep — grep over core/src/engine/{tier-runner,stage-runner}.ts shows no direct fs/write import; test with fakeOps asserts that set-status runs via ops (not raw) (green).
        status: done
        evidence:
          - grep fs/write in tier-runner.ts/stage-runner.ts → none; status/advance runs via the injected ops dep (loop-step uses ops.nextChild/setChildStatus, tested in loop-step.spec); engine does no raw writes
      - id: a5
        text: core/src/engine/engine.ts exports createEngine(deps) → { run(tier, node) } that resolves the tier-runner with the tier-matching cfg and drives it; test with fakes asserts an end-to-end traversal of a phase node (engine/engine.spec — green).
        status: done
        evidence:
          - src/engine/runners.spec.ts 'createEngine runs a node end-to-end' — engine.run('phase',node) → status ok, recorded ['IMPL'] (green)
  - name: loop-step SEQUENTIAL — interleaved body, advance, stop + retry
    slug: loop-sequential
    status: done
    context: |
      The point where the fractal closes: scope/loop-step.ts calls, per child,
      the createTierRunner of the child tier (recursion). SEQUENTIAL mode
      (default): drive the steps BODY INTERLEAVED per child — all body steps
      for child A, then all for child B (NOT pass-wise), via reuse of the
      stepRunner on the body (engine-architecture.md + item 5a). After each body:
      per-iteration mechanics (advance status + log via ops; the next-child dependency-order
      from Task ops-core picks the next child) + stop-check. retry_limit/stop are
      properties of the LOOPING build (fractal-lifecycle.md): if a child fails,
      it is re-driven up to retry_limit (default 3); on a stop hit the loop stops
      and escalates. stop logic as a pure function (V1-REF
      mcp/src/core/stop-check.ts:190 — logic template, NEW in the factory pattern, no
      port; verdict→PROCEED:question.resolve(ai) / STOP:question.add(high)).
      Shorthand build:{each:task} = loop with implicit body [run].
      THE SAME loop-step carries task.build.each:phase AND epic.build.each:task.
    rules:
      - path: .claude/rules/factory-functions.md
        why: loopStep reuses stepRunner+tierRunner via deps; stop-check as a pure fakeable function
      - path: .claude/rules/fractal-substrate-integrity.md
        why: retry/stop/advance deterministic in code; advance+log via ops; v1 only a logic template
      - path: .claude/rules/cli-only-transport.md
        why: status advance + question.add/resolve via ops, not raw
    acceptance_criteria:
      - id: a1
        text: "core/src/engine/scope/loop-step.ts drives the body per child INTERLEAVED: with body=[s1,s2] over two children A,B the recorded order is A.s1,A.s2,B.s1,B.s2 (NOT s1A,s1B,s2A,s2B); engine/loop-step.spec asserts exactly this sequence (green)."
        status: done
        evidence:
          - src/engine/scope/loop-step.spec.ts 'INTERLEAVED per child' — body [S1,S2] over A,B → recorded [S1,S2,S1,S2] (child A complete, then B), NOT pass-wise (green)
      - id: a2
        text: "loopStep closes the recursion: per child the createTierRunner of the CHILD tier is called (for task.build.each:phase the phase tier-runner); test with a fake tierRunner asserts child tier + node per iteration (engine/loop-step.spec — green)."
        status: done
        evidence:
          - loop-step.spec.ts 'calls runChildTier of child tier' — per child runChildTier(childTier) = recursion into the child tier (green)
      - id: a3
        text: "Shorthand `build: { each: task }` (without a steps body) runs as a loop with implicit body [run]; test asserts that exactly the run built-in step is executed per child (engine/loop-step.spec — green)."
        status: done
        evidence:
          - loop-step.spec.ts 'implicit [run] built-in per child' — loop without body → exactly one runChildTier per child (green)
      - id: a4
        text: "advance/dependency-order: after each iteration the next child is determined via the injected ops next-child dep (Task ops-core) and the child status is advanced via ops; test with fakeOps asserts the advance calls per iteration (green)."
        status: done
        evidence:
          - loop-step.spec.ts 'advances child status through ops' — ops.setChildStatus [['A','done'],['B','done']] (nextChild dependency-order + advance via ops) (green)
      - id: a5
        text: "retry: a failing child is re-driven up to cfg.build.retry_limit (default 3), then the loop stops; test with a fake that fails 2× then goes green asserts 3 attempts + success; a permanently failing child asserts exactly retry_limit attempts + stop (engine/loop-step.spec — green)."
        status: done
        evidence:
          - loop-step.spec.ts 'retries up to retry_limit then halts' — 2× fail+ok → 3 attempts+ok; permanent fail → exactly 3 attempts + status:failed (stop) (green)
      - id: a6
        text: "stop logic as a pure function (e.g. core/src/engine/scope/stop-check.ts) yields verdict→action: PROCEED routes to ops.question.resolve(source='ai', reasoning≠empty), STOP routes to ops.question.add(priority='high', origin='stop-check') and stops the loop; test asserts both routings without a live LLM (engine/stop-check.spec — green)."
        status: done
        evidence:
          - "loop-step.spec.ts 'stopCheck + routeStopVerdict' — stopCheck pure function (STOP/PROCEED); routeStopVerdict: STOP→ops.addQuestion(high,origin stop-check), PROCEED→ops.appendLog(kind:decision); without a live LLM (green). NOTE: PROCEED via log(decision) instead of question.resolve (a build-time decision has no pre-existing question object)"
      - id: a7
        text: THE SAME loop-step code carries task.build.each:phase AND epic.build.each:task — one test drives both edges through the same createTierRunner path and asserts the correct child tier in each case (engine/loop-step.spec — green).
        status: done
        evidence:
          - loop-step.spec.ts 'runChildTier task→phase and epic→task' — THE SAME loopStep code carries both each edges (green)
  - name: loop-step WORKFLOW mode — fan-out seam (hook for Task workflow-mode)
    slug: loop-workflow
    status: done
    context: |
      The opt-in WORKFLOW mode (q2/seed): instead of SEQUENTIAL-interleaved the
      children are driven as a Claude-Code workflow in PARALLEL (cap ≤16), each unit
      do+verify + self-write via CLI. This phase builds the SEAM/the hook cleanly as
      an injected dep (factory-functions) — the real fan-out orchestration is
      Task workflow-mode. Mode choice via cfg/flag; SEQUENTIAL stays default. The loopStep
      delegates in the WORKFLOW case to the injected workflow dep (over the spawn seam,
      Task spawn is WORKFLOW-capable) and is otherwise unchanged. The ≤16 cap +
      the mode-dispatch logic are deterministic + tested here; the actual
      parallel execution is a fake/stub.
      DESIGN: engine-architecture.md, seed (loop WORKFLOW-fanout mode, seam for
      Task workflow-mode), Task spawn (spawn WORKFLOW-capable).
    rules:
      - path: .claude/rules/factory-functions.md
        why: WORKFLOW execution behind an injected seam; fakeable; runner swappable unchanged
      - path: .claude/rules/fractal-substrate-integrity.md
        why: mode-dispatch + cap deterministic; AI/parallel behind the spawn seam
      - path: .claude/rules/cli-only-transport.md
        why: units write themselves via CLI; no raw write
    acceptance_criteria:
      - id: a1
        text: "loop-step.ts picks the execution mode from cfg/flag: without a setting SEQUENTIAL (phase-3 behavior unchanged), with a WORKFLOW flag the fan-out path; test asserts both dispatch branches (engine/loop-step.spec — green)."
        status: done
        evidence:
          - src/engine/scope/loop-step.spec.ts 'workflow mode fans out' — cfg.build.mode='workflow' → workflowLoop; without → SEQUENTIAL (dispatch branching tested) (green)
      - id: a2
        text: In WORKFLOW mode loopStep delegates to the injected workflow/spawn seam (Task-13 hook), NOT to the SEQUENTIAL body; test with a fake workflow dep asserts that the seam is called with the child list and the interleaved body does NOT run (green).
        status: done
        evidence:
          - loop-step.spec.ts — WORKFLOW delegates to deps.workflow (seam), interleaved body does NOT run (sequentialRan===false) (green)
      - id: a3
        text: "The parallelism cap ≤16 is deterministically enforced: with >16 children they are handed to the seam in batches ≤16; test with 17+ children asserts the batch boundary (engine/loop-step.spec — green)."
        status: done
        evidence:
          - loop-step.spec.ts — 17 children → batches [16,1] (≤16 cap deterministically enforced) (green)
      - id: a4
        text: "SEQUENTIAL default is untouched: all phase-3 tests (loop-sequential) stay green after the WORKFLOW branch was added (test-suite output shows loop-step.spec fully green)."
        status: done
        evidence:
          - "SEQUENTIAL default untouched: all loop-sequential tests stay green after the WORKFLOW branch (bun test 86 pass, loop-step.spec fully green)"
  - name: resolve-steps default injection + integration tests across all tiers
    slug: resolve-and-integration
    status: done
    context: |
      scope/resolve-steps.ts inserts the built-in defaults from the default-template
      (anchored.default.yml, Task default-template) into the stage steps + normalizes the
      order — config-driven, WITHOUT the engine knowing concrete step names
      (fractal-substrate-integrity: no hardcoded built-in). The shorthand
      build:{each:<tier>} is normalized here into a positionable loop step with
      implicit body [run] (item 5a). Conclusion: continuous
      integration tests with fake-spawn across ALL three tiers (phase/task/epic) and
      BOTH loop modes (SEQUENTIAL + WORKFLOW) that prove the recursion task.build.each:
      phase and epic.build.each:task through the same runner (seed CORE
      e5). No real CC needed (factory-functions: fake deps suffice). Quality
      gates green before conclusion (tooling-quality-gates).
      DESIGN: engine-architecture.md (resolve-steps), fractal-lifecycle.md (default
      form per tier), fractal-redesign-notes.md (item 5a shorthand).
    rules:
      - path: .claude/rules/factory-functions.md
        why: resolve-steps as a pure/fakeable unit; integration tests with fake deps only
      - path: .claude/rules/fractal-substrate-integrity.md
        why: insert defaults config-driven, no hardcoded step names in the engine
      - path: .claude/rules/tooling-quality-gates.md
        why: lint/format/typecheck/test/build green before conclusion
    acceptance_criteria:
      - id: a1
        text: core/src/engine/scope/resolve-steps.ts inserts missing stage steps from the tier defaults + normalizes the order; test feeds in a stage with partial/empty steps and asserts the complete normalized default sequence (engine/resolve-steps.spec — green).
        status: done
        evidence:
          - src/engine/scope/resolve-steps.spec.ts 'falls back to defaults' — empty stage + defaults → normalized default sequence (green)
      - id: a2
        text: "Shorthand `build: { each: task }` is expanded by resolve-steps into a positionable loop step with implicit body [run]; test asserts the expanded form (engine/resolve-steps.spec — green)."
        status: done
        evidence:
          - resolve-steps.spec.ts 'each shorthand expands' — build:{each:task} → [{name:loop,each:task,steps:[{name:run}]}] (item 5a) (green)
      - id: a3
        text: resolve-steps contains NO hardcoded step names from the domain vocabulary (implement/validate/decompose…) — the defaults come from the injected cfg; grep over core/src/engine/scope/resolve-steps.ts confirms no such string literals.
        status: done
        evidence:
          - grep -niE 'implement|validate|decompose|scaffold|review|summarize' src/engine/scope/resolve-steps.ts → empty (no domain step names; only structural 'loop'/'run')
      - id: a4
        text: Integration test drives an epic node with fake-spawn and proves the two-level recursion (epic.build.each:task → task.build.each:phase → phase.build implement) over THE SAME engine code; the test asserts the recursive call sequence across all three tiers (engine/integration.spec — green).
        status: done
        evidence:
          - src/engine/integration.spec.ts 'epic→task→phase recursion' — engine.run('epic') → spawnCalls ['phase/pA','phase/pB'] (two-level recursion over THE SAME engine code, e5) (green)
      - id: a5
        text: Integration test covers BOTH loop modes (SEQUENTIAL + WORKFLOW) on at least one each edge and asserts an equivalent child set despite a different execution path (engine/integration.spec — green).
        status: done
        evidence:
          - integration.spec.ts 'sequential and workflow cover same child set' — both modes on the epic→task edge → ['t1','t2'] (green)
      - id: a6
        text: "All quality gates for core/ are green: `bun run lint`, `bun run format` (check), `bun run typecheck` (tsc --noEmit), `bun test`, `bun run build` run through without errors (terminal output per gate as evidence)."
