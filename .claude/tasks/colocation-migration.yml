title: Colocation + file-naming migration (core/src)
context:
  intro: "Apply the new `.claude/rules/colocation-and-naming.md` convention across `core/src`: every
    module that has companion files moves into its own folder (subject + spec colocated, spec
    directly beside subject), folder-main files are renamed to match the folder (no bare `index.ts`
    except the package-root entry), and no barrel files are introduced. Grounded in the full
    migration table in `.claude/temp/repo-analysis.md` section 3. Pure structural refactor — no
    behavior change; `bun test` + lint/format/typecheck stay green as the per-phase checkpoint. The
    main cost is import-path churn, so the work is phased bottom-up (leaf modules first, central
    modules next, cli last) to keep each step small and reversible."
  plan: >-
    - Source of truth: `.claude/temp/repo-analysis.md` section 3 (full migration table) +
    `.claude/rules/colocation-and-naming.md`.

    - Bottom-up order to minimize import-path churn per step: root modules → leaf folders → central
    modules → cli + naming → e2e bundle + docs.

    - Invariant per phase: `bun test` + eslint + `prettier --check` + `tsc --noEmit` all green
    before the phase commit. Pure refactor — zero behavior change.

    - Package-root `core/src/index.ts` stays `index.ts` (the npm-entry exception). No barrels exist
    today (verified) — keep it that way.

    - Every module move also updates its `.js` import specifiers across the tree.

    --- refine (2026-06-13) ---

    plan-check (verified against the real core/src tree): every path the plan names resolves — zero
    stale/moved paths. Notes: (1) phase-1's io/spawn importer list is non-exhaustive — real set is
    ≥8 files (adds e2e.dogfood, lifecycle-e2e, both epic-tier specs, two cli e2e specs); treat the
    AC as "grep-retarget ALL importers, gates green", not the enumerated subset. (2) cli/index.ts →
    cli/cli.ts has only 2 production importers (index.ts:10, ops/facade.ts:5), not ~10 — the rest of
    the §3.2 estimate was the fakeFacade re-export surface; phase 4 is lighter than implied. (3)
    bin.ts is a second package-entry file (package.json bin → dist/bin.js) — it stays flat (no
    spec), so no move, but the "no bare index.ts except the package-root entry" framing has bin.ts
    as a sibling entry.

    rules-check: tooling-quality-gates.md attached to all 5 phases (each has a "Gates green" AC but
    the rule wasn't linked). factory-functions.md deemed already covered by colocation-and-naming.md
    (which extends it) — not separately attached for a pure move/rename.
