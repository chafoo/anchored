    slug: root-modules
    status: pending
    context: The two flat root-level effect modules each get their own folder per the rule's own example
      (io/io.ts). Smallest blast radius but high fan-in, so do it first to settle the
      most-referenced import paths early.
    rules:
      - path: .claude/rules/colocation-and-naming.md
        why: defines the folder + folder-name convention this whole task applies
      - path: .claude/rules/tooling-quality-gates.md
        why: phase requires bun test + eslint + prettier --check + tsc --noEmit all green before the move
          lands; this rule is the authoritative green-gate checklist for core/
    acceptance_criteria:
      - text: "`core/src/io.ts` + `io.spec.ts` moved to `core/src/io/io.ts` + `core/src/io/io.spec.ts`;
          every importer retargeted to `./io/io.js` (bin.ts, index.ts, parser/roundtrip.spec.ts, cli
          e2e specs)."
        status: pending
      - text: "`core/src/spawn.ts` + `spawn.spec.ts` moved to `core/src/spawn/spawn.ts` +
          `core/src/spawn/spawn.spec.ts`; importers retargeted (index.ts + the spec's own relative
          import)."
        status: pending
      - text: "Gates green after the moves: `bun test`, eslint, `prettier --check`, `tsc --noEmit` all pass;
          zero behavior change (pure move + import retarget)."
        status: pending
  - name: Colocate leaf subject+spec pairs
    slug: leaf-folders
    status: pending
    context: Every leaf module with a companion spec moves into its own folder, and mis-placed specs are
      pulled to their subject's folder. These have localized churn (mostly intra-package), so they
      go before the high-fan-in central modules.
    rules:
      - path: .claude/rules/colocation-and-naming.md
        why: the colocation + folder-name mandate applied per leaf module
      - path: .claude/rules/tooling-quality-gates.md
        why: phase demands gates green after each module group + a clean full bun test/eslint/prettier/tsc
          at phase end
    acceptance_criteria:
      - text: "parser/: `parse.ts`+spec to `parser/parse/`, `render.ts`+spec to `parser/render/`;
          `roundtrip.spec.ts` stays at `parser/` (cross-cutting, no single subject). Imports
