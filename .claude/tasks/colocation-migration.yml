        status: pending
      - text: Gates green after each module group; full `bun test` + eslint + prettier + tsc clean at phase
          end; zero behavior change.
        status: pending
  - name: Colocate high-fan-in central modules
    slug: central-modules
    status: pending
    context: The widely-imported central modules and their cross-named specs. Done after the leaves so
