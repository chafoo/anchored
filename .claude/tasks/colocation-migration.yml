questions:
  - id: q1
    text: Should the cross-cutting suites that have no single subject (e2e.dogfood, lifecycle-e2e,
      extensibility-matrix, skeleton, and the root epic-tier spec) be bundled under a new
      `core/src/e2e/` directory, or left flat at the `core/src/` root? The analysis recommends
      bundling for clarity; the rule does not require it (it only mandates colocation for a
      subject's own companion spec).
    priority: medium
    origin: plan-agent
    phase: e2e-bundle-and-docs
    status: resolved
    answer: Yes — bundle the cross-cutting suites (e2e.dogfood, lifecycle-e2e, extensibility-matrix,
      skeleton, root epic-tier) under a new core/src/e2e/ directory. index.spec.ts stays beside
      index.ts.
    source: ai
    reasoning: These suites have no single subject so the colocation mandate doesn't apply; a dedicated
      e2e/ dir reduces src-root clutter and signals their cross-cutting nature, matching the rule's
      "clearer-layout" goal (analysis §3.4b recommended it).
    created_at: 2026-06-13T10:01:02.311Z
    resolved_at: 2026-06-13T10:38:25.114Z
  - id: q2
    text: "`epic-tier.spec.ts` exists twice with different content — at `core/src/` (cross-cutting
      parser/render/io/schema/engine) and at `core/src/cli/` (buildCli/makeTierFor). Default plan:
      rename the root one to `epic-tier.e2e.spec.ts` and keep the cli one as-is. Confirm the
      disambiguation naming, or propose another."
    priority: medium
    origin: plan-agent
    phase: cli-and-naming
    status: resolved
    answer: Rename the root core/src/epic-tier.spec.ts to epic-tier.e2e.spec.ts and move it into the new
      core/src/e2e/ bundle; keep core/src/cli/epic-tier.spec.ts as the cli subject spec (unchanged).
    source: ai
    reasoning: The root variant is cross-cutting (parser/render/io/schema/engine); the .e2e suffix
      disambiguates it from the cli one and aligns with the e2e/ bundle decision in q1. The cli
      variant is a genuine subject spec for buildCli/makeTierFor, so it stays.
    created_at: 2026-06-13T10:01:08.977Z
    resolved_at: 2026-06-13T10:38:40.587Z
  - id: q3
    text: "`ops/scope/log.ts` has no own spec (it is exercised via `questions-log.spec.ts`). Give it its
      own folder `ops/scope/log/log.ts`, or leave it flat at `ops/scope/log.ts` and only fold
      `questions-log.spec.ts` into the `questions/` folder? Default: leave log.ts flat (no companion
      of its own)."
    priority: low
    origin: plan-agent
    phase: leaf-folders
    status: resolved
    answer: Leave ops/scope/log.ts flat (no own folder); fold questions-log.spec.ts into
      ops/scope/questions/ alongside questions.ts.
    source: ai
    reasoning: log.ts has no companion spec of its own, and the rule says a single file without
      companions stays flat. questions-log.spec.ts exercises questions+log together, so it colocates
      with its primary subject (questions).
    created_at: 2026-06-13T10:01:17.188Z
    resolved_at: 2026-06-13T10:38:53.092Z
  - id: q4
    text: "`cli/index.spec.ts` exports the `fakeFacade` test helper, imported by 3 command specs (node,
      stage, classify). When it becomes `cli/cli.spec.ts`, do we just retarget those imports to
      `./cli.spec.js`, or extract `fakeFacade` into a dedicated shared fixture (e.g.
      `cli/scope/fake-facade.ts`)? A test helper living in a `.spec` file is a separate smell;
      extracting is cleaner but slightly beyond this rule's scope."
    priority: medium
    origin: plan-agent
    phase: cli-and-naming
    status: resolved
    answer: For this task, just retarget the 3 importers (node, stage, classify specs) to the new
      ./cli.spec.js path — behavior-preserving. Flag extracting fakeFacade into a shared fixture
      (e.g. cli/scope/fake-facade.ts) as a separate follow-up, out of this rule's scope.
    source: ai
    reasoning: Keeps the rename minimal and zero-behavior-change, which is this task's contract. The
      test-helper-living-in-a-spec smell is real but orthogonal to colocation/naming — surface it,
      don't bundle the fix into a structural move.
    created_at: 2026-06-13T10:01:25.760Z
    resolved_at: 2026-06-13T10:39:05.898Z
