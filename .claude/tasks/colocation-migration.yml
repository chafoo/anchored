        status: pending
      - text: "state/: `invariants.ts`+spec to `state/invariants/`, `transitions.ts`+spec to
          `state/transitions/`. Heavy importers retargeted (step-runner, node-ops,
          schema/tiers/phase.ts all import invariants)."
        status: pending
      - text: "schema/: `config`, `step`, `custom-fields` each (subject+spec) to own folder; `tiers/*` stay
          flat; `tiers.spec.ts` stays at `schema/tiers/` (collective spec)."
        status: pending
      - text: "ops/scope/: `children.ts`+spec to `children/`; `questions.ts` to `questions/` with
          `questions-log.spec.ts` moved beside it; `log.ts` handled per the open question."
        status: pending
      - text: "engine/scope/: `loop-step`, `loop-workflow`, `resolve-steps`, `run-step` each to own folder;
          `resolve-injection.spec.ts` to `resolve-steps/`; `engine/loop-workflow.spec.ts` moved down
          to `engine/scope/loop-workflow/`. NOTE: `worker-dispatch` is deliberately EXCLUDED here —
          its final placement is owned by architecture-cleanup A6 (move out to ops/scope/ + colocate
