title: Test-suite green + substrate coverage hardening (core/src)
context:
  intro: "Bring `core/src`'s test suite back to green and close the coverage gaps from
    `.claude/temp/repo-analysis.md` section 2. The suite is currently RED — 4 doc-drift assertions
    in `engine/workflow-smoke.spec.ts` assert stale (German) doc wording that has since changed. Per
    the tooling-quality-gates rule a red `bun test` blocks every `ac → done`, so making the suite
    green is phase 1 and unblocks all later work. Then add the missing focused specs, prioritized by
    substrate relevance: the non-disableable hard invariant (`state/invariants.ts`) and the
    forward-only transition matrix (`state/transitions.ts`) first (P0), then tier dispatch + config
    validation (P1), the engine runners + slug facade (P2), and the process entry + CLI arg
    edge-cases (P3). Pure test additions + assertion fixes — zero production behavior change."
  plan: >-
    - Source of truth: `.claude/temp/repo-analysis.md` section 2 (coverage table + thin-flags +
    prioritization).

    - Phase order = the analysis priority ladder: green-suite (unblock) → P0 substrate (invariants +
    transitions) → P1 (engine-ops dispatch + validate) → P2 (runners + facade) → P3 (bin entry + cli
    arg edges).

    - Pure test work: assertion fixes + new `*.spec.ts`. No production code changes (if a test
    reveals a real bug, surface it — do not silently patch under cover of "coverage").

    - Gate per phase: `bun test` green + the new specs actually exercise the documented branches
    (cite file:line of the branch each spec covers).

    - Cross-task note: new spec files' final location depends on whether `colocation-migration` runs
    first — see the open question.

    --- refine (2026-06-13) ---

    GROUND TRUTH (ran `cd core && bun test`): 274 pass, 2 skip, 0 fail — the suite is ALREADY GREEN.
    The 4 doc-drift failures the analysis (§2.1) reported were fixed between the analysis and now;
    workflow-smoke.spec.ts already asserts the English wording. So the `green-suite` phase is NOT a
    blocker-fix — it reduces to (a) verify-green and (b) the q1 doc-snapshot decoupling (proactive,
    low-risk now that all is green). The intro's "currently RED" line is historical.

    plan-check (verified vs current code): every path + line-ref accurate — invariants.ts
    isEvidenceFilled :25, unbacked.length :54-55, suggestions :19; transitions.ts unknown-from :48;
    engine-ops.ts tierOfNode :17 + createEngineOps :24 (confirmed NO referencing spec); bin.ts
    genuinely uncovered. Note: invariants.spec.ts:31-32 already covers isEvidenceFilled(null) +
    (undefined), so the p0-substrate AC should target the genuinely-missing case (a non-array,
    non-nullish value). Phases p0→p3 touch disjoint modules (state/ vs ops/ vs engine/ vs bin+cli) —
    parallelizable once green-suite lands. colocation-migration has NOT run (paths still flat) → q2
    sequencing is low-stakes.

    rules-check: colocation-and-naming.md should attach to the four spec-CREATING phases
    (p0-substrate, p1-dispatch-validate, p2-runners-facade, p3-entry-edges) — they author new
    *.spec.ts that must sit beside their subject; fractal-substrate-integrity already on p0;
    factory-functions already on p2 (fakes). (Captured here rather than re-writing each phase's
    rules array, to keep the refine lean — the build worker should treat colocation-and-naming as
    binding on any new spec file.)
