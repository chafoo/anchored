questions:
  - id: q1
    text: "For the 4 red assertions: just realign them to the new doc wording (keeps the doc-snapshot
      tests coupled to the code gate), OR extract all doc-snapshot assertions out of
      `workflow-smoke.spec.ts` into a separate, clearly-labelled doc-snapshot suite so doc churn
      never reds the code gate again? The analysis flags this recurring coupling as the root cause."
    priority: medium
    origin: plan-agent
    phase: green-suite
    status: resolved
    answer: "Decouple: extract the doc/template-snapshot assertions out of workflow-smoke.spec.ts into a
      separate, clearly-labelled doc-snapshot suite, so future doc edits never red the code gate.
      The suite is already green, so this is a low-risk proactive cleanup (the reframed green-suite
      deliverable)."
    source: ai
    reasoning: The analysis flagged the doc-snapshot/code-gate coupling as the recurring root cause of
      these reds; with the suite currently green it is the safe moment to separate them so doc churn
      can never block ac→done again.
    created_at: 2026-06-13T10:06:10.754Z
    resolved_at: 2026-06-13T10:44:04.268Z
  - id: q2
    text: "Cross-task ordering with `colocation-migration`: this task creates several new `*.spec.ts`
      files, whose correct location depends on whether the colocation refactor has already run (e.g.
      `state/invariants/invariants.spec.ts` vs `state/invariants.spec.ts`). Should we sequence
      `colocation-migration` first and create the new specs at the NEW folder paths, or run this
      task first (specs at current paths) and let the colocation task move them? Default: run
      colocation first to avoid double work."
    priority: medium
    origin: plan-agent
    phase: p0-substrate
    status: resolved
    answer: Run colocation-migration FIRST, then create the new specs at the new colocated folder paths
      (state/invariants/invariants.spec.ts etc.). colocation-migration is already refined and its
      leaf/central phases colocate exactly these subjects' specs, so building specs at the old flat
      paths would only create churn for colocation to undo. If for some reason this task runs first,
      create at the current flat paths and let colocation move them.
    source: ai
    reasoning: colocation-migration is refined and ready, and it explicitly colocates the
      invariants/transitions/engine-ops/facade specs these phases touch; sequencing it first avoids
      double work. The dependency is one-directional and low-stakes (plan-check confirmed paths are
      currently flat), so the fallback order still works.
    created_at: 2026-06-13T10:06:20.749Z
    resolved_at: 2026-06-13T10:44:20.151Z
  - id: q3
    text: "Scope of this single task: keep all of P0–P3 (green + invariants + transitions +
      dispatch/validate + runners/facade + entry edges) in one task as drafted, or trim to
      green-suite + P0 only and spin P1–P3 into a separate follow-up? Default per the no-MVP
      preference: keep all phases here; P2/P3 can still be deferred at build time if the task gets
      too large."
    priority: low
    origin: plan-agent
    phase: p2-runners-facade
    status: resolved
    answer: Keep all phases (green-suite + P0–P3) in this one task. green-suite is now light (suite
      already green → verify + doc-snapshot decouple), so the task is smaller than drafted anyway.
      The phases touch disjoint modules and can be deferred or even parallelized at build time if
      needed.
    source: ai
    reasoning: Matches the no-MVP preference, and plan-check confirmed the phases are independent
      (disjoint modules) so keeping them together costs nothing — P2/P3 stay deferrable at build
      time if scope feels large.
    created_at: 2026-06-13T10:06:30.445Z
    resolved_at: 2026-06-13T10:44:32.537Z
