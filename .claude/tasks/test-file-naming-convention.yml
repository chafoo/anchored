title: Unified Test-File Naming Convention (.spec / .e2e / .int)
context:
  intro: "core/src/ currently has 47 test files across five competing naming patterns: 37 genuine unit
    tests as *.spec.ts, plus a mix of *.e2e.spec.ts, hyphenated -e2e.spec.ts, and several files
    living in core/src/e2e/ that are actually integration tests, not end-to-end. The user wants ONE
    convention: *.spec.ts for unit, *.e2e.ts for end-to-end, *.int.ts for integration — with the
    e2e/int suffixes deliberately carrying NO .spec infix. Two hard constraints make this more than
    a rename: (1) there is no bunfig.toml anywhere, and bun's default matcher only discovers
    *.spec.ts / *.test.ts — so renamed *.e2e.ts / *.int.ts files would silently stop running and
    \"pass\" by not executing; (2) tsconfig.build.json excludes only *.spec.ts / *.test.ts, so the
    new suffixes would leak into the production build. The repo governs conventions through
    .claude/rules/, and the existing colocation-and-naming.md rule already mandates \"spec next to
    its subject\" — the new convention must be authored as a governing rule FIRST and reconciled
    with that placement rule, before any file moves. In-repo references in
    docs/design/file-structure.md (which lists the e2e/ files by old name and documents the
    colocation rule) must be brought in line."
  plan: >-
    - Verified: 47 test files in core/src match *.{spec,test,e2e,int}.ts today; no bunfig.toml
    exists in core/ or root; package.json test script is the bare `bun test`.

    - Verified: tsconfig.build.json (core/tsconfig.build.json:3) excludes only `src/**/*.spec.ts`
    and `src/**/*.test.ts` — new suffixes would leak into the build artifact unless added here.

    - Verified: tsconfig.json (core/tsconfig.json:20) has `include: ["src"]` — typecheck already
    covers all files regardless of suffix, so renames stay under typecheck by extension (confirm, no
    change expected).

    - Verified: docs/design/file-structure.md lines 108-122 list the e2e/ folder by OLD filenames
    AND assert the colocation rule — both the file list and the prose need updating.

    - Classification-by-reading is load-bearing: several files physically in e2e/ (lifecycle-e2e,
    extensibility-matrix) are integration (in-memory mocks), while e2e/epic-tier.e2e is true e2e
    (real fs). cli/epic-tier.spec is integration and shares a stem with the true-e2e e2e/epic-tier —
    the rename must not collide.

    - Ordering is intentional per user instruction: rule-authoring FIRST as the basis, then
    migration, then runner-config isolated as its own silent-failure concern, then docs.

    - The runner-config phase carries a pre-vs-post test-FILE-COUNT gate: the same number of test
    files must execute after migration as before — the primary defense against silent drops.

    - plan-check verified discovery against the real tree: exactly 47 *.spec.ts (0 *.test.ts);
    bunfig.toml absent (core/ + root); core/package.json test script is bare `bun test`; BUILD
    script is `tsc -p tsconfig.build.json` (NOT `bun build`) — so phase 2's
    tsconfig.build.json-exclude lever is correct. tsconfig.build.json exclude =
    ["src/**/*.spec.ts","src/**/*.test.ts"]; tsconfig.json include = ["src"]. All 9 migration
    targets exist; stem-collision pair are two genuinely distinct files.

    - plan-check verified file-structure.md line refs: e2e/ list at 108-113, colocation prose at
    30-31 and 119-122, cross-ref anchor at 23-24 — all accurate.

    - plan-check parallelism note: author-naming-rule (.claude/rules/) and
    configure-runner-and-build (core/ config) touch disjoint paths with no data dependency — could
    run in parallel. migrate-and-classify + update-references depend on the rule's classification
    criteria being settled, so must follow phase 1.

    - plan-check flagged the count gate as structurally weak: git mv preserves file count by
    construction, so a raw count-equality gate can NEVER catch a misclassification — reinforces q7
    (name-set / suffix-distribution diff). Also a 37-vs-38 arithmetic gap (47 − 9 = 38;
    skeleton.spec.ts is the off-by-one).

    - rules-check: coverage clean across all 4 phases; no rule additions, no orphans, no conflicts.
    factory-functions deliberately stays out (a pure spec-move + build-config edit does not exercise
    the factory pattern; colocation-and-naming already extends factory-functions for the naming
    half).

    - Refine decisions (consolidated): standalone new rule file (q1) with explicit unit/int/e2e
    criteria (q6); literal .e2e.ts/.int.ts suffixes + bunfig.toml [test] glob as single source of
    truth (q2, q8); DISSOLVE core/src/e2e/ — every test colocates by subject (q3), so the build's
    migrate phase must (a) rename the 9 suffix-changers AND (b) relocate the true cross-cutting e2e
    suites (dogfood, epic-tier.e2e) next to their nearest subject/entry-point, not just rename them
    in place; skeleton stays a unit .spec.ts relocated out of e2e/ (q4, q11). Classification
    confirmed (q5). Migration gate is a name-set / per-suffix-distribution diff (38 .spec.ts + 5
    .e2e.ts + 4 .int.ts), NOT a raw count (q7, q9, q10) — the migrate phase's count-equality AC
    should be read as this stronger set/suffix diff.

    - RE-GROUNDING (2026-06-13, mid-build): a CONCURRENT `remove-headless-engine-path` task
    committed to the same repo while this build ran (3 commits: 7475747/bf07475/fe6f0d6 inserted
    between session-start tip c6307d2 and our phase-1 commit cd077c9). It deleted 8 engine test
    files (47->39 .spec.ts) and restructured the tree. User confirmed that task is finished/inactive
    and directed: re-ground the plan against the current tree, then continue (phase 2 config stays).
    CONSEQUENCES for the migration: (a) 2 original targets are GONE — engine/integration.spec.ts
    (.int) and cli/commands/lifecycle.e2e.spec.ts (.e2e) — no action; (b) a NEW file
    e2e/archive-reset.e2e.spec.ts appeared: it is `.e2e`-named but uses an IN-MEMORY fake-io
    harness, so by the rule's criteria it is INTEGRATION -> reclassified to .int.ts; (c) corrected
    migration set = 4 true e2e (cli/cli.e2e, cli/custom-field-e2e, e2e/epic-tier.e2e,
    e2e/e2e.dogfood) + 4 int (e2e/lifecycle-e2e, e2e/extensibility-matrix, cli/epic-tier,
    e2e/archive-reset.e2e) + skeleton relocated as .spec; (d) corrected baseline 31 .spec.ts + 4
    .e2e.ts + 4 .int.ts = 39 (supersedes the stale q9/q10 38/5/4=47). Full authoritative mapping in
    .claude/tasks/test-file-naming-convention.baseline.md.
