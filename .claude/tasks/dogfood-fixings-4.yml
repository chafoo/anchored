slug: dogfood-fixings-4
title: Dogfood-Fixings 4 — Jargon-Scrub, Frage-Disziplin, Fan-out-Default, VCS-Provenance
status: wrap
created: 2026-06-12
goal: "Vier Tickets aus der 3-Agent-Analyse des v0.1.13-Dogfood-Laufs. App + Prozess liefen sauber — das hier ist Politur + eine Core-Härtung. Drei reine Plugin-Prosa-Tickets, eins Core-Code. Owner-Reihenfolge (impact-first): erst die drei Prosa-Härtungen (Jargon-Mapping + SKILLs säubern, Frage-Generosität aus v1 zurückholen, Fan-out auf den schnellsten sicheren Weg drehen), dann das schwere Core-Ticket in zwei Tasks (commit_sha-Semantik + archive/reset-Verben, danach Provenance-Mechanismus + Task-File-Commit-Policy). Höchste Einzel-Prio: Jargon-Scrub (Owner-Hauptbefund: 'niemand spricht die Framework-Sprache')."
