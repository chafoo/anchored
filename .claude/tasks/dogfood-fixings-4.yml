  - id: e1
    text: Kein Framework-Prozess-Jargon mehr in Chat-naher Prosa oder den 'Prefer (partner voice)'-Spalten der vier SKILLs; eine universelle Hard-Rule + die Mapping-Tabelle stehen zentral in communication-style.md; question-style verlinkt sie; Grep-Test grün (jargon-scrub).
    status: done
    evidence:
      - "Geliefert in 683839c: communication-style.md Hard-Rule + 15-Zeilen-Mapping-Tabelle; vier SKILLs gescrubbt; question-style verlinkt; guard-prose.sh gruen."
  - id: e2
    text: "Die Frage-Generosität ist zurück: plugin/references/question-discipline.md existiert (v1-Direktiven generalisiert) und alle fünf Frage-autorenden Agenten verlinken sie mit ihrer tier-spezifischen Linse; ein Trockenlauf surfaced wieder Fragen statt '0' (question-discipline)."
    status: done
    evidence:
      - "Geliefert in ec2668d: question-discipline.md (v1-Generositaet generalisiert) + alle fuenf Frage-Agenten verlinkt mit tier-Linse; guard gruen."
  - id: e3
    text: Der per-Phase-executor-Default ist auf 'schnellster sicherer Weg' gedreht (parallel/workflow sobald der Sicherheits-Floor unabhängiger ACs hält); die ephemere Tempo-vs-Zuschauen-Präferenz wird einmal im Refine gefragt und ist nie eine Qualitätsentscheidung; git-Worktree-Isolation ist Vorgabe (nicht Caveat); Grep-Test grün (fanout-fastest-safe).
    status: done
    evidence:
      - "Geliefert in 75b61bf: executor-Default auf 'schnellster sicherer Weg' (Korrektheits-Floor), ephemere Tempo-vs-Zuschauen-Praeferenz, Worktree als Vorgabe; guard gruen."
  - id: e4
    text: commit_sha (oder sein Nachfolger) zeigt nach dem task-Wrap auf einen ÜBERLEBENDEN Commit; die VCS-Provenance landet verlässlich im Feld ohne hand-verdrahtetes Write-Back (Mechanismus hinter dem run-Seam); der Audit-Trail (Task-File) ist nach einem Lauf committet; anchored archive + anchored reset existieren und ersetzen die manuelle Repo-Rücksetzung; alle fünf Quality-Gates grün (vcs-provenance).
