      - "Geliefert in 7b23626 + 7b0107a: archive/reset (develop/main geschuetzt, live getestet), commit_sha+merge_commit additiv, Provenance-Mechanismus hinter dem run-Seam, Audit-Trail-Commit-Policy als Default-Template-Step; alle fuenf Gates gruen."
