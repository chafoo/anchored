questions:
  - id: q1
    text: "Plugin chat-voice direction (product decision): the updated CLAUDE.md says runtime
      plugin-chat mirrors the plugin-user's language and must not hardcode German. How far do we go
      now — (a) fully de-hardcode: replace the German Prefer/example strings with language-neutral
      illustrations or English-with-a-note, and make the instruction say 'mirror the user's
      language'; or (b) keep concrete example sentences but clearly relabel them as 'illustrative,
      in one language' while adding the mirror-user-language directive? (a) is more invasive but
      fully matches the new policy."
    priority: high
    origin: plan-agent
    phase: plugin-chat-dehardcode
    status: resolved
    answer: "Approach (b), illustrative — and it's already implemented on disk: communication-style.md
      states \"examples are English; mirror whatever language the user speaks\" + \"use the language
      the user wrote in this session\". So the policy is already de-hardcoded centrally.
      plugin-chat-dehardcode reduces to verifying the 5 SKILL.md voice tables defer to that central
      instruction and carry no hardcoded-German requirement; the guard-prose.sh sub-item is dropped
      (it has no language guard)."
    source: ai
    reasoning: plan-check confirmed communication-style.md already implements the illustrative +
      mirror-user-language approach, so the direction is settled by the user's own parallel
      translation; the residual is verification, not a fresh product decision.
    created_at: 2026-06-13T10:14:04.141Z
    resolved_at: 2026-06-13T11:48:54.842Z
  - id: q2
    text: 'Scope of `docs/design/`: the analysis treated those 5 files as intentionally German design
      notes (out of scope). But the updated CLAUDE.md states "Doku = English (docs/, ...)" without
      carving out design/. Do we (a) keep docs/design/ German as living design notes for our own dev
      use, or (b) also translate them now since they ship in the repo? Default: keep German (they
      are working design records, not user-facing docs), but confirm.'
    priority: medium
    origin: plan-agent
    phase: docs-tree
    status: resolved
    answer: Moot — docs/design/ is already English. The parallel translation translated the whole docs/
      tree including docs/design/, and the updated CLAUDE.md dropped the design/ carve-out anyway.
      So design notes are English too; no separate keep-German decision needed. docs-tree becomes a
      verification grep.
    source: ai
    reasoning: plan-check re-grep showed docs/ including docs/design/ has zero German tells, and the
      updated CLAUDE.md no longer carves out design/, so the question is resolved by the current
      state of the tree.
    created_at: 2026-06-13T10:14:14.697Z
    resolved_at: 2026-06-13T11:49:04.952Z
  - id: q3
    text: "Ownership of the workflow-smoke.spec.ts German assertions: both this task
      (test-assertion-sync) and `test-suite-green-p0-specs` (green-suite) touch them. Who owns the
      final fix? Default: `test-suite-green-p0-specs` runs FIRST and makes them green against
      CURRENT (untranslated) docs; this task then re-syncs them to the English wording after
      translation. Alternative: translate first, then fix the assertions once here. Pick the
      sequence to avoid one task re-reddening the other."
    priority: medium
    origin: plan-agent
    phase: test-assertion-sync
    status: resolved
    answer: No conflict to resolve right now — workflow-smoke.spec.ts already asserts English literals
      and the suite is green, so there are no German assertions for either task to fix.
      test-suite-green-p0-specs owns the doc-snapshot decoupling; this task's test-assertion-sync
      phase stays only as a green-gate guard for any plugin-prose edits made in
      plugin-chat-dehardcode (per memory Plugin-Prose-Test-Coupling, those edits can break
      exact-string assertions / guard-prose.sh) — run bun test after phase 3 and fix only what
      breaks.
    source: ai
    reasoning: plan-check confirmed the assertions are already English and green, so the ownership
      conflict is empty; the residual risk is only that phase-3 plugin-prose edits could re-break
      exact-string assertions, which the assertion-sync phase guards.
    created_at: 2026-06-13T10:14:22.098Z
    resolved_at: 2026-06-13T11:49:21.244Z
