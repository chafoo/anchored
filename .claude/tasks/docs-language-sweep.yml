    NOTE: the root `anchored.yml` was already translated to English earlier this session (rebuilt to
    v1 format), so that A2 item is done. The updated CLAUDE.md sharpens the plugin-voice rule:
    runtime plugin-chat must MIRROR the plugin-user's language and must NOT be hardcoded to German —
    so the German example strings in the skills + style-refs are now a policy item, not just a
    translation. The scope of `docs/design/` under the new policy is an open question."
  plan: >-
    - Source of truth: `.claude/temp/repo-analysis.md` section 1 (per-scope tables) + the updated
    CLAUDE.md "Sprachen" section.

    - Largest item is the `docs/` tree (48 files) — its own phase; pure prose translation, no
    structural change, diagrams + code identifiers untouched.

    - Shipped YAML (default-template + 3 plugin refs) is comment/instruction prose only; the
    `instructions:` fields are runtime prompts → functionally shipped, in scope.

    - Plugin chat voice is a POLICY change, not translation: per updated CLAUDE.md the runtime voice
    mirrors the plugin-user's language and must not hardcode German. The German example strings
    become language-neutral / clearly illustrative.

    - Cross-task: translating plugin/template content shifts the strings that
    `engine/workflow-smoke.spec.ts` asserts — coordinate with `test-suite-green-p0-specs` (see open
    questions). Already done: root `anchored.yml` (English).

    --- refine (2026-06-13) ---

    RE-SCOPE: the parallel translation effort has already completed nearly all substantive work;
    plan-check re-checked the CURRENT tree:

    - docs/ INCLUDING docs/design/ scans clean (zero German tells) → phase docs-tree is now
    VERIFY-ONLY; the "48 files German" + the docs/design carve-out are stale → q2 moot.

    - core/default-template/anchored.default.yml + all plugin/references/*.yml scan clean → phase
    shipped-yml is VERIFY-ONLY. PATH FIX: there is no plugin/references/default.yml — the real files
    are anchored.default.yml + anchored.example-comprehensive.yml (+ task.example.yml,
    epic.example.yml).

    - workflow-smoke.spec.ts asserts only English literals, suite green → phase test-assertion-sync
    has no German to re-sync NOW; keep it only as the green-gate guard for any plugin-prose edits
    made in phase plugin-chat-dehardcode (see memory Plugin-Prose-Test-Coupling: plugin prose edits
    can break guard-prose.sh + workflow-smoke assertions on exact strings).

    - q1 (chat-voice de-hardcode depth) is effectively ANSWERED on disk: communication-style.md
    already does the illustrative approach ("examples are English; mirror whatever language the user
    speaks"). So phase plugin-chat-dehardcode reduces to: verify the 5 SKILL.md voice tables
    reference that central instruction + carry no hardcoded-German requirement. DROP the
    guard-prose.sh sub-item (that script enforces only jargon/question-discipline/fanout — no
    language guard).

    rules-check: aligned — CLAUDE.md is the correct language-policy reference for phases 1-3;
    tooling-quality-gates on phase 4 (spec edit). No additions, no orphans, no conflicts.
phases:
