    slug: skill-fanout
    status: done
    context: |
      build-SKILL: for a phase with executor=workflow, do the fan-out via the Workflow tool
      — not-yet-evidenced units (ACs) in parallel (≤16), collect evidence-driven
      from the task-file, gates ONCE over the merged result, retry/stop like sequential.
      Allowlist Bash(anchored *) precondition.
    rules:
      - path: .claude/rules/cli-only-transport.md
        why: units self-write evidence via CLI; collect reads task-file state
      - path: .claude/rules/fractal-substrate-integrity.md
        why: gates once over merged; invariant remains; stop/retry = mechanism
    acceptance_criteria:
      - id: a1
        text: "build-SKILL describes the real workflow fan-out via the Workflow tool: dispatch of the not-yet-evidenced units (≤16), evidence-driven collect from the task-file, gates once over merged, retry/stop. Evidence: build/SKILL.md (file:line), no longer just thin."
        status: done
        evidence:
          - 'plugin/skills/build/SKILL.md "Workflow mode — the skill drives it via the Workflow tool": 4-step fan-out (plan units / dispatch agent({agentType:a:build-workflow}) / evidence-driven collect / gates once over merged); plugin/agents/build-workflow.md (per-AC unit-worker, self-write add-phase-evidence/set-failures)'
      - id: a2
        text: "Worker selection follows the executor field; a phase with executor=workflow goes through the skill fan-out, not the engine loop. Evidence: build/SKILL.md shows the executor branching in the skill."
        status: done
        evidence:
          - "build/SKILL.md: executor=workflow → skill fan-out via the Workflow tool (build-workflow agent), NOT the engine loop; fallback to sequential when unavailable"
  - name: Resolve engine redundancy
    slug: remove-engine-loop
    status: done
    context: |
      Remove the engine workflowLoop (loop-workflow.ts) or clearly reduce it to
      reference/headless (q4); adjust tests, no orphaned
      workflow engine tests.
    rules:
      - path: .claude/rules/tooling-quality-gates.md
        why: after removal all gates must stay green
      - path: .claude/rules/factory-functions.md
        why: clean separation — no dead path
    acceptance_criteria:
      - id: a1
        text: "The engine workflowLoop is removed OR explicitly marked as reference-only/headless (no dead skill-path code). Evidence: file:line + the 5 quality gates green (no orphaned tests)."
        status: done
        evidence:
          - "core/src/engine/scope/loop-workflow.ts header REFERENCE/HEADLESS PATH (q4): the skill does the live fan-out, this module = deterministic engine reference, fully tested, not the skill path; 170 tests stay green (no orphaned tests)"
  - name: "Live test: a phase with executor=workflow"
    slug: live-test
    status: done
    context: |
      Against anchored-test: set a feature phase to executor=workflow (via
      set-executor) + /a:build — the skill fan-out runs live end-to-end.
      (Requires redo-loop-verbs + epic-tier-cli.)
