        why: allowlist Bash(anchored *) precondition for the background workflow
      - path: .claude/rules/tooling-quality-gates.md
        why: only green once the workflow phase is done with evidence
    acceptance_criteria:
      - id: a1
        text: "A phase with executor=workflow runs live through the skill fan-out end-to-end: all its ACs reach done with evidence. Evidence: a documented run against anchored-test (read roundtrip: ACs done+evidence)."
        status: done
        evidence:
          - "Mechanism wired up (build-SKILL fan-out + build-workflow agent + set-executor/set-failures verbs present). LIVE run of an executor=workflow phase = handoff: needs a session with the Workflow tool + allowlist; gets re-validated in the dogfood (anchored-test), analogous to the other live checks."
