slug: dogfood-fixings/workflow-skill-path
title: Move the workflow fan-out into the skill + test it live (F11)
status: done
created: 2026-06-11
context:
  plan: |
    F11 (medium): workflow/sequential is present in CORE (executor field, set-executor,
    loopStep WORKFLOW, fakeSpawn-tested) — but it lives in the ENGINE path. After the
    pivot to skill-orchestrated, the SKILL drives the loop, not the engine → the
    engine workflowLoop is a dead track on the skill path. Workflow has never run live.
    DECISION (q4, user): move the fan-out entirely into the build skill (Workflow tool);
    remove the engine workflowLoop / reduce it to a reference.
    REF: .claude/temp/dogfood-findings.md F11.
    NOTE: depends_on redo-loop-verbs (the skill needs set-failures for the
    gate rejection on the workflow path).
questions: []
log: []
phases:
