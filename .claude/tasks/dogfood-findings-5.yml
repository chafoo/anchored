title: Dogfood Findings 5 — Epic-Run Fixes (Substrate, CLI, Voice, Orchestration, Packaging)
context:
  intro: >-
    A fresh `/a:plan epic` dogfood run in `anchored-test` (2026-06-14) surfaced nine concrete
    weaknesses across four layers: substrate/engine (core/), plugin prose/conversation quality
    (plugin/), orchestration/steps, and packaging/setup. Evidence anchors per finding; full note in
    `.claude/temp/dogfood-findings-5.md`.


    WHAT EXISTS: Path derivation is flat today (`core/src/index.ts:158` `pathFor` →
    `${projectRoot}/.claude/tasks/${slug}.yml`, no tier branching), while `core/src/io/io.ts:41` can
    already nested-mkdir and `core/src/epic-tier.int.ts:26-27` already expects nested
    `.claude/tasks/<epic>/<slug>.yml` — code lags the expectation. The node CLI
    (`core/src/cli/commands/node/node.ts`) has a broad verb set but lacks `set-ac-text`,
    `remove-ac`, `set-phase-context` and a `rename` verb — in the run the session fell back to MCP
    because of this (forbidden per cli-only-transport) and failed. Custom-field plumbing is
    surprisingly already present in code (`core/src/domain/config-schema/custom-fields.ts`
    `extendSchemaWithFields`, wired in `index.ts:172-178`) — this contradicts the discovery
    assumption "still strict" and must be verified rather than blindly rebuilt. Voice references
    (`plugin/references/communication-style.md`, `question-style.md`) exist and are linked, the
    static `plugin/scripts/guard-prose.sh` is green — but it only checks file text, not runtime
    agent output.


    WHAT IS MISSING: tier-aware `pathFor` logic (epic → own folder + `_<slug>.yml`); the four
    missing CLI verbs; an `executor`/fan-out default in the default-template (`anchored.default.yml`
    has no `executor` field today); separate walk-style capture per tier in refine; a runtime guard
    against jargon leak plus de-jargoned skill/agent prose; correct wrap-step ordering (audit-commit
    after the done-flip, not before); and a packaged `plugin/bin/anchored` shim (directory missing,
    visible as `?? plugin/bin/` in git-status).
  plan: >-
    - Ordering is deliberate: substrate/CLI first, because the plugin-prose guard (F7) couples to
    green tests beneath it and skill edits (F6/F7) break the exact string assertions in
    guard-prose.sh + workflow-smoke.spec.ts (Plugin-Prose-Test-Coupling) — those must be carried
    along.

    - F4 (custom-field plumbing) appears already solved in code:
    `core/src/domain/config-schema/custom-fields.ts` extends the strict tier schema with declared
    `task.phase.fields`, and `index.ts:172-178` threads `fieldsByTier` through. Discovery said
    "still strict" — contradiction open (see question). The phase treats F4 as verify-or-fix, not a
    rebuild.

    - Mechanism-vs-policy cut (fractal-substrate-integrity): F1 path logic + F3 rename mechanics +
    F4 schema threading are Mechanism (code); F5 fan-out default is Policy (template); F5 executor
    dispatch is Mechanism (seam in `core/src/orchestration/`).

    - Single-file CLI `node.ts` gains companions (new verbs + colocated spec) → migrates to folder
    `node/` + `node.ts` + `node.spec.ts` per colocation-and-naming.

    - F7 has TWO levers (de-jargon prose + runtime guard) that are separately scopeable; the v1 diff
    `/Users/jack/Dev/anchored/plugin/references/communication-style.md` is the reference for the
    stronger self-check loop.

    - F5 default is unproven per the run (the independent-tasks parallel case never occurred) — the
    rolling-wave vs. full-parallelism tension (Epic-Rolling-Wave-Execution) must be resolved.
  build:
    refine: >-
      ## Refine (2026-06-14) — walk-style: all-together, all 10 questions answered by user


      **plan-check verdict: needs-attention.** Grounding corrected four stale Explore anchors +
      re-scoped two findings that are further along in code than the draft assumed:

      - `io.ts` is at `core/src/store/io/io.ts` (not `core/src/io/io.ts`).

      - `core/src/cli/commands/node/` is ALREADY a folder with colocated `node.spec.ts` — F2 extends
      it, no migration.

      - There is NO `workflow-smoke.spec.ts` in the repo — `guard-prose.sh` is the only plugin-prose
      gate (it already carries a ~13-term jargon-mapping section). The walk-style + jargon ACs were
      corrected accordingly.

      - `plugin/bin/anchored` already EXISTS (untracked) with a hardcoded `/Users/jack/...` path +
      `#!/bin/sh` — F9 narrowed to portability + tracking + packaging.

      - F4 custom-fields: `extendSchemaWithFields` is wired (`custom-fields.ts` →
      `index.ts:172-178`) → verify-only.

      - F5 fan-out: per-phase fan-out already live (refine-SKILL + `set-executor`); `ready-children`
      exists in `core/src/store/children/children.ts` → phase re-scoped to the epic-task wave
      default + wiring the serial build loop onto `ready-children`.

      - F8 audit-flip: lives in the wrap-SKILL prose + after-flip `instructions` mechanism, NOT the
      default-template wrap sequence.


      **rules-check verdict: needs-attention.** Added `.claude/rules/test-file-naming.md` to the 5
      phases that write a new test (epic-folder-layout, cli-verb-gaps, rename-and-custom-fields,
      fanout-default, audit-trail-flip-order). No orphaned refs, no cross-phase conflicts.


      **Q&A walk (all-together):** all 10 questions resolved by user — F4 verify-only, rename
      full-migration (file + _epic.yml refs), F5 rolling-wave (parallel within a wave, serial on
      depends_on), F7 all tokens in user-facing prose + extended static scan guard, F8 wrap-SKILL
      after-flip step, F9 relative shim + node shebang, F1 tier-aware pathFor with
      standalone-stays-flat + no auto-migration of old epics, set-ac-text by id.


      **Parallelism note (plan-check):** bin-shim-packaging, audit-trail-flip-order,
      walk-style-per-tier touch disjoint surfaces — parallel candidates. cli-verb-gaps must precede
      rename-and-custom-fields (consumes the rename verb); epic-folder-layout should precede
      rename's file-migration AC.
