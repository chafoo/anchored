questions:
  - id: q1
    text: 'F4 (custom-field plumbing) appears already solved in code —
      `core/src/domain/config-schema/custom-fields.ts` `extendSchemaWithFields` is wired in
      `index.ts:172-178`. Is that actually the fix (then the phase is pure verification + regression
      test), or is there a reproducible case that still throws "Unrecognized key"? (lean:
      verify-or-fix — reproduce first, then only fix if the gap is real)'
    priority: high
    origin: plan-agent
    phase: rename-and-custom-fields
    status: resolved
    answer: Verify-only + regression test. Code shows extendSchemaWithFields is wired (custom-fields.ts
      → index.ts:172-178). First reproduce whether phase.fields (e.g. commit_sha) already passes
      through today; if yes, lock it with a regression test — no rebuild.
    source: user
    created_at: 2026-06-13T22:35:59.955Z
    resolved_at: 2026-06-13T23:59:13.704Z
  - id: q2
    text: "Should `rename` only change the node's slug field, or also migrate the file paths (rename the
      file / move it inside the epic folder) AND carry references in the `_epic.yml`
      (`tasks[].slug`, `depends_on`)? (lean: full migration incl. file + epic references — otherwise
      dangling refs remain, full build no cuts)"
    priority: high
    origin: plan-agent
    phase: rename-and-custom-fields
    status: resolved
    answer: "Full migration: change the slug field, rename/move the file inside the epic folder, AND
      carry the references in _epic.yml (tasks[].slug, depends_on). No dangling refs."
    source: user
    created_at: 2026-06-13T22:36:07.479Z
    resolved_at: 2026-06-13T23:59:15.721Z
  - id: q3
    text: "F5 default behavior: full parallelism across independent tasks OR rolling-wave (living SSOT,
      re-sync between waves) — the two are in tension per Epic-Rolling-Wave-Execution. Which is the
      default? (lean: rolling-wave waves with parallelism WITHIN a wave, serial only on depends_on —
      unifies both)"
    priority: high
    origin: plan-agent
    phase: fanout-default
    status: resolved
    answer: "Rolling-wave: parallelism WITHIN a wave, serial only on a real depends_on edge. Follows
      from the F5 re-scope (limit the phase to the epic-task wave default + wiring the serial build
      loop onto ready-children; per-phase fan-out is already live)."
    source: user
    created_at: 2026-06-13T22:36:42.847Z
    resolved_at: 2026-06-13T23:59:17.877Z
  - id: q4
    text: "How far should F7 de-jargoning go — all counted tokens
      (stub/outcome/roll-up/fan-out/drafted/refined/seam/executor/just-in-time) or only the worst
      leaks? And does it apply only to user-facing prose or also internal step/example prose? (lean:
      replace all tokens in user-facing prose, internal mechanism docs may keep the technical
      terms)"
    priority: high
    origin: plan-agent
    phase: jargon-leak-guard
    status: resolved
    answer: Replace all counted jargon tokens
      (stub/outcome/roll-up/fan-out/drafted/refined/seam/executor/just-in-time) in user-facing
      prose; internal mechanism docs may keep the technical terms.
    source: user
    created_at: 2026-06-13T22:37:15.939Z
    resolved_at: 2026-06-13T23:59:20.226Z
  - id: q5
    text: "Should the F7 runtime guard actually inspect agent output at runtime (e2e against real spawn
      output) or is an extended static token-scan over the rendered skill/agent outputs in a smoke
      test enough? (lean: extended smoke/int test rather than expensive real spawn — cheaper and
      CI-friendly)"
    priority: medium
    origin: plan-agent
    phase: jargon-leak-guard
    status: resolved
    answer: "Extended smoke/static scan: grow the existing guard-prose.sh with a scan over the rendered
