    status: done
    acceptance_criteria:
      - id: a1
        text: "schema/step.ts: provenance?: {field, ref?} on Step, valid only on run-step (refine); test covers the XOR/validity (red before green)."
        status: done
        evidence:
          - "schema/step.ts: provenance?: {field, ref?} on Step + StepSchema; .refine enforces run-step-only. step.spec.ts: parses on run-step (with/without ref), rejects on use/bare/empty field. bun test green."
      - id: a2
        text: "engine/scope/run-step.ts: after a successful run with provenance, deps.run('git rev-parse <ref|HEAD>') captures the SHA + writes it into the field via ops (mechanism); test with fake run+ops (no real git)."
        status: done
        evidence:
          - "engine/scope/run-step.ts: after a successful run with provenance, deps.run('git rev-parse <ref|HEAD>') captures the SHA + writes via deps.ops.setField (new in OpsLike + engine-ops). run-step.spec.ts (fake run+ops): SHA lands in the field, no setField without provenance, no capture on failed cmd, failed rev-parse stays ok. Only deps.run, no child_process."
      - id: a3
        text: "Mechanism-vs-policy: WHAT gets committed stays policy (the run command), THAT the SHA reliably reaches the field is mechanism; documented in config.md/comment."
        status: done
        evidence:
          - "Mechanism-vs-policy: git effect + SHA capture = mechanism (Engine, behind the deps.run seam); WHAT gets committed + which field = policy (config). Documented in config.md."
